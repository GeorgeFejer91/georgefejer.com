<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Academic Print Stash</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      --line: color-mix(in srgb, currentColor 18%, transparent);
      --muted: color-mix(in srgb, currentColor 70%, transparent);
    }

    body {
      margin: 0;
      padding: 32px;
      max-width: 900px;
    }

    h1 {
      font-size: 1.9rem;
      margin: 0 0 8px;
    }

    a {
      color: currentColor;
      text-underline-offset: 0.18em;
    }

    .meta {
      color: var(--muted);
      max-width: 680px;
    }

    .item {
      border-top: 1px solid var(--line);
      margin-top: 28px;
      padding-top: 18px;
    }

    .item h2 {
      font-size: 1.1rem;
      margin: 0 0 6px;
    }

    .item p {
      margin: 0;
      max-width: 680px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Academic Print Stash</h1>
    <p class="meta">Standalone website-hosted files kept here for later printing, separate from Study 6 and other project folders.</p>

    <section class="item">
      <h2><a href="questionnaire-packets/">Questionnaire packets</a></h2>
      <p>A4 questionnaire packet PDFs and spatial-frame blocks.</p>
    </section>
  </main>
</body>
</html>
