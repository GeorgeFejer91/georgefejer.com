<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Unicorn Labyrinth Chase | GeorgeFejer.com</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgb(6 14 18 / 76%);
      --panel-strong: rgb(6 14 18 / 90%);
      --line: rgb(221 255 236 / 22%);
      --text: #f2fff7;
      --muted: #b8d9cd;
      --glow: #9af7da;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #06130f;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100svh;
      display: block;
      background: #0c2418;
      touch-action: none;
      cursor: crosshair;
    }

  </style>
</head>
<body>
  <canvas id="world" aria-label="2D unicorn forest labyrinth chase game"></canvas>

  <script>
    (() => {
      const canvas = document.getElementById('world');
      const ctx = canvas.getContext('2d');
      const storageKey = 'unicornLabyrinthBest';
      const assetVersion = '20260623-roaming-frog-v1';
      const levelTransitionMorphDuration = 8000;
      const grid = { cols: 41, rows: 31, tile: 74 };
      const world = { w: grid.cols * grid.tile, h: grid.rows * grid.tile };
      const startCell = { c: 1, r: 1 };
      const exitCell = { c: grid.cols - 2, r: grid.rows - 2 };
      const witchStartCell = { c: grid.cols - 2, r: 1 };
      const secondWitchStartCell = { c: 1, r: grid.rows - 2 };
      const urlParams = new URLSearchParams(window.location.search);
      const princessTestMode = urlParams.has('princesstest');
      const evilTreeTestMode = urlParams.has('eviltest');
      const leafTreeTestMode = urlParams.has('leaftest');
      const treePushTestMode = urlParams.get('treepushtest');
      const morphTestMode = urlParams.get('morphtest');
      const frogTestMode = urlParams.has('frogtest');
      const aiValidationMode = urlParams.has('aitest');
      const levelConfigs = [
        {
          level: 1,
          title: 'Stufe 1',
          subtitle: 'Einhorn, gib Horn!',
          difficulty: 'Krone frei!',
          playerForm: 'unicorn',
          playerSpeed: 300,

          witchStartDelay: 5,
          mazeOpenings: 122,
          treats: 30,
          crumbs: 178,

          evilTreeSpeed: 72,
          goodTreeSpeed: 66,

          gatePlan: [['good', 0.3], ['evil', 0.58], ['good', 0.82]]
        },
        {

          subtitle: 'Prinzessin, losgekuesst!',
          difficulty: 'Maerchen-Magie!',
          playerForm: 'princess',
          playerSpeed: 274,
          witchCount: 2,
          witchSpeed: 166,

          mazeOpenings: 104,
          treats: 22,
          crumbs: 126,

        },
        {

          title: 'Stufe 3',
          subtitle: 'Glitzer galopp!',

          playerForm: 'unicorn',
          playerSpeed: 282,
          witchCount: 2,
          witchSpeed: 182,
          witch2Speed: 194,
          witchStartDelay: 2.4,
          mazeOpenings: 96,
          treats: 21,
          crumbs: 118,
          minSpan: 5,
          maxSpan: 10,
          evilTreeSpeed: 108,
          goodTreeSpeed: 98,
          frogSpeed: 106,
          treeWaitScale: 1.02,
          gatePlan: [['evil', 0.12], ['good', 0.24], ['evil', 0.4], ['good', 0.56], ['evil', 0.72], ['good', 0.88]]
        },
        {
          level: 4,
          title: 'Stufe 4',
          subtitle: 'Prinzesslich, aber bissig!',
          difficulty: 'Krone kontra Chaos!',
          playerForm: 'princess',
          playerSpeed: 302,
          witchCount: 2,
          witchSpeed: 172,
          witch2Speed: 182,
          witchStartDelay: 6.2,
          mazeOpenings: 100,
          treats: 22,
          crumbs: 122,
          minSpan: 5,
          maxSpan: 10,
          evilTreeSpeed: 104,
          goodTreeSpeed: 96,
          frogSpeed: 108,
          treeWaitScale: 1.15,
          gatePlan: [['evil', 0.12], ['good', 0.28], ['evil', 0.45], ['good', 0.62], ['evil', 0.78]]
        },
        {
          level: 5,
          title: 'Stufe 5',
          subtitle: 'Horn drauf, Maerchen ab!',
          difficulty: 'Finale Fantasie!',
          playerForm: 'unicorn',
          playerSpeed: 312,
          witchCount: 2,
          witchSpeed: 176,
          witch2Speed: 188,
          witchStartDelay: 8,
          mazeOpenings: 104,
          treats: 22,
          crumbs: 116,
          minSpan: 5,
          maxSpan: 10,
          evilTreeSpeed: 106,
          goodTreeSpeed: 98,
          frogSpeed: 102,
          treeWaitScale: 1.18,
          gatePlan: [['evil', 0.12], ['good', 0.28], ['evil', 0.46], ['good', 0.64], ['evil', 0.82]]
        }
      ];
      function boundedLevel(value) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return 1;
        return Math.max(1, Math.min(levelConfigs.length, Math.round(parsed)));
      }
      function configForLevel(level) {
        return levelConfigs[boundedLevel(level) - 1];
      }
      const requestedStartLevel = urlParams.get('level');
      const defaultStartLevel = requestedStartLevel
        ? boundedLevel(requestedStartLevel)
        : frogTestMode
          ? 3
        : princessTestMode
          ? 2
          : 1;
      const dirs = [
        { dc: 1, dr: 0 },
        { dc: -1, dr: 0 },
        { dc: 0, dr: 1 },
        { dc: 0, dr: -1 }
      ];
      const state = {
        dpr: 1,
        vw: 0,
        vh: 0,
        maze: [],
        camera: { x: 0, y: 0 },
        zoom: 0.75,
        minZoom: 0.55,
        maxZoom: 1.35,
        player: { x: 0, y: 0, path: [], speed: 265, step: 0, angle: 0, facing: 1 },
        playerForm: 'unicorn',
        witch: { x: 0, y: 0, path: [], speed: 190, step: 0, repath: 0, frozenUntil: 0, stenchUntil: 0, facing: -1 },
        witch2: { x: 0, y: 0, path: [], speed: 210, step: 0, repath: 0, frozenUntil: 0, stenchUntil: 0, facing: 1, active: false },
        frog: { x: 0, y: 0, path: [], speed: 116, step: 0, wait: 0, facing: -1, active: false, targetCell: null },
        level: defaultStartLevel,
        maxLevel: levelConfigs.length,
        score: 0,
        lives: 3,
        best: Number(localStorage.getItem(storageKey) || 0),
        activeTreat: null,
        activeUntil: 0,
        shieldUntil: 0,
        messageUntil: 0,
        messageText: '',
        levelIntroUntil: 0,
        levelStartedAt: performance.now(),
        last: performance.now(),
        won: false,
        over: false,
        treats: [],
        crumbs: [],
        stenchTrail: [],
        stenchFogs: [],
        crushBursts: [],
        stenchUntil: 0,
        stenchEmit: 0,
        evilTrees: [],
        goodTrees: [],
        nextEvilTreeAt: 0,
        evilTreeEventCount: 0,
        evilTreeChanges: 0,
        evilTreeSwitches: 0,
        evilTreeArchChanges: 0,
        lastEvilTreeArch: 'none',
        lastEvilTreeRouteDelta: 0,
        evilTreeWaveTarget: 0,
        evilTreeWaveRemaining: 0,
        nextEvilTreeWalkerAt: 0,
        mazeRevision: 0,
        lastGateWait: 'none',
        treePushes: 0,
        treeCrushes: 0,
        lastTreeCollision: 'none',
        transformUntil: 0,
        morphFrom: null,
        morphTo: null,
        morphStartedAt: 0,
        morphUntil: 0,
        morphDuration: 3000,
        morphTravel: null,
        levelTransitionUntil: 0,
        musicStarted: false,
        musicBlocked: false,
        validationMode: false,
        sfxPlays: 0,
        lastSfx: 'none',
        assetPhase: 'boot'
      };
      const assetStats = {
        total: 0,
        requested: 0,
        decoded: 0,
        failed: 0,
        webp: 0,
        pngFallback: 0
      };
      let deferredSpriteLoadStarted = false;
      const characterSprites = {
        unicorn: loadSprite('assets/unicorn-run.png', 220, 160, 0.42, 32, { required: true, priority: 'high' }),
        princess: loadSprite('assets/princess-run.png', 220, 230, 0.43, 30, { lazy: true }),
        morph: loadSprite('assets/unicorn-princess-morph.png', 220, 230, 0.46, 30, { lazy: true }),
        morphWalk: loadSprite('assets/unicorn-princess-morph-walk.png', 220, 230, 0.46, 30, { lazy: true }),
        witch: loadSprite('assets/witch-run.png', 214, 190, 0.43, 35, { required: true, priority: 'high' }),
        witch2: loadSprite('assets/witch-moon-run.png', 214, 190, 0.43, 35, { lazy: true })
      };
      const scenerySprites = {
        wavingTree: loadSprite('assets/waving-tree-v2.png', 180, 180, 0.54, 0, { lazy: true }),
        evilTree: loadSprite('assets/evil-tree-walk.png', 190, 190, 0.56, 0, { lazy: true }),
        goodTree: loadSprite('assets/good-tree-walk.png', 190, 190, 0.56, 0, { lazy: true }),
        frog: loadSprite('assets/frog-wave.png', 180, 180, 0.52, 0, { lazy: true }),
        frogWalk: loadSprite('assets/frog-walk.png', 180, 180, 0.52, 0, { lazy: true })
      };
      const evilTreeFrameCount = 8;
      const frogFrameCount = 6;
      const frogWalkFrameCount = 8;
      const morphFrameCount = 18;
      const morphWalkFrameCount = 8;
      const musicVariants = [
        'assets/music/mlp-theme-arcade-variant-1.mp3',
        'assets/music/mlp-theme-arcade-variant-2.mp3',
        'assets/music/mlp-theme-arcade-variant-3.mp3'
      ];
      const backgroundMusic = new Audio();
      backgroundMusic.loop = false;
      backgroundMusic.preload = 'none';
      backgroundMusic.volume = 0.34;
      let currentMusicIndex = -1;
      const sfxDefinitions = {
        crumb: { src: 'crumb.wav', volume: 0.34, gap: 70 },
        treat: { src: 'treat.wav', volume: 0.42, gap: 0 },
        speed: { src: 'speed.wav', volume: 0.46, gap: 0 },
        shield: { src: 'shield.wav', volume: 0.46, gap: 0 },
        freeze: { src: 'freeze.wav', volume: 0.44, gap: 0 },
        spark: { src: 'spark.wav', volume: 0.45, gap: 0 },
        stink: { src: 'stink.wav', volume: 0.42, gap: 0 },
        leaf: { src: 'leaf.wav', volume: 0.42, gap: 0 },
        blocked: { src: 'blocked.wav', volume: 0.36, gap: 140 },
        treePush: { src: 'tree-push.wav', volume: 0.50, gap: 80 },
        treeCrush: { src: 'tree-crush.wav', volume: 0.62, gap: 0 },
        shieldBounce: { src: 'shield-bounce.wav', volume: 0.48, gap: 0 },
        witchCatch: { src: 'witch-catch.wav', volume: 0.54, gap: 0 },
        levelUp: { src: 'level-up.wav', volume: 0.50, gap: 0 },
        win: { src: 'win.wav', volume: 0.54, gap: 0 }
      };
      const sfxPools = {};
      const sfxPoolIndex = {};
      const sfxLastPlayed = {};
      const eagerSfx = new Set(['crumb', 'treat', 'blocked', 'levelUp', 'witchCatch']);

      function createSfxPool(name) {
        if (sfxPools[name]) return sfxPools[name];
        const definition = sfxDefinitions[name];
        if (!definition) return null;
        sfxPools[name] = Array.from({ length: 3 }, () => {
          const audio = new Audio('assets/sfx/' + definition.src + '?v=' + assetVersion);
          audio.preload = eagerSfx.has(name) ? 'auto' : 'none';
          audio.volume = definition.volume;
          return audio;
        });
        sfxPoolIndex[name] = 0;
        return sfxPools[name];
      }

      Object.keys(sfxDefinitions).forEach((name) => {
        if (eagerSfx.has(name)) createSfxPool(name);
      });

      function musicStatus() {
        if (backgroundMusic.error) return 'failed';
        if (!state.musicStarted) return 'waiting';
        if (!backgroundMusic.paused) return 'playing';
        return state.musicBlocked ? 'blocked' : 'paused';
      }

      function musicSrc() {
        return backgroundMusic.currentSrc || backgroundMusic.src || '';
      }

      function chooseNextMusicIndex() {
        if (musicVariants.length <= 1) return 0;
        let next = Math.floor(random() * musicVariants.length);
        if (next === currentMusicIndex) {
          next = (next + 1 + Math.floor(random() * (musicVariants.length - 1))) % musicVariants.length;
        }
        return next;
      }

      function setBackgroundMusicVariant(index) {
        currentMusicIndex = clamp(index, 0, musicVariants.length - 1);
        backgroundMusic.src = musicVariants[currentMusicIndex] + '?v=' + assetVersion;
        try {
          backgroundMusic.currentTime = 0;
        } catch (_) {
          // Some mobile browsers disallow seeking before metadata is ready.
        }
      }

      function playBackgroundMusic() {
        if (currentMusicIndex < 0) setBackgroundMusicVariant(chooseNextMusicIndex());
        const playPromise = backgroundMusic.play();
        if (playPromise && typeof playPromise.then === 'function') {
          playPromise
            .then(() => {
              state.musicBlocked = false;
              updateHud();
            })
            .catch(() => {
              state.musicBlocked = true;
              updateHud();
            });
        }
      }

      function advanceBackgroundMusic() {
        setBackgroundMusicVariant(chooseNextMusicIndex());
        if (state.musicStarted) playBackgroundMusic();
        updateHud();
      }

      function startBackgroundMusic() {
        if (!backgroundMusic.paused) return;
        state.musicStarted = true;
        state.musicBlocked = false;
        playBackgroundMusic();
        updateHud();
      }

      function playSfx(name, minGap = null) {
        const definition = sfxDefinitions[name];
        if (!definition) return;
        const now = performance.now();
        const gap = minGap === null ? definition.gap : minGap;
        if (gap && sfxLastPlayed[name] && now - sfxLastPlayed[name] < gap) return;
        sfxLastPlayed[name] = now;
        if (state.validationMode) {
          state.sfxPlays += 1;
          state.lastSfx = name;
          updateHud();
          return;
        }
        const pool = createSfxPool(name);
        if (!pool) return;
        const index = sfxPoolIndex[name] % pool.length;
        sfxPoolIndex[name] += 1;
        const audio = pool[index];
        try {
          audio.currentTime = 0;
        } catch (_) {
          // Some mobile browsers disallow seeking before metadata is ready.
        }
        const playPromise = audio.play();
        state.sfxPlays += 1;
        state.lastSfx = name;
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {
            state.lastSfx = 'blocked:' + name;
            updateHud();
          });
        }
        updateHud();
      }

      ['canplaythrough', 'playing', 'pause', 'error', 'loadedmetadata'].forEach((eventName) => {
        backgroundMusic.addEventListener(eventName, () => {
          if (eventName === 'playing') state.musicBlocked = false;
          if (eventName === 'error' && state.musicStarted && musicVariants.length > 1) {
            window.setTimeout(() => advanceBackgroundMusic(), 250);
          }
          if (canvas.width) updateHud();
        });
      });
      backgroundMusic.addEventListener('ended', () => {
        if (state.musicStarted) advanceBackgroundMusic();
      });

      function allSprites() {
        return [...Object.values(characterSprites), ...Object.values(scenerySprites)];
      }

      function requiredSprites() {
        return allSprites().filter((sprite) => sprite.required);
      }

      function currentSpriteSetReady() {
        return requiredSprites().every((sprite) => sprite.ready);
      }

      function allSpritesReady() {
        return allSprites().every((sprite) => sprite.ready);
      }

      function failedSprites() {
        return allSprites().filter((sprite) => sprite.failed).map((sprite) => sprite.src);
      }

      function drawLoadingScreen() {
        const failed = failedSprites();
        ctx.save();
        ctx.fillStyle = '#07150f';
        ctx.fillRect(0, 0, state.vw, state.vh);
        ctx.fillStyle = '#9df7d0';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 18px Arial';
        ctx.fillText(failed.length ? 'Sprite load failed. Reloading may help.' : 'Loading enchanted forest...', state.vw / 2, state.vh / 2);
        ctx.restore();
      }

      function webpSpriteSrc(src) {
        return src.replace(/\.png$/i, '.webp');
      }

      function versionedAsset(src) {
        return src + '?v=' + assetVersion;
      }

      function preloadImage(src) {
        const preload = document.createElement('link');
        preload.rel = 'preload';
        preload.as = 'image';
        preload.href = versionedAsset(src);
        document.head.appendChild(preload);
      }

      function maybeStartDeferredSpriteLoad() {
        if (deferredSpriteLoadStarted || !currentSpriteSetReady()) return;
        deferredSpriteLoadStarted = true;
        state.assetPhase = 'deferred';
        const loadDeferred = () => {
          allSprites()
            .filter((sprite) => sprite.lazy && !sprite.requested)
            .forEach((sprite) => requestSprite(sprite));
          if (canvas.width) {
            updateHud();
            draw();
          }
        };
        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(loadDeferred, { timeout: 900 });
        } else {
          window.setTimeout(loadDeferred, 220);
        }
      }

      function completeSprite(sprite) {
        sprite.ready = true;
        sprite.decoded = true;
        assetStats.decoded += 1;
        if (sprite.usingWebp) assetStats.webp += 1;
        if (allSpritesReady()) state.assetPhase = 'complete';
        maybeStartDeferredSpriteLoad();
        if (canvas.width) {
          updateHud();
          draw();
        }
      }

      function failSprite(sprite, usedFallback) {
        if (!usedFallback && sprite.fallbackSrc) {
          assetStats.pngFallback += 1;
          requestSprite(sprite, true);
          return;
        }
        sprite.failed = true;
        assetStats.failed += 1;
        maybeStartDeferredSpriteLoad();
        if (canvas.width) {
          updateHud();
          draw();
        }
      }

      function requestSprite(sprite, useFallback = false) {
        if (sprite.ready || (sprite.requested && !useFallback)) return;
        sprite.requested = true;
        sprite.failed = false;
        assetStats.requested += 1;
        const image = new Image();
        const src = useFallback ? sprite.fallbackSrc : sprite.preferredSrc;
        sprite.image = image;
        sprite.currentSrc = src;
        sprite.usingWebp = !useFallback && /\.webp$/i.test(src);
        image.onload = () => {
          const decodePromise = typeof image.decode === 'function' ? image.decode() : Promise.resolve();
          decodePromise.then(() => completeSprite(sprite)).catch(() => completeSprite(sprite));
        };
        image.onerror = () => failSprite(sprite, useFallback);
        image.src = versionedAsset(src);
      }

      function loadSprite(src, frameW, frameH, scale, ground, options = {}) {
        const preferredSrc = options.preferPng ? src : webpSpriteSrc(src);
        const sprite = {
          image: new Image(),
          src,
          preferredSrc,
          fallbackSrc: preferredSrc === src ? null : src,
          versionedSrc: versionedAsset(preferredSrc),
          frameW,
          frameH,
          scale,
          ground,
          ready: false,
          failed: false,
          decoded: false,
          requested: false,
          required: Boolean(options.required),
          lazy: Boolean(options.lazy),
          priority: options.priority || 'normal',
          usingWebp: false,
          currentSrc: ''
        };
        assetStats.total += 1;
        if (sprite.required || sprite.priority === 'high') {
          preloadImage(preferredSrc);
        }
        if (!sprite.lazy) {
          requestSprite(sprite);
        }
        return sprite;
      }

      function drawSpriteFrame(sprite, frameIndex, facing) {
        if (!sprite.ready) return false;
        const sourceFacesLeft = true;
        const flip = sourceFacesLeft && facing > 0 ? -1 : 1;
        const dx = -sprite.frameW * sprite.scale / 2;
        const dy = -sprite.frameH * sprite.scale + sprite.ground;
        ctx.save();
        ctx.scale(flip, 1);
        ctx.drawImage(
          sprite.image,
          frameIndex * sprite.frameW,
          0,
          sprite.frameW,
          sprite.frameH,
          dx,
          dy,
          sprite.frameW * sprite.scale,
          sprite.frameH * sprite.scale
        );
        ctx.restore();
        return true;
      }

      function drawSpriteGridFrame(sprite, colIndex, rowIndex, facing) {
        if (!sprite.ready) return false;
        const sourceFacesLeft = true;
        const flip = sourceFacesLeft && facing > 0 ? -1 : 1;
        const dx = -sprite.frameW * sprite.scale / 2;
        const dy = -sprite.frameH * sprite.scale + sprite.ground;
        ctx.save();
        ctx.scale(flip, 1);
        ctx.drawImage(
          sprite.image,
          colIndex * sprite.frameW,
          rowIndex * sprite.frameH,
          sprite.frameW,
          sprite.frameH,
          flip < 0 ? -dx - sprite.frameW * sprite.scale : dx,
          dy,
          sprite.frameW * sprite.scale,
          sprite.frameH * sprite.scale
        );
        ctx.restore();
        return true;
      }

      function rng(seed) {
        let value = seed >>> 0;
        return () => {
          value += 0x6D2B79F5;
          let t = value;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      const random = rng(6222026);
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const cellKey = (cell) => cell.r + ',' + cell.c;
      const centerOf = (cell) => ({ x: cell.c * grid.tile + grid.tile / 2, y: cell.r * grid.tile + grid.tile / 2 });
      const cellOf = (x, y) => ({ c: clamp(Math.floor(x / grid.tile), 0, grid.cols - 1), r: clamp(Math.floor(y / grid.tile), 0, grid.rows - 1) });
      const isOpen = (cell) => state.maze[cell.r] && state.maze[cell.r][cell.c] === 1;
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

      function allMovingTrees() {
        return [...state.evilTrees, ...state.goodTrees];
      }

      function treeReservedCells(tree) {
        const cells = [tree.currentCell, tree.nextCell, cellOf(tree.x, tree.y)];
        if (tree.path && tree.path[0]) cells.push(cellOf(tree.path[0].x, tree.path[0].y));
        if (tree.patrolCells && Number.isInteger(tree.patrolIndex)) cells.push(tree.patrolCells[tree.patrolIndex]);
        return cells.filter(Boolean);
      }

      function treeOccupiesCell(tree, cell) {
        return treeReservedCells(tree).some((treeCell) => cellsMatch(treeCell, cell));
      }

      function treeBlocksActorCell(tree, cell) {
        const current = cellOf(tree.x, tree.y);
        if (cellsMatch(current, cell)) return true;
        if (!tree.path || !tree.path[0]) return false;
        const targetCell = cellOf(tree.path[0].x, tree.path[0].y);
        const distanceToTarget = dist({ x: tree.x, y: tree.y }, tree.path[0]);
        return distanceToTarget < grid.tile * 0.34 && cellsMatch(targetCell, cell);
      }

      function cellReservedByOtherTree(cell, tree) {
        return allMovingTrees().some((other) => other !== tree && treeOccupiesCell(other, cell));
      }

      function movingTreeOverlapCount() {
        const seen = new Set();
        let overlaps = 0;
        for (const tree of allMovingTrees()) {
          const uniqueCells = new Set(treeReservedCells(tree).map(cellKey));
          for (const key of uniqueCells) {
            if (seen.has(key)) overlaps += 1;
            else seen.add(key);
          }
        }
        return overlaps;
      }

      function longestMovingTreePatrol() {
        return allMovingTrees().reduce((longest, tree) => Math.max(longest, tree.patrolCells ? tree.patrolCells.length : 0), 0);
      }

      function movingTreeGateWindowCount() {
        return allMovingTrees().reduce((count, tree) => count + (tree.gateWindow ? 1 : 0), 0);
      }

      function evilTreeBlocksPlayer(cell, ignoredTree = null) {
        return state.evilTrees.some((tree) => tree !== ignoredTree && treeBlocksActorCell(tree, cell));
      }

      function goodTreeBlocksWitch(cell) {
        return state.goodTrees.some((tree) => treeBlocksActorCell(tree, cell));
      }

      function isOccupiedByEvilTree(cell) {
        return evilTreeBlocksPlayer(cell);
      }

      function isWavingTreePathCell(cell) {
        return state.maze[cell.r]
          && cell.c > 0
          && cell.r > 0
          && cell.c < grid.cols - 1
          && cell.r < grid.rows - 1
          && state.maze[cell.r][cell.c] === 0
          && isWavingTreeCell(cell.c, cell.r)
          && !isOccupiedByEvilTree(cell);
      }

      function leafTreePassActive(now) {
        return state.activeTreat === 'leaf' && now < state.activeUntil;
      }

      function isPlayerPassable(cell, now = performance.now()) {
        if (evilTreeBlocksPlayer(cell)) return false;
        return isPlayerTerrainPassable(cell, now);
      }

      function isPlayerTerrainPassable(cell, now = performance.now()) {
        return isOpen(cell) || (leafTreePassActive(now) && isWavingTreePathCell(cell));
      }

      function isPlayerPushTargetPassable(cell, now = performance.now(), ignoredTree = null) {
        return isPlayerTerrainPassable(cell, now) && !evilTreeBlocksPlayer(cell, ignoredTree);
      }

      function isWitchPassable(cell) {
        return isOpen(cell) && !goodTreeBlocksWitch(cell);
      }

      function movingTreeBlocksFrog(cell) {
        return allMovingTrees().some((tree) => treeBlocksActorCell(tree, cell));
      }

      function isFrogPassable(cell) {
        return isOpen(cell) && !movingTreeBlocksFrog(cell);
      }

      function clampCamera() {
        const halfW = state.vw / (2 * state.zoom);
        const halfH = state.vh / (2 * state.zoom);
        state.camera.x = world.w <= halfW * 2 ? world.w / 2 : clamp(state.camera.x, halfW, world.w - halfW);
        state.camera.y = world.h <= halfH * 2 ? world.h / 2 : clamp(state.camera.y, halfH, world.h - halfH);
      }

      function worldToScreen(x, y) {
        return {
          x: (x - state.camera.x) * state.zoom + state.vw / 2,
          y: (y - state.camera.y) * state.zoom + state.vh / 2
        };
      }

      function screenToWorldPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: state.camera.x + (clientX - rect.left - state.vw / 2) / state.zoom,
          y: state.camera.y + (clientY - rect.top - state.vh / 2) / state.zoom
        };
      }

      function setZoom(nextZoom, clientX = state.vw / 2, clientY = state.vh / 2) {
        const before = screenToWorldPoint(clientX, clientY);
        state.zoom = clamp(nextZoom, state.minZoom, state.maxZoom);
        const after = screenToWorldPoint(clientX, clientY);
        state.camera.x += before.x - after.x;
        state.camera.y += before.y - after.y;
        clampCamera();
        updateHud();
      }

      function shuffle(list) {
        for (let i = list.length - 1; i > 0; i -= 1) {
          const j = Math.floor(random() * (i + 1));
          [list[i], list[j]] = [list[j], list[i]];
        }
        return list;
      }

      function generateMaze() {
        const config = configForLevel(state.level);
        state.maze = Array.from({ length: grid.rows }, () => Array.from({ length: grid.cols }, () => 0));
        const carve = (c, r) => {
          state.maze[r][c] = 1;
          for (const dir of shuffle([...dirs])) {
            const nc = c + dir.dc * 2;
            const nr = r + dir.dr * 2;
            if (nr <= 0 || nr >= grid.rows - 1 || nc <= 0 || nc >= grid.cols - 1 || state.maze[nr][nc]) continue;
            state.maze[r + dir.dr][c + dir.dc] = 1;
            carve(nc, nr);
          }
        };
        carve(startCell.c, startCell.r);
        state.maze[exitCell.r][exitCell.c] = 1;
        state.maze[witchStartCell.r][witchStartCell.c] = 1;
        state.maze[secondWitchStartCell.r][secondWitchStartCell.c] = 1;

        for (let i = 0; i < config.mazeOpenings; i += 1) {
          const c = 2 + Math.floor(random() * (grid.cols - 4));
          const r = 2 + Math.floor(random() * (grid.rows - 4));
          if (state.maze[r][c] === 0) {
            const horizontal = state.maze[r][c - 1] && state.maze[r][c + 1];
            const vertical = state.maze[r - 1][c] && state.maze[r + 1][c];
            if (horizontal || vertical || random() < 0.12) state.maze[r][c] = 1;
          }
        }
      }

      function openCells() {
        const cells = [];
        for (let r = 1; r < grid.rows - 1; r += 1) {
          for (let c = 1; c < grid.cols - 1; c += 1) {
            if (state.maze[r][c] === 1) cells.push({ c, r });
          }
        }
        return cells;
      }

      function findPath(from, to, passable = isOpen) {
        if (!passable(from) || !passable(to)) return [];
        const queue = [from];
        const seen = new Set([cellKey(from)]);
        const prev = new Map();
        while (queue.length) {
          const cur = queue.shift();
          if (cur.c === to.c && cur.r === to.r) {
            const path = [cur];
            let k = cellKey(cur);
            while (prev.has(k)) {
              const p = prev.get(k);
              path.push(p);
              k = cellKey(p);
            }
            return path.reverse();
          }
          for (const dir of dirs) {
            const next = { c: cur.c + dir.dc, r: cur.r + dir.dr };
            const k = cellKey(next);
            if (seen.has(k) || !passable(next)) continue;
            seen.add(k);
            prev.set(k, cur);
            queue.push(next);
          }
        }
        return [];
      }

      function nearestPassableCell(x, y, passable = isOpen) {
        const start = cellOf(x, y);
        if (passable(start)) return start;
        const queue = [start];
        const seen = new Set([cellKey(start)]);
        while (queue.length) {
          const cur = queue.shift();
          for (const dir of dirs) {
            const next = { c: cur.c + dir.dc, r: cur.r + dir.dr };
            const k = cellKey(next);
            if (next.c < 0 || next.r < 0 || next.c >= grid.cols || next.r >= grid.rows || seen.has(k)) continue;
            if (passable(next)) return next;
            seen.add(k);
            queue.push(next);
          }
        }
        return startCell;
      }

      function nearestOpenCell(x, y) {
        return nearestPassableCell(x, y, isOpen);
      }

      function directionalNeighbor(pos, current, passable = isOpen) {
        const origin = centerOf(current);
        const dx = pos.x - origin.x;
        const dy = pos.y - origin.y;
        const options = dirs
          .map((dir) => ({ cell: { c: current.c + dir.dc, r: current.r + dir.dr }, score: dx * dir.dc + dy * dir.dr }))
          .filter((option) => option.score > 0 && passable(option.cell))
          .sort((a, b) => b.score - a.score);
        if (options.length) return options[0].cell;
        return dirs.map((dir) => ({ c: current.c + dir.dc, r: current.r + dir.dr })).find(passable) || null;
      }

      function chooseFarCell(cells, reference, minDistance) {
        const filtered = cells.filter((cell) => Math.abs(cell.c - reference.c) + Math.abs(cell.r - reference.r) > minDistance);
        return filtered[Math.floor(random() * filtered.length)] || cells[Math.floor(random() * cells.length)];
      }

      function placeTreats() {
        const config = configForLevel(state.level);
        state.treats = [];
        state.crumbs = [];
        const cells = openCells().filter((cell) => {
          const key = cellKey(cell);
          return key !== cellKey(startCell) && key !== cellKey(exitCell) && key !== cellKey(witchStartCell) && key !== cellKey(secondWitchStartCell);
        });
        const treatTypes = ['speed', 'shield', 'freeze', 'spark', 'stink', 'leaf'];
        for (let i = 0; i < config.treats; i += 1) {
          const cell = chooseFarCell(cells, startCell, 8);
          const p = centerOf(cell);
          state.treats.push({ ...p, cell, type: treatTypes[i % treatTypes.length], taken: false, pulse: random() * 6.28 });
        }
        const extraStinkTreats = Math.max(18, Math.round(config.treats * 1.35));
        for (let i = 0; i < extraStinkTreats; i += 1) {
          const cell = chooseFarCell(cells, startCell, 6);
          const p = centerOf(cell);
          state.treats.push({ ...p, cell, type: 'stink', taken: false, pulse: random() * 6.28 });
        }
        for (let i = 0; i < config.crumbs; i += 1) {
          const cell = cells[Math.floor(random() * cells.length)];
          const p = centerOf(cell);
          state.crumbs.push({ x: p.x, y: p.y, taken: false });
        }
      }

      function resize() {
        state.dpr = Math.min(2.5, window.devicePixelRatio || 1);
        state.vw = window.innerWidth;
        state.vh = window.innerHeight;
        canvas.width = Math.floor(state.vw * state.dpr);
        canvas.height = Math.floor(state.vh * state.dpr);
        canvas.style.width = state.vw + 'px';
        canvas.style.height = state.vh + 'px';
        clampCamera();
      }

      function setDestination(clientX, clientY) {
        if (state.over || state.won) {
          reset();
          return;
        }
        const now = performance.now();
        const pos = screenToWorldPoint(clientX, clientY);
        const current = cellOf(state.player.x, state.player.y);
        const passable = (cell) => cellsMatch(cell, current) || isPlayerTerrainPassable(cell, now);
        const target = nearestPassableCell(pos.x, pos.y, passable);
        const path = findPath(current, target, passable);
        state.lastTarget = cellKey(target);
        state.lastPathLength = path.length;
        if (path.length > 1) {
          state.player.path = path.slice(1).map(centerOf);
          showMessage('Unicorn path set: ' + (path.length - 1) + ' steps.', 1200);
        } else {
          const next = directionalNeighbor(pos, current, passable);
          if (next) {
            state.player.path = [centerOf(next)];
            state.lastTarget = cellKey(next);
            state.lastPathLength = 2;
            showMessage('Unicorn steps toward the tap.', 900);
          } else {
            playSfx('blocked');
            showMessage('That part of the forest is blocked.', 1100);
          }
        }
      }

      function showMessage(text, ms) {
        state.messageText = text;
        state.messageUntil = performance.now() + ms;
      }

      function oppositeHeroForm(form) {
        return form === 'princess' ? 'unicorn' : 'princess';
      }

      function levelTransitionActive(now = performance.now()) {
        return Boolean(state.levelTransitionUntil && now < state.levelTransitionUntil);
      }

      function levelTransitionTravelPoints() {
        return {
          start: {
            x: clamp(state.vw * 0.82, 130, state.vw - 42),
            y: clamp(state.vh * 0.78, 130, state.vh - 42)
          },
          end: {
            x: clamp(state.vw * 0.22, 48, state.vw - 130),
            y: clamp(state.vh * 0.23, 70, state.vh - 130)
          }
        };
      }

      function clearHeroMorph() {
        state.morphFrom = null;
        state.morphTo = null;
        state.morphStartedAt = 0;
        state.morphUntil = 0;
        state.morphTravel = null;
      }

      function startHeroMorph(from, to, duration = 3200, options = {}) {
        if (!from || !to || from === to) {
          clearHeroMorph();
          return;
        }
        const now = performance.now();
        state.morphFrom = from;
        state.morphTo = to;
        state.morphDuration = duration;
        state.morphStartedAt = now;
        state.morphUntil = now + duration;
        state.transformUntil = state.morphUntil;
        state.morphTravel = options.travel ? {
          ...levelTransitionTravelPoints(),
          facing: options.facing || -1
        } : null;
        state.levelTransitionUntil = options.travel ? state.morphUntil : state.levelTransitionUntil;
      }

      function startLevelTravelMorph(from, to) {
        startHeroMorph(from, to, levelTransitionMorphDuration, { travel: true, facing: -1 });
      }

      function updateHud() {
        const config = configForLevel(state.level);
        const now = performance.now();
        const active = state.activeTreat && now < state.activeUntil ? state.activeTreat + ' ' + Math.ceil((state.activeUntil - now) / 1000) + 's' : 'none';
        canvas.dataset.playerCell = cellKey(cellOf(state.player.x, state.player.y));
        canvas.dataset.level = String(state.level);
        canvas.dataset.levelTitle = config.title;
        canvas.dataset.levelDifficulty = config.difficulty;
        canvas.dataset.levelIntroVisible = String(Boolean(state.levelIntroUntil && now < state.levelIntroUntil));
        canvas.dataset.witchCell = cellKey(cellOf(state.witch.x, state.witch.y));
        canvas.dataset.witch2Cell = state.witch2.active ? cellKey(cellOf(state.witch2.x, state.witch2.y)) : 'inactive';
        canvas.dataset.objective = movingFrogObjectiveActive() ? 'frog' : 'exit';
        canvas.dataset.objectiveCell = cellKey(currentObjectiveCell());
        canvas.dataset.frogActive = String(movingFrogObjectiveActive());
        canvas.dataset.frogCell = movingFrogObjectiveActive() ? cellKey(cellOf(state.frog.x, state.frog.y)) : 'inactive';
        canvas.dataset.frogPath = String(state.frog.path.length);
        canvas.dataset.frogProximity = frogProximityProgress().toFixed(3);
        canvas.dataset.frogDistance = movingFrogObjectiveActive()
          ? String(Math.round(Math.hypot(state.player.x - state.frog.x, state.player.y - state.frog.y)))
          : '0';
        canvas.dataset.score = String(state.score);
        canvas.dataset.lives = String(state.lives);
        canvas.dataset.treat = active;
        canvas.dataset.stinkTreats = String(state.treats.filter((item) => !item.taken && item.type === 'stink').length);
        canvas.dataset.leafTreats = String(state.treats.filter((item) => !item.taken && item.type === 'leaf').length);
        canvas.dataset.best = String(state.best);
        canvas.dataset.assetVersion = assetVersion;
        canvas.dataset.assetPhase = state.assetPhase;
        canvas.dataset.assetTotal = String(assetStats.total);
        canvas.dataset.assetRequested = String(assetStats.requested);
        canvas.dataset.assetDecoded = String(assetStats.decoded);
        canvas.dataset.assetFailed = String(assetStats.failed);
        canvas.dataset.assetWebp = String(assetStats.webp);
        canvas.dataset.assetPngFallback = String(assetStats.pngFallback);
        canvas.dataset.allSpritesReady = String(allSpritesReady());
        canvas.dataset.currentSprites = currentSpriteSetReady() ? 'ready' : failedSprites().length ? 'failed' : 'loading';
        canvas.dataset.sprites = characterSprites.unicorn.ready && characterSprites.princess.ready && characterSprites.morph.ready && characterSprites.witch.ready && characterSprites.witch2.ready ? 'ready' : 'loading';
        canvas.dataset.playerForm = state.playerForm;
        canvas.dataset.morphSprite = characterSprites.morph.ready ? 'ready' : characterSprites.morph.failed ? 'failed' : 'loading';
        canvas.dataset.morphActive = String(Boolean(state.morphUntil && now < state.morphUntil));
        canvas.dataset.morphFrom = state.morphFrom || 'none';
        canvas.dataset.morphTo = state.morphTo || 'none';
        canvas.dataset.morphDuration = String(state.morphDuration);
        canvas.dataset.morphWalkSprite = characterSprites.morphWalk.ready ? 'ready' : characterSprites.morphWalk.failed ? 'failed' : 'loading';
        canvas.dataset.levelTransition = String(levelTransitionActive(now));
        canvas.dataset.morphTravel = String(Boolean(state.morphTravel));
        canvas.dataset.princessSprite = characterSprites.princess.ready ? 'ready' : characterSprites.princess.failed ? 'failed' : 'loading';
        canvas.dataset.treeSprites = scenerySprites.wavingTree.ready ? 'ready' : scenerySprites.wavingTree.failed ? 'failed' : 'loading';
        canvas.dataset.evilTreeSprites = scenerySprites.evilTree.ready ? 'ready' : scenerySprites.evilTree.failed ? 'failed' : 'loading';
        canvas.dataset.goodTreeSprites = scenerySprites.goodTree.ready ? 'ready' : scenerySprites.goodTree.failed ? 'failed' : 'loading';
        canvas.dataset.frogSprites = scenerySprites.frog.ready ? 'ready' : scenerySprites.frog.failed ? 'failed' : 'loading';
        canvas.dataset.frogWalkSprite = scenerySprites.frogWalk.ready ? 'ready' : scenerySprites.frogWalk.failed ? 'failed' : 'loading';
        canvas.dataset.evilTrees = String(state.evilTrees.length);
        canvas.dataset.goodTrees = String(state.goodTrees.length);
        canvas.dataset.treeOverlaps = String(movingTreeOverlapCount());
        canvas.dataset.treeGateWindows = String(movingTreeGateWindowCount());
        canvas.dataset.longestTreePatrol = String(longestMovingTreePatrol());
        canvas.dataset.gateWait = state.lastGateWait || 'none';
        canvas.dataset.evilTreeEvents = String(state.evilTreeEventCount);
        canvas.dataset.evilTreeChanges = String(state.evilTreeChanges);
        canvas.dataset.evilTreeSwitches = String(state.evilTreeSwitches);
        canvas.dataset.evilTreeArchChanges = String(state.evilTreeArchChanges);
        canvas.dataset.lastEvilTreeArch = state.lastEvilTreeArch;
        canvas.dataset.lastEvilTreeRouteDelta = String(state.lastEvilTreeRouteDelta);
        canvas.dataset.evilTreeWaveTarget = String(state.evilTreeWaveTarget);
        canvas.dataset.evilTreeWaveRemaining = String(state.evilTreeWaveRemaining);
        canvas.dataset.nextEvilTreeWalker = state.nextEvilTreeWalkerAt ? Math.max(0, Math.ceil((state.nextEvilTreeWalkerAt - now) / 1000)) + 's' : 'none';
        canvas.dataset.mazeRevision = String(state.mazeRevision);
        canvas.dataset.nextEvilTree = state.nextEvilTreeAt ? Math.max(0, Math.ceil((state.nextEvilTreeAt - now) / 1000)) + 's' : 'none';
        canvas.dataset.stenchBubbles = String(state.stenchTrail.length);
        canvas.dataset.stenchFogs = String(state.stenchFogs.length);
        canvas.dataset.crushBursts = String(state.crushBursts.length);
        canvas.dataset.witchSlowed = String(performance.now() < state.witch.stenchUntil || performance.now() < state.witch2.stenchUntil);
        canvas.dataset.witchesPassable = String(mushroomPassThroughActive(now));
        canvas.dataset.leafTreePass = String(leafTreePassActive(now));
        canvas.dataset.lastInput = state.lastInput || 'none';
        canvas.dataset.lastTarget = state.lastTarget || 'none';
        canvas.dataset.lastPathLength = String(state.lastPathLength || 0);
        canvas.dataset.playerPath = String(state.player.path.length);
        canvas.dataset.zoom = state.zoom.toFixed(2);
        canvas.dataset.won = String(state.won);
        canvas.dataset.over = String(state.over);
        canvas.dataset.treePushes = String(state.treePushes);
        canvas.dataset.treeCrushes = String(state.treeCrushes);
        canvas.dataset.lastTreeCollision = state.lastTreeCollision;
        canvas.dataset.music = musicStatus();
        canvas.dataset.musicChunk = String(currentMusicIndex + 1);
        canvas.dataset.musicNextChunk = 'random';
        canvas.dataset.musicChunks = String(musicVariants.length);
        canvas.dataset.musicSrc = musicSrc();
        canvas.dataset.sfxPlays = String(state.sfxPlays);
        canvas.dataset.lastSfx = state.lastSfx;
      }

      function chooseFrogStartCell() {
        const route = findPath(startCell, exitCell);
        if (route.length) {
          return route[Math.max(0, Math.min(route.length - 1, Math.floor(route.length * 0.82)))];
        }
        return exitCell;
      }

      function setupFrogObjective() {
        const config = configForLevel(state.level);
        const active = state.level >= 3;
        const cell = active ? chooseFrogStartCell() : exitCell;
        const p = centerOf(cell);
        state.frog.x = p.x;
        state.frog.y = p.y;
        state.frog.path = [];
        state.frog.step = 0;
        state.frog.wait = active ? 900 + random() * 900 : 0;
        state.frog.facing = -1;
        state.frog.speed = Number(config.frogSpeed || 112);
        state.frog.active = active;
        state.frog.targetCell = active ? cell : null;
      }

      function chooseFrogRoamPath(now) {
        const current = cellOf(state.frog.x, state.frog.y);
        const passable = (cell) => cellsMatch(cell, current) || isFrogPassable(cell);
        const maxSteps = 5 + Math.min(5, state.level);
        const minSteps = 2;
        const cells = shuffle(openCells().filter((cell) => {
          const distance = cellDistance(current, cell);
          return distance >= minSteps
            && distance <= maxSteps
            && cellDistance(startCell, cell) > 5
            && !cellsMatch(cell, current)
            && !cellsMatch(cell, witchStartCell)
            && !cellsMatch(cell, secondWitchStartCell)
            && !movingTreeBlocksFrog(cell);
        }));
        for (const cell of cells.slice(0, 24)) {
          const path = findPath(current, cell, passable);
          if (path.length > 1 && path.length <= maxSteps + 4) return path.slice(1).map(centerOf);
        }
        return [];
      }

      function updateFrog(dt, now) {
        if (!movingFrogObjectiveActive() || state.over || state.won || levelTransitionActive(now)) return;
        const current = cellOf(state.frog.x, state.frog.y);
        const passable = (cell) => cellsMatch(cell, current) || isFrogPassable(cell);
        if (state.frog.path.length && !pathPointsAreOpen(state.frog.path, passable)) {
          state.frog.path = [];
          state.frog.wait = 420;
        }
        if (!state.frog.path.length) {
          state.frog.wait = Math.max(0, state.frog.wait - dt * 1000);
          state.frog.step += dt * 1.25;
          if (state.frog.wait <= 0) {
            const path = chooseFrogRoamPath(now);
            if (path.length) {
              state.frog.path = path;
              state.frog.targetCell = cellOf(path[path.length - 1].x, path[path.length - 1].y);
            }
            state.frog.wait = 850 + random() * 900;
          }
          return;
        }
        moveAlongPath(state.frog, state.frog.speed, dt);
      }

      function resetPositions() {
        const config = configForLevel(state.level);
        const now = performance.now();
        const witchDelay = Math.max(0, Number(config.witchStartDelay || 0)) * 1000;
        const w = centerOf(witchStartCell);
        const w2 = centerOf(secondWitchStartCell);
        resetPlayerToStart(false);
        state.player.speed = config.playerSpeed;
        state.witch.x = w.x;
        state.witch.y = w.y;
        state.witch.path = [];
        state.witch.speed = config.witchSpeed;
        state.witch.repath = 0;
        state.witch.frozenUntil = now + witchDelay;
        state.witch.stenchUntil = 0;
        state.witch.facing = -1;
        state.witch2.x = w2.x;
        state.witch2.y = w2.y;
        state.witch2.path = [];
        state.witch2.speed = config.witch2Speed || config.witchSpeed;
        state.witch2.step = 0;
        state.witch2.repath = 0;
        state.witch2.frozenUntil = now + witchDelay;
        state.witch2.stenchUntil = 0;
        state.witch2.facing = 1;
        state.witch2.active = config.witchCount > 1;
        setupFrogObjective();
        state.camera.x = state.player.x;
        state.camera.y = state.player.y;
        clampCamera();
      }

      function startLevel(level, transitionFrom = null) {
        state.level = boundedLevel(level);
        const config = configForLevel(state.level);
        state.playerForm = config.playerForm;
        generateMaze();
        placeTreats();
        resetPositions();
        state.activeTreat = null;
        state.activeUntil = 0;
        state.shieldUntil = 0;
        state.witch.stenchUntil = 0;
        state.witch2.stenchUntil = 0;
        state.stenchUntil = 0;
        state.stenchEmit = 0;
        state.stenchTrail = [];
        state.stenchFogs = [];
        state.crushBursts = [];
        state.evilTrees = [];
        state.goodTrees = [];
        state.nextEvilTreeAt = 0;
        state.evilTreeEventCount = 0;
        state.evilTreeChanges = 0;
        state.evilTreeSwitches = 0;
        state.evilTreeArchChanges = 0;
        state.lastEvilTreeArch = 'none';
        state.lastEvilTreeRouteDelta = 0;
        state.evilTreeWaveTarget = 0;
        state.evilTreeWaveRemaining = 0;
        state.nextEvilTreeWalkerAt = 0;
        state.mazeRevision = 0;
        state.transformUntil = 0;
        state.levelTransitionUntil = 0;
        clearHeroMorph();
        state.lastGateWait = 'none';
        state.treePushes = 0;
        state.treeCrushes = 0;
        state.lastTreeCollision = 'none';
        setupTreePatrols();
        setupTreePushTest();
        state.won = false;
        state.over = false;
        state.last = performance.now();
        state.levelStartedAt = performance.now();
        state.levelIntroUntil = state.levelStartedAt + 10000;
        state.messageText = config.title + ': ' + config.difficulty;
        if (transitionFrom && transitionFrom !== config.playerForm) {
          startLevelTravelMorph(transitionFrom, config.playerForm);
        } else if (morphTestMode === 'forward') {
          state.playerForm = 'princess';
          startLevelTravelMorph('unicorn', 'princess');
        } else if (morphTestMode === 'reverse') {
          state.playerForm = 'unicorn';
          startLevelTravelMorph('princess', 'unicorn');
        }
        showMessage(config.title + '. ' + config.subtitle, 2600);
        if (leafTreeTestMode) {
          state.activeTreat = 'leaf';
          state.activeUntil = performance.now() + 60000;
          showMessage('Green leaf test: waving trees are paths.', 2200);
        }
        if (frogTestMode) {
          const focus = movingFrogObjectiveActive() ? { x: state.frog.x, y: state.frog.y } : centerOf(exitCell);
          state.camera.x = focus.x;
          state.camera.y = focus.y;
          clampCamera();
          showMessage('Frog walk sprite test.', 1800);
        }
        updateHud();
      }

      function reset() {
        state.score = 0;
        state.lives = 3;
        startLevel(defaultStartLevel);
      }

      function currentPlayerSpeed(now) {
        return state.activeTreat === 'speed' && now < state.activeUntil ? 405 : state.player.speed;
      }

      function mushroomPassThroughActive(now) {
        return state.activeTreat === 'freeze' && now < state.activeUntil;
      }

      function clearInvalidPlayerPath(now) {
        const current = cellOf(state.player.x, state.player.y);
        const passable = (cell) => cellsMatch(cell, current) || isPlayerTerrainPassable(cell, now);
        if (!passable(current) && isWavingTreePathCell(current)) {
          const escape = nearestOpenCell(state.player.x, state.player.y);
          state.player.path = [centerOf(escape)];
          state.lastTarget = cellKey(escape);
          state.lastPathLength = 2;
          return;
        }
        if (!state.player.path.length || pathPointsAreOpen(state.player.path, passable)) return;
        const target = parseCellKey(state.lastTarget);
        if (target && passable(target)) {
          const path = findPath(current, target, passable);
          state.player.path = path.length > 1 ? path.slice(1).map(centerOf) : [];
          state.lastPathLength = path.length;
        } else {
          state.player.path = [];
          state.lastPathLength = 0;
        }
      }

      function moveAlongPath(actor, speed, dt) {
        if (!actor.path.length) return;
        const target = actor.path[0];
        const dx = target.x - actor.x;
        const dy = target.y - actor.y;
        const d = Math.hypot(dx, dy);
        if (d < 3) {
          actor.x = target.x;
          actor.y = target.y;
          actor.path.shift();
          return;
        }
        const step = Math.min(speed * dt, d);
        actor.angle = Math.atan2(dy, dx);
        if (actor.facing !== undefined && Math.abs(dx) > 1) actor.facing = dx < 0 ? -1 : 1;
        actor.step += dt * 8;
        actor.x += (dx / d) * step;
        actor.y += (dy / d) * step;
      }

      function movePlayerAlongPath(dt, now) {
        if (!state.player.path.length) return;
        const nextCell = cellOf(state.player.path[0].x, state.player.path[0].y);
        if (evilTreeBlocksPlayer(nextCell)) {
          state.player.step += dt * 2;
          state.lastGateWait = cellKey(nextCell);
          return;
        }
        state.lastGateWait = 'none';
        moveAlongPath(state.player, currentPlayerSpeed(now), dt);
      }

      function resetPlayerToStart(keepCamera = false) {
        const p = centerOf(startCell);
        state.player.x = p.x;
        state.player.y = p.y;
        state.player.path = [];
        state.player.step = 0;
        state.player.facing = 1;
        state.lastTarget = 'none';
        state.lastPathLength = 0;
        if (!keepCamera) {
          state.camera.x = state.player.x;
          state.camera.y = state.player.y;
          clampCamera();
        }
      }

      function addCrushBurst(x, y, now) {
        const spots = Array.from({ length: 16 }, (_, index) => {
          const angle = index / 16 * Math.PI * 2 + random() * 0.45;
          return {
            angle,
            distance: 10 + random() * 38,
            radius: 4 + random() * 12,
            stretch: 0.7 + random() * 1.4,
            phase: random() * Math.PI * 2
          };
        });
        state.crushBursts.push({ x, y, born: now, life: 950, spots });
      }

      function crushPlayerByTree(tree, blockedCell, now) {
        const impact = centerOf(blockedCell || cellOf(state.player.x, state.player.y));
        addCrushBurst(impact.x, impact.y, now);
        state.treeCrushes += 1;
        state.lastTreeCollision = 'crushed:' + cellKey(blockedCell || cellOf(state.player.x, state.player.y));
        state.player.path = [];
        state.lives -= 1;
        resetPlayerToStart(true);
        for (const witch of activeWitches()) {
          witch.path = [];
          witch.repath = 0;
        }
        if (state.lives <= 0) {
          state.over = true;
          playSfx('treeCrush');
          showMessage('The evil tree crushed the unicorn. Tap to restart.', 5000);
        } else {
          playSfx('treeCrush');
          showMessage('Crushed by an evil tree. Respawned at A.', 1900);
        }
        updateHud();
      }

      function treeTravelInfo(tree) {
        if (!tree.path.length) return null;
        const from = cellOf(tree.x, tree.y);
        const targetPoint = tree.path[0];
        const to = tree.nextCell || cellOf(targetPoint.x, targetPoint.y);
        const dc = Math.sign(to.c - from.c);
        const dr = Math.sign(to.r - from.r);
        if (!dc && !dr) return null;
        return { from, to, dc, dr };
      }

      function resolveEvilTreePlayerPush(tree, now) {
        if (tree.kind !== 'evil' || !tree.path.length) return true;
        const travel = treeTravelInfo(tree);
        if (!travel) return true;
        const playerCell = cellOf(state.player.x, state.player.y);
        if (!cellsMatch(playerCell, travel.to) && !cellsMatch(playerCell, travel.from)) return true;
        const pushCell = { c: playerCell.c + travel.dc, r: playerCell.r + travel.dr };
        state.player.path = [];
        state.treePushes += 1;
        if (!isPlayerPushTargetPassable(pushCell, now, tree)) {
          crushPlayerByTree(tree, pushCell, now);
          return true;
        }
        const p = centerOf(pushCell);
        state.player.x = p.x;
        state.player.y = p.y;
        state.player.facing = travel.dc < 0 ? -1 : travel.dc > 0 ? 1 : state.player.facing;
        state.player.step += 0.9;
        state.lastTreeCollision = 'pushed:' + cellKey(playerCell) + '->' + cellKey(pushCell);
        state.lastGateWait = cellKey(travel.to);
        playSfx('treePush');
        updateHud();
        return true;
      }

      function activeWitches() {
        return state.witch2.active ? [state.witch, state.witch2] : [state.witch];
      }

      function movingFrogObjectiveActive() {
        return state.level >= 3 && state.frog.active;
      }

      function currentObjectivePoint() {
        return movingFrogObjectiveActive()
          ? { x: state.frog.x, y: state.frog.y }
          : centerOf(exitCell);
      }

      function currentObjectiveCell() {
        return movingFrogObjectiveActive() ? cellOf(state.frog.x, state.frog.y) : exitCell;
      }

      function frogCatchDistance() {
        return movingFrogObjectiveActive() ? grid.tile * 0.62 : 38;
      }

      function frogProximityProgress() {
        if (!movingFrogObjectiveActive()) return 0;
        const distance = Math.hypot(state.player.x - state.frog.x, state.player.y - state.frog.y);
        const far = grid.tile * 11.5;
        const near = frogCatchDistance();
        return clamp(1 - (distance - near) / Math.max(1, far - near), 0, 1);
      }

      function cellsMatch(a, b) {
        return a && b && a.c === b.c && a.r === b.r;
      }

      function cellDistance(a, b) {
        return Math.abs(a.c - b.c) + Math.abs(a.r - b.r);
      }

      function editableMazeCell(cell) {
        return cell.c > 0 && cell.r > 0 && cell.c < grid.cols - 1 && cell.r < grid.rows - 1;
      }

      function parseCellKey(key) {
        if (!key || typeof key !== 'string' || !key.includes(',')) return null;
        const parts = key.split(',').map(Number);
        if (parts.length !== 2 || parts.some((part) => !Number.isFinite(part))) return null;
        return { r: parts[0], c: parts[1] };
      }

      function protectedMazeCells() {
        return [
          startCell,
          exitCell,
          witchStartCell,
          secondWitchStartCell,
          cellOf(state.player.x, state.player.y),
          movingFrogObjectiveActive() ? cellOf(state.frog.x, state.frog.y) : null,
          ...activeWitches().map((witch) => cellOf(witch.x, witch.y)),
          ...allMovingTrees().flatMap((tree) => treeReservedCells(tree))
        ].filter(Boolean);
      }

      function isProtectedMazeCell(cell, radius = 0) {
        return protectedMazeCells().some((protectedCell) => cellDistance(cell, protectedCell) <= radius);
      }

      function pathPointsAreOpen(path, passable = isOpen) {
        return path.every((point) => passable(cellOf(point.x, point.y)));
      }

      function openNeighborCount(cell) {
        return dirs.reduce((count, dir) => count + (isOpen({ c: cell.c + dir.dc, r: cell.r + dir.dr }) ? 1 : 0), 0);
      }

      function hasPlayableRoutes() {
        const playerCell = cellOf(state.player.x, state.player.y);
        if (!isOpen(playerCell) || !findPath(playerCell, currentObjectiveCell()).length) return false;
        return activeWitches().every((witch) => {
          const witchCell = cellOf(witch.x, witch.y);
          return isOpen(witchCell) && findPath(witchCell, playerCell).length > 0;
        });
      }

      function refreshActorPathsAfterMazeChange() {
        const now = performance.now();
        const playerPassable = (cell) => isPlayerPassable(cell, now);
        if (state.player.path.length && !pathPointsAreOpen(state.player.path, playerPassable)) {
          const target = parseCellKey(state.lastTarget);
          const current = cellOf(state.player.x, state.player.y);
          if (target && playerPassable(target)) {
            const path = findPath(current, target, playerPassable);
            state.player.path = path.length > 1 ? path.slice(1).map(centerOf) : [];
            state.lastPathLength = path.length;
          } else {
            state.player.path = [];
            state.lastPathLength = 0;
          }
        }
        for (const witch of activeWitches()) {
          witch.path = [];
          witch.repath = 0;
        }
        if (state.frog.active) {
          state.frog.path = [];
          state.frog.wait = 380;
        }
      }

      function isTreePatrolSafeCell(cell) {
        if (!isOpen(cell)) return false;
        const protectedCells = [startCell, exitCell, witchStartCell, secondWitchStartCell];
        return protectedCells.every((protectedCell) => cellDistance(cell, protectedCell) > 3);
      }

      function collectRouteHorizontalRuns(route, minLength) {
        const runs = [];
        let run = [];
        const flush = () => {
          if (run.length >= minLength) runs.push(run);
          run = [];
        };
        for (let i = 0; i < route.length; i += 1) {
          const cell = route[i];
          const previous = run[run.length - 1];
          if (!previous || (cell.r === previous.r && Math.abs(cell.c - previous.c) === 1)) {
            run.push(cell);
          } else {
            flush();
            run.push(cell);
          }
        }
        flush();
        return runs;
      }

      function collectOpenHorizontalRuns(minLength) {
        const runs = [];
        for (let r = 1; r < grid.rows - 1; r += 1) {
          let run = [];
          const flush = () => {
            if (run.length >= minLength) runs.push(run);
            run = [];
          };
          for (let c = 1; c < grid.cols - 1; c += 1) {
            const cell = { c, r };
            if (isTreePatrolSafeCell(cell)) {
              run.push(cell);
            } else {
              flush();
            }
          }
          flush();
        }
        return runs;
      }

      function verticalCrossingScore(cells) {
        return cells.reduce((score, cell) => {
          const up = { c: cell.c, r: cell.r - 1 };
          const down = { c: cell.c, r: cell.r + 1 };
          return score + (isOpen(up) ? 1 : 0) + (isOpen(down) ? 1 : 0);
        }, 0);
      }

      function routeGateMetrics(cells, routeSet) {
        if (!routeSet) {
          return {
            direct: 0,
            adjacent: 0,
            offRoute: cells.length,
            endpointOffRoute: 0,
            sideRoom: 0,
            sideGate: false,
            hasWindow: false,
            followsRoutePenalty: 0,
            noGatePenalty: 0
          };
        }
        const directIndices = [];
        let adjacent = 0;
        for (let i = 0; i < cells.length; i += 1) {
          const cell = cells[i];
          if (routeSet.has(cellKey(cell))) {
            directIndices.push(i);
          } else if (dirs.some((dir) => routeSet.has(cellKey({ c: cell.c + dir.dc, r: cell.r + dir.dr })))) {
            adjacent += 1;
          }
        }
        const direct = directIndices.length;
        const offRoute = cells.length - direct;
        const endpointOffRoute = (routeSet.has(cellKey(cells[0])) ? 0 : 1)
          + (routeSet.has(cellKey(cells[cells.length - 1])) ? 0 : 1);
        const leadingRoom = direct ? directIndices[0] : 0;
        const trailingRoom = direct ? cells.length - 1 - directIndices[directIndices.length - 1] : 0;
        const sideRoom = Math.max(leadingRoom, trailingRoom);
        const maxRouteCells = Math.max(2, Math.floor(cells.length * 0.45));
        const sideGate = direct > 0
          && offRoute >= 2
          && sideRoom >= 2
          && direct <= Math.max(2, Math.floor(cells.length * 0.55));
        const hasWindow = direct > 0 && cells.length >= 3;
        return {
          direct,
          adjacent,
          offRoute,
          endpointOffRoute,
          sideRoom,
          sideGate,
          hasWindow,
          followsRoutePenalty: Math.max(0, direct - maxRouteCells) * 3.4,
          noGatePenalty: direct ? (hasWindow ? 0 : 7.5) : 13
        };
      }

      function localChokeScore(cells) {
        return cells.reduce((score, cell) => {
          const neighbors = openNeighborCount(cell);
          const vertical = (isOpen({ c: cell.c, r: cell.r - 1 }) ? 1 : 0) + (isOpen({ c: cell.c, r: cell.r + 1 }) ? 1 : 0);
          return score + (neighbors <= 2 ? 1.2 : 0) + (vertical > 0 ? 0.8 : 0);
        }, 0);
      }

      function patrolCandidateSlices(runs, anchor, minSpan, maxSpan, reserved, routeSet = null, fallbackPenalty = 0) {
        const candidates = [];
        for (const run of runs) {
          let segment = [];
          const flush = () => {
            if (segment.length < minSpan) {
              segment = [];
              return;
            }
            const maxWindowLength = Math.min(maxSpan, segment.length);
            for (let windowLength = minSpan; windowLength <= maxWindowLength; windowLength += 1) {
              for (let start = 0; start <= segment.length - windowLength; start += 1) {
                const cells = segment.slice(start, start + windowLength);
                const center = cells[Math.floor(cells.length / 2)];
                const crossings = verticalCrossingScore(cells);
                const gateMetrics = routeGateMetrics(cells, routeSet);
                const choke = localChokeScore(cells);
                const longPatrolPenalty = Math.max(0, cells.length - 7) * 0.48;
                candidates.push({
                  cells,
                  gateMetrics,
                  score: cellDistance(center, anchor)
                    + fallbackPenalty
                    + gateMetrics.noGatePenalty
                    + gateMetrics.followsRoutePenalty
                    + longPatrolPenalty
                    - cells.length * 0.24
                    - crossings * 0.34
                    - choke * 0.28
                    - gateMetrics.direct * 0.72
                    - gateMetrics.adjacent * 0.28
                    - gateMetrics.endpointOffRoute * 1.15
                    - gateMetrics.sideRoom * 0.42
                    - (gateMetrics.sideGate ? 8.5 : gateMetrics.hasWindow ? 3.5 : 0)
                });
              }
            }
            segment = [];
          };
          for (const cell of run) {
            if (reserved.has(cellKey(cell)) || !isTreePatrolSafeCell(cell)) {
              flush();
            } else {
              segment.push(cell);
            }
          }
          flush();
        }
        return candidates;
      }

      function combineRoutes(routes) {
        const seen = new Set();
        const combined = [];
        for (const route of routes) {
          for (const cell of route) {
            const key = cellKey(cell);
            if (seen.has(key)) continue;
            seen.add(key);
            combined.push(cell);
          }
        }
        return combined;
      }

      function orientPatrolCellsForGate(cells, routeSet) {
        if (!routeSet || !cells.length) return cells;
        const directIndices = cells
          .map((cell, index) => routeSet.has(cellKey(cell)) ? index : -1)
          .filter((index) => index >= 0);
        if (!directIndices.length) return cells;
        const leadingRoom = directIndices[0];
        const trailingRoom = cells.length - 1 - directIndices[directIndices.length - 1];
        if (leadingRoom >= trailingRoom) return cells;
        return [...cells].reverse();
      }

      function pickTreePatrolCells(routes, ratio, minSpan, maxSpan, reserved) {
        const routeList = routes.filter((route) => route && route.length);
        const combinedRoute = combineRoutes(routeList);
        if (!combinedRoute.length) return null;
        const anchor = combinedRoute[clamp(Math.floor((combinedRoute.length - 1) * ratio), 0, combinedRoute.length - 1)];
        const routeSet = new Set(combinedRoute.map(cellKey));
        const routeRuns = routeList.flatMap((route) => collectRouteHorizontalRuns(route, minSpan));
        const openRuns = collectOpenHorizontalRuns(minSpan);
        let candidates = patrolCandidateSlices(openRuns, anchor, minSpan, maxSpan, reserved, routeSet, 0);
        let gateCandidates = candidates.filter((candidate) => candidate.gateMetrics && candidate.gateMetrics.hasWindow);
        if (!candidates.length) {
          candidates = patrolCandidateSlices(routeRuns, anchor, minSpan, maxSpan, reserved, routeSet, 8);
          gateCandidates = candidates.filter((candidate) => candidate.gateMetrics && candidate.gateMetrics.hasWindow);
        }
        if (!candidates.length && minSpan > 5) {
          const shorterOpenRuns = collectOpenHorizontalRuns(5);
          candidates = patrolCandidateSlices(shorterOpenRuns, anchor, 5, Math.min(8, maxSpan), reserved, routeSet, 12);
          gateCandidates = candidates.filter((candidate) => candidate.gateMetrics && candidate.gateMetrics.hasWindow);
        }
        if (!candidates.length) return null;
        const pool = gateCandidates.length ? gateCandidates : candidates;
        pool.sort((a, b) => a.score - b.score);
        const best = pool[0];
        return {
          cells: orientPatrolCellsForGate(best.cells, routeSet),
          gateWindow: Boolean(best.gateMetrics && best.gateMetrics.hasWindow),
          gateMetrics: best.gateMetrics || null
        };
      }

      function makePatrolTree(kind, cells, index, gateWindow = false, gateMetrics = null) {
        const config = configForLevel(state.level);
        const p = centerOf(cells[0]);
        const next = cells[1] || cells[0];
        return {
          kind,
          id: kind + '-' + index,
          x: p.x,
          y: p.y,
          path: [],
          speed: kind === 'evil'
            ? (evilTreeTestMode ? 185 : config.evilTreeSpeed)
            : (evilTreeTestMode ? 170 : config.goodTreeSpeed),
          step: random() * 6,
          facing: next.c < cells[0].c ? -1 : 1,
          patrolCells: cells,
          patrolIndex: 0,
          patrolDir: 1,
          currentCell: cells[0],
          nextCell: null,
          wait: random() * 0.5,
          turns: 0,
          gateWindow,
          gateMetrics
        };
      }

      function reservePatrolCells(reserved, cells) {
        for (const cell of cells) reserved.add(cellKey(cell));
      }

      function setupTreePatrols() {
        const config = configForLevel(state.level);
        state.evilTrees = [];
        state.goodTrees = [];
        const route = findPath(startCell, exitCell);
        if (!route.length) return;
        const witchRoutes = [
          findPath(witchStartCell, startCell),
          config.witchCount > 1 ? findPath(secondWitchStartCell, startCell) : []
        ].filter((witchRoute) => witchRoute.length);
        const strategicRoutes = [route, ...witchRoutes];
        const reserved = new Set([cellKey(startCell), cellKey(exitCell), cellKey(witchStartCell), cellKey(secondWitchStartCell)]);
        if (movingFrogObjectiveActive()) reserved.add(cellKey(cellOf(state.frog.x, state.frog.y)));
        const minSpan = config.minSpan;
        const maxSpan = config.maxSpan;
        const addedByKind = { evil: 0, good: 0 };
        const addTree = (kind, ratio) => {
          const patrol = pickTreePatrolCells(strategicRoutes, ratio, minSpan, maxSpan, reserved);
          if (!patrol || !patrol.cells) return;
          const cells = patrol.cells;
          reservePatrolCells(reserved, cells);
          const tree = makePatrolTree(kind, cells, addedByKind[kind], patrol.gateWindow, patrol.gateMetrics);
          addedByKind[kind] += 1;
          if (kind === 'evil') state.evilTrees.push(tree);
          else state.goodTrees.push(tree);
        };
        const gatePlan = config.gatePlan;
        gatePlan.forEach(([kind, ratio]) => addTree(kind, ratio));
        state.evilTreeEventCount = state.evilTrees.length;
        state.evilTreeWaveTarget = state.evilTrees.length + state.goodTrees.length;
        state.lastEvilTreeArch = 'fixed patrols';
      }

      function setupTreePushTest() {
        if (!treePushTestMode || !state.evilTrees.length) return;
        const crushMode = treePushTestMode === 'crush';
        for (const tree of state.evilTrees) {
          const cells = tree.patrolCells || [];
          for (let i = 0; i < cells.length - 1; i += 1) {
            const from = cells[i];
            const target = cells[i + 1];
            const dc = Math.sign(target.c - from.c);
            const dr = Math.sign(target.r - from.r);
            if (!dc && !dr) continue;
            const pushCell = { c: target.c + dc, r: target.r + dr };
            const canPush = isPlayerPushTargetPassable(pushCell, performance.now(), tree);
            if ((crushMode && !canPush) || (!crushMode && canPush)) {
              const treePoint = centerOf(from);
              const playerPoint = centerOf(target);
              tree.x = treePoint.x;
              tree.y = treePoint.y;
              tree.path = [];
              tree.patrolIndex = i;
              tree.patrolDir = 1;
              tree.currentCell = from;
              tree.nextCell = null;
              tree.wait = 0;
              tree.facing = dc < 0 ? -1 : dc > 0 ? 1 : tree.facing;
              state.player.x = playerPoint.x;
              state.player.y = playerPoint.y;
              state.player.path = [];
              state.player.facing = dc < 0 ? -1 : dc > 0 ? 1 : state.player.facing;
              state.camera.x = state.player.x;
              state.camera.y = state.player.y;
              state.lastTreeCollision = 'test-ready:' + cellKey(from) + '->' + cellKey(target);
              clampCamera();
              return;
            }
          }
        }
      }

      function queueTreePatrolStep(tree) {
        if (!tree.patrolCells || tree.patrolCells.length < 2 || tree.path.length) return;
        let nextIndex = tree.patrolIndex + tree.patrolDir;
        if (nextIndex < 0 || nextIndex >= tree.patrolCells.length) {
          tree.patrolDir *= -1;
          tree.turns += 1;
          if (tree.kind === 'evil') state.evilTreeSwitches += 1;
          nextIndex = tree.patrolIndex + tree.patrolDir;
        }
        const nextCell = tree.patrolCells[nextIndex];
        if (!nextCell || cellReservedByOtherTree(nextCell, tree)) {
          tree.wait = evilTreeTestMode ? 0.12 : 0.28 * configForLevel(state.level).treeWaitScale;
          return;
        }
        const current = cellOf(tree.x, tree.y);
        tree.patrolIndex = nextIndex;
        tree.nextCell = nextCell;
        tree.facing = nextCell.c < current.c ? -1 : nextCell.c > current.c ? 1 : tree.facing;
        tree.path = [centerOf(nextCell)];
        tree.wait = 0;
        if (tree.kind === 'evil') state.evilTreeChanges += 1;
      }

      function finishTreePatrolStep(tree) {
        if (!tree.nextCell || tree.path.length) return;
        if (!cellsMatch(cellOf(tree.x, tree.y), tree.nextCell)) return;
        tree.currentCell = tree.nextCell;
        tree.nextCell = null;
        tree.wait = evilTreeTestMode ? 0.05 : (0.12 + random() * 0.22) * configForLevel(state.level).treeWaitScale;
      }

      function updateTreePatrols(dt, now = performance.now()) {
        for (const tree of allMovingTrees()) {
          if (!tree.path.length) {
            finishTreePatrolStep(tree);
            tree.wait = Math.max(0, (tree.wait || 0) - dt);
            if (tree.wait <= 0) queueTreePatrolStep(tree);
            if (!tree.path.length) tree.step += dt * 1.7;
          }
          if (tree.path.length && tree.nextCell && cellReservedByOtherTree(tree.nextCell, tree)) {
            const current = cellOf(tree.x, tree.y);
            const currentIndex = tree.patrolCells.findIndex((cell) => cellsMatch(cell, current));
            if (currentIndex >= 0) tree.patrolIndex = currentIndex;
            tree.currentCell = current;
            tree.nextCell = null;
            tree.path = [];
            tree.wait = evilTreeTestMode ? 0.1 : 0.22 * configForLevel(state.level).treeWaitScale;
            continue;
          }
          if (!resolveEvilTreePlayerPush(tree, now)) continue;
          moveAlongPath(tree, tree.speed, dt);
          finishTreePatrolStep(tree);
        }
      }

      function scheduleNextEvilTree(now, first = false) {
        const delay = evilTreeTestMode
          ? (first ? 900 : 2600 + random() * 2200)
          : (first ? 18000 + random() * 7000 : 28000 + random() * 18000);
        state.nextEvilTreeAt = now + delay;
      }

      function beginEvilTreeWave(now) {
        const target = evilTreeTestMode ? 3 : 3 + Math.floor(random() * 4);
        state.evilTreeWaveTarget = target;
        state.evilTreeWaveRemaining = target;
        state.nextEvilTreeWalkerAt = now;
        state.nextEvilTreeAt = 0;
      }

      function finishEvilTreeWave(now) {
        state.evilTreeWaveTarget = 0;
        state.evilTreeWaveRemaining = 0;
        state.nextEvilTreeWalkerAt = 0;
        scheduleNextEvilTree(now);
      }

      function canCloseForEvilTree(cell, movingCell) {
        if (!editableMazeCell(cell) || !isOpen(cell)) return false;
        if (cellsMatch(cell, movingCell) || isProtectedMazeCell(cell, 0)) return false;
        if (cellDistance(cell, cellOf(state.player.x, state.player.y)) < 3) return false;
        if (state.player.path.slice(0, 3).some((point) => cellsMatch(cell, cellOf(point.x, point.y)))) return false;
        return openNeighborCount(cell) >= 2;
      }

      function routeIncludesCell(route, cell) {
        return route.some((routeCell) => cellsMatch(routeCell, cell));
      }

      function withTemporaryMazeChange(closeCell, openCells, test) {
        const previous = [
          { cell: closeCell, value: state.maze[closeCell.r][closeCell.c] },
          ...openCells.map((cell) => ({ cell, value: state.maze[cell.r][cell.c] }))
        ];
        for (const cell of openCells) state.maze[cell.r][cell.c] = 1;
        state.maze[closeCell.r][closeCell.c] = 0;
        const result = test();
        for (const entry of previous) state.maze[entry.cell.r][entry.cell.c] = entry.value;
        return result;
      }

      function buildSwitchPlan(route, index) {
        const routeCell = route[index];
        if (!routeCell || !canCloseForEvilTree(routeCell, null)) return null;
        const oldLength = route.length;
        const playerCell = cellOf(state.player.x, state.player.y);
        const blockedRoute = withTemporaryMazeChange(routeCell, [], () => findPath(playerCell, exitCell));
        if (!blockedRoute.length || blockedRoute.length <= oldLength) return null;
        const candidates = shuffle(blockedRoute
          .filter((cell) => {
            const distance = Math.abs(cell.c - routeCell.c);
            return cell.r === routeCell.r
              && distance >= 1
              && distance <= 10
              && editableMazeCell(cell)
              && !isProtectedMazeCell(cell, 0)
              && !routeIncludesCell(route, cell);
          }))
          .sort((a, b) => Math.abs(a.c - routeCell.c) - Math.abs(b.c - routeCell.c));
        for (const treeCell of candidates) {
          const treeInitialValue = state.maze[treeCell.r][treeCell.c];
          const routeInitialValue = state.maze[routeCell.r][routeCell.c];
          const initialRoute = withTemporaryMazeChange(treeCell, [routeCell], () => {
            if (!hasPlayableRoutes()) return null;
            const currentRoute = findPath(playerCell, exitCell);
            return currentRoute.length && routeIncludesCell(currentRoute, routeCell) ? currentRoute : null;
          });
          if (!initialRoute) continue;
