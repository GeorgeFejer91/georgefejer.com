<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Unicorn Labyrinth Chase | GeorgeFejer.com</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgb(6 14 18 / 76%);
      --panel-strong: rgb(6 14 18 / 90%);
      --line: rgb(221 255 236 / 22%);
      --text: #f2fff7;
      --muted: #b8d9cd;
      --glow: #9af7da;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #06130f;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100svh;
      display: block;
      background: #0c2418;
      touch-action: none;
      cursor: crosshair;
    }

    .topbar,
    .hud,
    .message {
      position: fixed;
      z-index: 2;
      pointer-events: none;
    }

    .topbar {
      top: max(10px, env(safe-area-inset-top));
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .brand,
    .restart,
    .hud,
    .message,
    .title {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgb(0 0 0 / 25%);
      backdrop-filter: blur(12px);
    }

    .brand,
    .restart {
      min-height: 42px;
      display: grid;
      place-items: center;
      padding: 0 13px;
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
      pointer-events: auto;
    }

    .title {
      min-width: 0;
      padding: 9px 12px;
      background: var(--panel-strong);
    }

    h1 {
      margin: 0;
      font-size: clamp(18px, 4vw, 28px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
    }

    .restart {
      appearance: none;
      border-color: var(--line);
      cursor: pointer;
      font: 800 14px/1 Arial, Helvetica, sans-serif;
    }

    .restart:focus-visible,
    .brand:focus-visible {
      outline: 3px solid var(--glow);
      outline-offset: 2px;
    }

    .hud {
      top: calc(max(10px, env(safe-area-inset-top)) + 64px);
      left: max(10px, env(safe-area-inset-left));
      display: grid;
      grid-template-columns: repeat(4, minmax(76px, auto));
      gap: 8px;
      padding: 9px;
      color: var(--text);
      font-weight: 800;
    }

    .hud div {
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 0 10px;
      border-radius: 7px;
      background: rgb(255 255 255 / 8%);
      white-space: nowrap;
    }

    .message {
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(92vw, 720px);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    @media (max-width: 680px) {
      .topbar {
        grid-template-columns: 1fr auto;
      }

      .brand {
        display: none;
      }

      .title {
        padding: 8px 10px;
      }

      .title p {
        font-size: 12px;
      }

      .hud {
        top: calc(max(10px, env(safe-area-inset-top)) + 75px);
        right: max(10px, env(safe-area-inset-right));
        grid-template-columns: repeat(2, minmax(0, 1fr));
        font-size: 13px;
      }

      .hud div {
        min-height: 32px;
        padding: 0 6px;
      }

      .message {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <canvas id="world" aria-label="2D unicorn forest labyrinth chase game"></canvas>

  <header class="topbar">
    <a class="brand" href="../">GeorgeFejer.com</a>
    <div class="title">
      <h1>Unicorn Labyrinth Chase</h1>
      <p>Guide the unicorn from A to B. Tap paths to move. The witch is hunting.</p>
    </div>
    <button class="restart" id="restart" type="button">Restart</button>
  </header>

  <section class="hud" aria-label="Game status">
    <div id="score">Score 0</div>
    <div id="lives">Lives 3</div>
    <div id="treat">Treat none</div>
    <div id="best">Best 0</div>
  </section>

  <div class="message" id="message">Tap any forest path. Reach B before the witch catches you.</div>

  <script>
    (() => {
      const canvas = document.getElementById('world');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const livesEl = document.getElementById('lives');
      const treatEl = document.getElementById('treat');
      const bestEl = document.getElementById('best');
      const messageEl = document.getElementById('message');
      const restartBtn = document.getElementById('restart');
      const storageKey = 'unicornLabyrinthBest';
      const grid = { cols: 41, rows: 31, tile: 74 };
      const world = { w: grid.cols * grid.tile, h: grid.rows * grid.tile };
      const startCell = { c: 1, r: 1 };
      const exitCell = { c: grid.cols - 2, r: grid.rows - 2 };
      const witchStartCell = { c: grid.cols - 2, r: 1 };
      const dirs = [
        { dc: 1, dr: 0 },
        { dc: -1, dr: 0 },
        { dc: 0, dr: 1 },
        { dc: 0, dr: -1 }
      ];
      const state = {
        dpr: 1,
        vw: 0,
        vh: 0,
        maze: [],
        camera: { x: 0, y: 0 },
        player: { x: 0, y: 0, path: [], speed: 265, step: 0, angle: 0 },
        witch: { x: 0, y: 0, path: [], speed: 190, step: 0, repath: 0, frozenUntil: 0 },
        score: 0,
        lives: 3,
        best: Number(localStorage.getItem(storageKey) || 0),
        activeTreat: null,
        activeUntil: 0,
        shieldUntil: 0,
        messageUntil: 0,
        last: performance.now(),
        won: false,
        over: false,
        treats: [],
        crumbs: []
      };

      function rng(seed) {
        let value = seed >>> 0;
        return () => {
          value += 0x6D2B79F5;
          let t = value;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      const random = rng(6222026);
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const cellKey = (cell) => cell.r + ',' + cell.c;
      const centerOf = (cell) => ({ x: cell.c * grid.tile + grid.tile / 2, y: cell.r * grid.tile + grid.tile / 2 });
      const cellOf = (x, y) => ({ c: clamp(Math.floor(x / grid.tile), 0, grid.cols - 1), r: clamp(Math.floor(y / grid.tile), 0, grid.rows - 1) });
      const isOpen = (cell) => state.maze[cell.r] && state.maze[cell.r][cell.c] === 1;
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

      function shuffle(list) {
        for (let i = list.length - 1; i > 0; i -= 1) {
          const j = Math.floor(random() * (i + 1));
          [list[i], list[j]] = [list[j], list[i]];
        }
        return list;
      }

      function generateMaze() {
        state.maze = Array.from({ length: grid.rows }, () => Array.from({ length: grid.cols }, () => 0));
        const carve = (c, r) => {
          state.maze[r][c] = 1;
          for (const dir of shuffle([...dirs])) {
            const nc = c + dir.dc * 2;
            const nr = r + dir.dr * 2;
            if (nr <= 0 || nr >= grid.rows - 1 || nc <= 0 || nc >= grid.cols - 1 || state.maze[nr][nc]) continue;
            state.maze[r + dir.dr][c + dir.dc] = 1;
            carve(nc, nr);
          }
        };
        carve(startCell.c, startCell.r);
        state.maze[exitCell.r][exitCell.c] = 1;
        state.maze[witchStartCell.r][witchStartCell.c] = 1;

        for (let i = 0; i < 95; i += 1) {
          const c = 2 + Math.floor(random() * (grid.cols - 4));
          const r = 2 + Math.floor(random() * (grid.rows - 4));
          if (state.maze[r][c] === 0) {
            const horizontal = state.maze[r][c - 1] && state.maze[r][c + 1];
            const vertical = state.maze[r - 1][c] && state.maze[r + 1][c];
            if (horizontal || vertical || random() < 0.12) state.maze[r][c] = 1;
          }
        }
      }

      function openCells() {
        const cells = [];
        for (let r = 1; r < grid.rows - 1; r += 1) {
          for (let c = 1; c < grid.cols - 1; c += 1) {
            if (state.maze[r][c] === 1) cells.push({ c, r });
          }
        }
        return cells;
      }

      function findPath(from, to) {
        if (!isOpen(from) || !isOpen(to)) return [];
        const queue = [from];
        const seen = new Set([cellKey(from)]);
        const prev = new Map();
        while (queue.length) {
          const cur = queue.shift();
          if (cur.c === to.c && cur.r === to.r) {
            const path = [cur];
            let k = cellKey(cur);
            while (prev.has(k)) {
              const p = prev.get(k);
              path.push(p);
              k = cellKey(p);
            }
            return path.reverse();
          }
          for (const dir of dirs) {
            const next = { c: cur.c + dir.dc, r: cur.r + dir.dr };
            const k = cellKey(next);
            if (seen.has(k) || !isOpen(next)) continue;
            seen.add(k);
            prev.set(k, cur);
            queue.push(next);
          }
        }
        return [];
      }

      function nearestOpenCell(x, y) {
        const start = cellOf(x, y);
        if (isOpen(start)) return start;
        const queue = [start];
        const seen = new Set([cellKey(start)]);
        while (queue.length) {
          const cur = queue.shift();
          for (const dir of dirs) {
            const next = { c: cur.c + dir.dc, r: cur.r + dir.dr };
            const k = cellKey(next);
            if (next.c < 0 || next.r < 0 || next.c >= grid.cols || next.r >= grid.rows || seen.has(k)) continue;
            if (isOpen(next)) return next;
            seen.add(k);
            queue.push(next);
          }
        }
        return startCell;
      }

      function chooseFarCell(cells, reference, minDistance) {
        const filtered = cells.filter((cell) => Math.abs(cell.c - reference.c) + Math.abs(cell.r - reference.r) > minDistance);
        return filtered[Math.floor(random() * filtered.length)] || cells[Math.floor(random() * cells.length)];
      }

      function placeTreats() {
        state.treats = [];
        state.crumbs = [];
        const cells = openCells().filter((cell) => {
          const key = cellKey(cell);
          return key !== cellKey(startCell) && key !== cellKey(exitCell) && key !== cellKey(witchStartCell);
        });
        const treatTypes = ['speed', 'shield', 'freeze', 'spark'];
        for (let i = 0; i < 18; i += 1) {
          const cell = chooseFarCell(cells, startCell, 8);
          const p = centerOf(cell);
          state.treats.push({ ...p, cell, type: treatTypes[i % treatTypes.length], taken: false, pulse: random() * 6.28 });
        }
        for (let i = 0; i < 120; i += 1) {
          const cell = cells[Math.floor(random() * cells.length)];
          const p = centerOf(cell);
          state.crumbs.push({ x: p.x, y: p.y, taken: false });
        }
      }

      function resize() {
        state.dpr = Math.min(2.5, window.devicePixelRatio || 1);
        state.vw = window.innerWidth;
        state.vh = window.innerHeight;
        canvas.width = Math.floor(state.vw * state.dpr);
        canvas.height = Math.floor(state.vh * state.dpr);
        canvas.style.width = state.vw + 'px';
        canvas.style.height = state.vh + 'px';
      }

      function screenToWorld(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: state.camera.x - state.vw / 2 + clientX - rect.left,
          y: state.camera.y - state.vh / 2 + clientY - rect.top
        };
      }

      function setDestination(clientX, clientY) {
        if (state.over || state.won) {
          reset();
          return;
        }
        const pos = screenToWorld(clientX, clientY);
        const target = nearestOpenCell(pos.x, pos.y);
        const current = cellOf(state.player.x, state.player.y);
        const path = findPath(current, target);
        if (path.length > 1) {
          state.player.path = path.slice(1).map(centerOf);
          showMessage('Unicorn path set: ' + (path.length - 1) + ' steps.', 1200);
        } else {
          showMessage('That part of the forest is blocked.', 1100);
        }
      }

      function showMessage(text, ms) {
        state.messageUntil = performance.now() + ms;
        messageEl.textContent = text;
      }

      function updateHud() {
        const now = performance.now();
        const active = state.activeTreat && now < state.activeUntil ? state.activeTreat + ' ' + Math.ceil((state.activeUntil - now) / 1000) + 's' : 'none';
        scoreEl.textContent = 'Score ' + state.score;
        livesEl.textContent = 'Lives ' + state.lives;
        treatEl.textContent = 'Treat ' + active;
        bestEl.textContent = 'Best ' + state.best;
        canvas.dataset.playerCell = cellKey(cellOf(state.player.x, state.player.y));
        canvas.dataset.witchCell = cellKey(cellOf(state.witch.x, state.witch.y));
        canvas.dataset.score = String(state.score);
        canvas.dataset.lives = String(state.lives);
        canvas.dataset.won = String(state.won);
        canvas.dataset.over = String(state.over);
      }

      function resetPositions() {
        const p = centerOf(startCell);
        const w = centerOf(witchStartCell);
        state.player.x = p.x;
        state.player.y = p.y;
        state.player.path = [];
        state.player.step = 0;
        state.witch.x = w.x;
        state.witch.y = w.y;
        state.witch.path = [];
        state.witch.repath = 0;
        state.camera.x = state.player.x;
        state.camera.y = state.player.y;
      }

      function reset() {
        generateMaze();
        placeTreats();
        resetPositions();
        state.score = 0;
        state.lives = 3;
        state.activeTreat = null;
        state.activeUntil = 0;
        state.shieldUntil = 0;
        state.witch.frozenUntil = 0;
        state.won = false;
        state.over = false;
        state.last = performance.now();
        showMessage('Start at A. Tap paths to reach B. Avoid the witch.', 2200);
        updateHud();
      }

      function currentPlayerSpeed(now) {
        return state.activeTreat === 'speed' && now < state.activeUntil ? 405 : state.player.speed;
      }

      function moveAlongPath(actor, speed, dt) {
        if (!actor.path.length) return;
        const target = actor.path[0];
        const dx = target.x - actor.x;
        const dy = target.y - actor.y;
        const d = Math.hypot(dx, dy);
        if (d < 3) {
          actor.x = target.x;
          actor.y = target.y;
          actor.path.shift();
          return;
        }
        const step = Math.min(speed * dt, d);
        actor.angle = Math.atan2(dy, dx);
        actor.step += dt * 8;
        actor.x += (dx / d) * step;
        actor.y += (dy / d) * step;
      }

      function updateWitch(dt, now) {
        if (now < state.witch.frozenUntil || state.over || state.won) return;
        state.witch.repath -= dt;
        if (state.witch.repath <= 0 || state.witch.path.length < 2) {
          const from = cellOf(state.witch.x, state.witch.y);
          const to = cellOf(state.player.x, state.player.y);
          const path = findPath(from, to);
          state.witch.path = path.slice(1).map(centerOf);
          state.witch.repath = 0.42;
        }
        const speed = state.activeTreat === 'freeze' && now < state.activeUntil ? 60 : state.witch.speed;
        moveAlongPath(state.witch, speed, dt);
      }

      function applyTreat(type) {
        const now = performance.now();
        state.activeTreat = type;
        state.activeUntil = now + (type === 'spark' ? 2500 : 7000);
        if (type === 'shield') state.shieldUntil = now + 7000;
        if (type === 'freeze') state.witch.frozenUntil = now + 3500;
        if (type === 'spark') state.score += 50;
        const label = {
          speed: 'Carrot rush: unicorn is faster.',
          shield: 'Moon shield: the witch bounces off.',
          freeze: 'Sleep mushroom: witch slowed.',
          spark: 'Star treat: bonus magic.'
        }[type];
        showMessage(label, 1700);
      }

      function updatePickups(now) {
        for (const crumb of state.crumbs) {
          if (!crumb.taken && Math.hypot(crumb.x - state.player.x, crumb.y - state.player.y) < 24) {
            crumb.taken = true;
            state.score += 2;
          }
        }
        for (const treat of state.treats) {
          if (!treat.taken && Math.hypot(treat.x - state.player.x, treat.y - state.player.y) < 34) {
            treat.taken = true;
            state.score += 10;
            applyTreat(treat.type);
          }
        }
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem(storageKey, String(state.best));
        }
      }

      function updateWinLose(now) {
        const exit = centerOf(exitCell);
        if (!state.won && Math.hypot(state.player.x - exit.x, state.player.y - exit.y) < 38) {
          state.won = true;
          state.score += 150;
          state.best = Math.max(state.best, state.score);
          localStorage.setItem(storageKey, String(state.best));
          showMessage('You reached B. The unicorn escaped the labyrinth!', 5000);
        }
        if (state.over || state.won) return;
        if (Math.hypot(state.player.x - state.witch.x, state.player.y - state.witch.y) < 42) {
          if (now < state.shieldUntil) {
            const w = centerOf(witchStartCell);
            state.witch.x = w.x;
            state.witch.y = w.y;
            state.witch.path = [];
            state.witch.frozenUntil = now + 1800;
            state.score += 25;
            showMessage('Shield repelled the witch +25.', 1500);
          } else {
            state.lives -= 1;
            if (state.lives <= 0) {
              state.over = true;
              showMessage('The witch caught the unicorn. Tap to restart.', 5000);
            } else {
              showMessage('Caught by the witch. Lives left: ' + state.lives, 1800);
              resetPositions();
            }
          }
        }
      }

      function update(dt, now) {
        if (!state.over && !state.won) {
          moveAlongPath(state.player, currentPlayerSpeed(now), dt);
          updateWitch(dt, now);
          updatePickups(now);
          updateWinLose(now);
        }
        state.camera.x += (state.player.x - state.camera.x) * Math.min(1, dt * 6);
        state.camera.y += (state.player.y - state.camera.y) * Math.min(1, dt * 6);
        state.camera.x = clamp(state.camera.x, state.vw / 2, world.w - state.vw / 2);
        state.camera.y = clamp(state.camera.y, state.vh / 2, world.h - state.vh / 2);
        if (state.messageUntil && now > state.messageUntil && !state.over && !state.won) {
          state.messageUntil = 0;
          messageEl.textContent = 'Tap a corridor. Carrots speed up, shields protect, mushrooms slow the witch.';
        }
        updateHud();
      }

      function worldToScreen(x, y) {
        return { x: x - state.camera.x + state.vw / 2, y: y - state.camera.y + state.vh / 2 };
      }

      function drawMaze() {
        const startC = clamp(Math.floor((state.camera.x - state.vw / 2) / grid.tile) - 2, 0, grid.cols - 1);
        const endC = clamp(Math.floor((state.camera.x + state.vw / 2) / grid.tile) + 2, 0, grid.cols - 1);
        const startR = clamp(Math.floor((state.camera.y - state.vh / 2) / grid.tile) - 2, 0, grid.rows - 1);
        const endR = clamp(Math.floor((state.camera.y + state.vh / 2) / grid.tile) + 2, 0, grid.rows - 1);
        ctx.save();
        ctx.translate(-state.camera.x + state.vw / 2, -state.camera.y + state.vh / 2);
        ctx.fillStyle = '#14331d';
        ctx.fillRect(0, 0, world.w, world.h);
        for (let r = startR; r <= endR; r += 1) {
          for (let c = startC; c <= endC; c += 1) {
            const x = c * grid.tile;
            const y = r * grid.tile;
            if (state.maze[r][c] === 1) {
              const shade = (r * 7 + c * 11) % 4;
              ctx.fillStyle = shade < 2 ? '#9a7b46' : '#8c6e3f';
              ctx.fillRect(x, y, grid.tile, grid.tile);
              ctx.fillStyle = 'rgb(255 239 170 / 8%)';
              ctx.beginPath();
              ctx.ellipse(x + grid.tile / 2, y + grid.tile / 2, grid.tile * 0.34, grid.tile * 0.22, 0.4, 0, Math.PI * 2);
              ctx.fill();
            } else {
              ctx.fillStyle = '#0d2818';
              ctx.fillRect(x, y, grid.tile, grid.tile);
              const cx = x + grid.tile / 2;
              const cy = y + grid.tile / 2;
              ctx.fillStyle = '#1e7b3f';
              ctx.beginPath();
              ctx.moveTo(cx, y + 9);
              ctx.lineTo(x + 11, y + grid.tile - 10);
              ctx.lineTo(x + grid.tile - 11, y + grid.tile - 10);
              ctx.closePath();
              ctx.fill();
              ctx.fillStyle = '#14592e';
              ctx.beginPath();
              ctx.moveTo(cx + 8, y + 18);
              ctx.lineTo(x + 18, y + grid.tile - 4);
              ctx.lineTo(x + grid.tile - 4, y + grid.tile - 6);
              ctx.closePath();
              ctx.fill();
            }
          }
        }
        drawStartExit();
        ctx.restore();
      }

      function drawStartExit() {
        const a = centerOf(startCell);
        const b = centerOf(exitCell);
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '900 34px Arial';
        ctx.fillStyle = '#9df7d0';
        ctx.beginPath();
        ctx.arc(a.x, a.y, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0b291b';
        ctx.fillText('A', a.x, a.y + 1);
        ctx.fillStyle = '#ffd866';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 34, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#37260a';
        ctx.fillText('B', b.x, b.y + 1);
        ctx.restore();
      }

      function drawPathLine() {
        if (!state.player.path.length) return;
        ctx.save();
        ctx.translate(-state.camera.x + state.vw / 2, -state.camera.y + state.vh / 2);
        ctx.strokeStyle = 'rgb(219 255 136 / 58%)';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.setLineDash([10, 12]);
        ctx.beginPath();
        ctx.moveTo(state.player.x, state.player.y);
        for (const p of state.player.path) ctx.lineTo(p.x, p.y);
        ctx.stroke();
        ctx.restore();
      }

      function drawTreat(treat, now) {
        const s = worldToScreen(treat.x, treat.y);
        if (s.x < -60 || s.y < -60 || s.x > state.vw + 60 || s.y > state.vh + 60) return;
        const pulse = Math.sin(now / 220 + treat.x) * 0.15 + 1;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.shadowBlur = 18;
        const colors = { speed: '#ffb84f', shield: '#91eaff', freeze: '#c499ff', spark: '#ffe767' };
        ctx.fillStyle = colors[treat.type];
        ctx.shadowColor = colors[treat.type];
        if (treat.type === 'speed') {
          ctx.beginPath();
          ctx.moveTo(18 * pulse, 0);
          ctx.lineTo(-14 * pulse, -11 * pulse);
          ctx.lineTo(-9 * pulse, 0);
          ctx.lineTo(-14 * pulse, 11 * pulse);
          ctx.closePath();
          ctx.fill();
        } else if (treat.type === 'shield') {
          ctx.beginPath();
          ctx.moveTo(0, -20 * pulse);
          ctx.lineTo(17 * pulse, -8 * pulse);
          ctx.lineTo(10 * pulse, 17 * pulse);
          ctx.lineTo(0, 23 * pulse);
          ctx.lineTo(-10 * pulse, 17 * pulse);
          ctx.lineTo(-17 * pulse, -8 * pulse);
          ctx.closePath();
          ctx.fill();
        } else if (treat.type === 'freeze') {
          ctx.beginPath();
          ctx.arc(0, -6 * pulse, 16 * pulse, Math.PI, Math.PI * 2);
          ctx.fill();
          ctx.fillRect(-6 * pulse, -6 * pulse, 12 * pulse, 24 * pulse);
        } else {
          for (let i = 0; i < 8; i += 1) {
            const a = i / 8 * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 11 * pulse, Math.sin(a) * 11 * pulse, 4 * pulse, 10 * pulse, a, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function drawCrumb(crumb) {
        const s = worldToScreen(crumb.x, crumb.y);
        if (s.x < -30 || s.y < -30 || s.x > state.vw + 30 || s.y > state.vh + 30) return;
        ctx.fillStyle = '#f6df82';
        ctx.beginPath();
        ctx.arc(s.x, s.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawUnicorn(now) {
        const s = worldToScreen(state.player.x, state.player.y);
        const bob = state.player.path.length ? Math.sin(state.player.step) * 3 : Math.sin(now / 500) * 1.5;
        const shield = now < state.shieldUntil;
        ctx.save();
        ctx.translate(s.x, s.y + bob);
        ctx.rotate(state.player.angle || 0);
        if (shield) {
          ctx.strokeStyle = 'rgb(145 234 255 / 78%)';
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(0, 0, 35, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.fillStyle = 'rgb(0 0 0 / 24%)';
        ctx.beginPath();
        ctx.ellipse(0, 18, 30, 11, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff9ff';
        ctx.strokeStyle = '#344051';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, 0, 30, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(27, -9, 13, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#ffd866';
        ctx.beginPath();
        ctx.moveTo(36, -19);
        ctx.lineTo(54, -34);
        ctx.lineTo(45, -12);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = '#ff78c8';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(10, -14);
        ctx.quadraticCurveTo(-6, -31, -25, -13);
        ctx.stroke();
        ctx.strokeStyle = '#77d8ff';
        ctx.beginPath();
        ctx.moveTo(12, -7);
        ctx.quadraticCurveTo(-3, -22, -27, 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawWitch(now) {
        const s = worldToScreen(state.witch.x, state.witch.y);
        const frozen = now < state.witch.frozenUntil;
        ctx.save();
        ctx.translate(s.x, s.y + Math.sin(now / 180) * 3);
        ctx.fillStyle = frozen ? '#aee8ff' : '#4c255f';
        ctx.strokeStyle = '#1c0d27';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -34);
        ctx.lineTo(-22, 8);
        ctx.lineTo(22, 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = frozen ? '#e7fbff' : '#7f3ca1';
        ctx.beginPath();
        ctx.arc(0, 2, 19, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = '#2a140d';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(-27, 20);
        ctx.lineTo(31, 29);
        ctx.stroke();
        ctx.fillStyle = frozen ? '#79dfff' : '#ffcf63';
        ctx.beginPath();
        ctx.arc(7, -2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawMinimap() {
        const size = Math.min(156, Math.max(110, state.vw * 0.18));
        const x = state.vw - size - 14;
        const y = state.vh - size - 14;
        ctx.save();
        ctx.fillStyle = 'rgb(3 10 8 / 70%)';
        ctx.strokeStyle = 'rgb(223 255 236 / 32%)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(x, y, size, size, 8) : ctx.rect(x, y, size, size);
        ctx.fill();
        ctx.stroke();
        const sx = size / world.w;
        const sy = size / world.h;
        ctx.fillStyle = '#8c6e3f';
        for (let r = 0; r < grid.rows; r += 1) {
          for (let c = 0; c < grid.cols; c += 1) {
            if (state.maze[r][c] === 1) ctx.fillRect(x + c * grid.tile * sx, y + r * grid.tile * sy, Math.max(1, grid.tile * sx), Math.max(1, grid.tile * sy));
          }
        }
        ctx.fillStyle = '#9df7d0';
        ctx.fillRect(x + startCell.c * grid.tile * sx - 2, y + startCell.r * grid.tile * sy - 2, 4, 4);
        ctx.fillStyle = '#ffd866';
        ctx.fillRect(x + exitCell.c * grid.tile * sx - 2, y + exitCell.r * grid.tile * sy - 2, 4, 4);
        ctx.fillStyle = '#ff78c8';
        ctx.beginPath();
        ctx.arc(x + state.player.x * sx, y + state.player.y * sy, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#bd77ff';
        ctx.beginPath();
        ctx.arc(x + state.witch.x * sx, y + state.witch.y * sy, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function draw() {
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        ctx.clearRect(0, 0, state.vw, state.vh);
        const bg = ctx.createLinearGradient(0, 0, 0, state.vh);
        bg.addColorStop(0, '#0b281e');
        bg.addColorStop(1, '#06130f');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, state.vw, state.vh);
        drawMaze();
        drawPathLine();
        for (const crumb of state.crumbs) if (!crumb.taken) drawCrumb(crumb);
        for (const treat of state.treats) if (!treat.taken) drawTreat(treat, performance.now());
        if (state.player.y <= state.witch.y) {
          drawUnicorn(performance.now());
          drawWitch(performance.now());
        } else {
          drawWitch(performance.now());
          drawUnicorn(performance.now());
        }
        drawMinimap();
      }

      function frame(now) {
        const dt = Math.min(0.05, (now - state.last) / 1000);
        state.last = now;
        update(dt, now);
        draw();
      }

      canvas.addEventListener('pointerdown', (event) => {
        canvas.setPointerCapture(event.pointerId);
        setDestination(event.clientX, event.clientY);
      });

      window.addEventListener('keydown', (event) => {
        const current = cellOf(state.player.x, state.player.y);
        let next = null;
        if (event.key === 'ArrowLeft' || event.key === 'a') next = { c: current.c - 1, r: current.r };
        else if (event.key === 'ArrowRight' || event.key === 'd') next = { c: current.c + 1, r: current.r };
        else if (event.key === 'ArrowUp' || event.key === 'w') next = { c: current.c, r: current.r - 1 };
        else if (event.key === 'ArrowDown' || event.key === 's') next = { c: current.c, r: current.r + 1 };
        else return;
        event.preventDefault();
        if (next && isOpen(next)) state.player.path = [centerOf(next)];
      });

      restartBtn.addEventListener('click', reset);
      window.addEventListener('resize', resize);
      resize();
      reset();
      setInterval(() => frame(performance.now()), 16);
      window.__unicornMazeDebug = () => ({
        playerCell: cellOf(state.player.x, state.player.y),
        witchCell: cellOf(state.witch.x, state.witch.y),
        score: state.score,
        lives: state.lives,
        won: state.won,
        over: state.over,
        treatsLeft: state.treats.filter((item) => !item.taken).length,
        crumbsLeft: state.crumbs.filter((item) => !item.taken).length,
        playerPath: state.player.path.length,
        witchPath: state.witch.path.length,
        canvas: { width: canvas.width, height: canvas.height, dpr: state.dpr },
        viewport: { width: state.vw, height: state.vh }
      });
    })();
  </script>
</body>
</html>
