          const switchedRoute = withTemporaryMazeChange(routeCell, [treeCell], () => {
            if (!hasPlayableRoutes()) return null;
            const newRoute = findPath(playerCell, exitCell);
            if (!newRoute.length || routeIncludesCell(newRoute, routeCell) || !routeIncludesCell(newRoute, treeCell)) return null;
            const delta = newRoute.length - initialRoute.length;
            return delta >= 1 ? newRoute : null;
          });
          if (!switchedRoute) continue;
          const delta = switchedRoute.length - initialRoute.length;
          return {
            routeCell,
            treeCell,
            closeCell: routeCell,
            openCells: [treeCell],
            oldLength: initialRoute.length,
            newLength: switchedRoute.length,
            treeInitialValue,
            routeInitialValue,
            score: 30 + delta * 4 - Math.abs(treeCell.c - routeCell.c) + index / Math.max(1, route.length)
          };
        }
        return null;
      }

      function findStrategicEvilTreePlan() {
        const playerCell = cellOf(state.player.x, state.player.y);
        const route = findPath(playerCell, exitCell);
        if (route.length < 12) return null;
        const startIndex = Math.min(route.length - 4, evilTreeTestMode ? 5 : 8);
        const endIndex = Math.max(startIndex, route.length - 6);
        const indices = [];
        for (let i = startIndex; i <= endIndex; i += 1) indices.push(i);
        shuffle(indices);
        let best = null;
        for (const index of indices) {
          const plan = buildSwitchPlan(route, index);
          if (!plan) continue;
          if (!best || plan.score > best.score) best = plan;
        }
        return best;
      }

      function buildStrategicTreeWalkPath(plan) {
        return plan && plan.treeCell && plan.routeCell ? [plan.treeCell, plan.routeCell] : null;
      }

      function applyEvilTreeSwitch(tree, targetCell, now) {
        const plan = tree.plan;
        const fromCell = tree.occupiedCell;
        if (!plan || !fromCell || !targetCell) return false;
        const movingOntoRoute = cellsMatch(targetCell, plan.routeCell);
        const previousRoute = findPath(cellOf(state.player.x, state.player.y), exitCell);
        const previousLength = previousRoute.length || plan.oldLength;
        const previous = [
          { cell: fromCell, value: state.maze[fromCell.r][fromCell.c] },
          { cell: targetCell, value: state.maze[targetCell.r][targetCell.c] }
        ];
        state.maze[fromCell.r][fromCell.c] = 1;
        state.maze[targetCell.r][targetCell.c] = 0;
        const newRoute = findPath(cellOf(state.player.x, state.player.y), exitCell);
        const valid = hasPlayableRoutes()
          && newRoute.length
          && (!movingOntoRoute || (newRoute.length > previousLength && !routeIncludesCell(newRoute, plan.routeCell) && routeIncludesCell(newRoute, plan.treeCell)));
        if (valid) {
          tree.occupiedCell = targetCell;
          tree.targetCell = targetCell;
          state.mazeRevision += 1;
          state.evilTreeChanges += 1;
          state.evilTreeSwitches += 1;
          if (movingOntoRoute) {
            state.evilTreeArchChanges += 1;
            state.lastEvilTreeRouteDelta = newRoute.length - previousLength;
          } else {
            state.lastEvilTreeRouteDelta = 0;
          }
          state.lastEvilTreeArch = cellKey(fromCell) + '<->' + cellKey(targetCell);
          refreshActorPathsAfterMazeChange();
          return true;
        }
        for (const entry of previous) state.maze[entry.cell.r][entry.cell.c] = entry.value;
        return false;
      }

      function restoreEvilTreeSwitch(tree) {
        const plan = tree && tree.plan;
        if (!plan) return;
        state.maze[plan.treeCell.r][plan.treeCell.c] = plan.treeInitialValue;
        state.maze[plan.routeCell.r][plan.routeCell.c] = plan.routeInitialValue;
        state.mazeRevision += 1;
        refreshActorPathsAfterMazeChange();
      }

      function spawnEvilTree(now, forced = false) {
        if (!forced && state.evilTrees.length) return false;
        const plan = findStrategicEvilTreePlan();
        if (!plan) return false;
        for (let attempt = 0; attempt < 70; attempt += 1) {
          const path = buildStrategicTreeWalkPath(plan);
          if (!path || path.length < 2) continue;
          const start = path[0];
          const p = centerOf(start);
          state.maze[plan.treeCell.r][plan.treeCell.c] = 0;
          state.maze[plan.routeCell.r][plan.routeCell.c] = 1;
          state.evilTrees.push({
            x: p.x,
            y: p.y,
            path: [],
            speed: evilTreeTestMode ? 175 : 105,
            step: random() * 6,
            facing: plan.routeCell.c < plan.treeCell.c ? -1 : 1,
            currentCell: start,
            occupiedCell: plan.treeCell,
            targetCell: null,
            nextSwitchAt: now + (evilTreeTestMode ? 350 : 1200 + random() * 900),
            plan,
            switchCount: 0,
            changes: 0,
            born: now,
            expires: now + (evilTreeTestMode ? 15000 : 36000 + random() * 12000)
          });
          state.evilTreeEventCount += 1;
          showMessage('An evil tree is shifting the labyrinth.', 1800);
          return true;
        }
        return false;
      }

      function updateEvilTrees(dt, now) {
        if (state.nextEvilTreeAt && now >= state.nextEvilTreeAt && !state.evilTrees.length && !state.evilTreeWaveRemaining) {
          beginEvilTreeWave(now);
        }
        if (state.evilTreeWaveRemaining && state.evilTrees.length < Math.max(1, state.evilTreeWaveTarget) && now >= state.nextEvilTreeWalkerAt) {
          if (spawnEvilTree(now, true)) {
            state.evilTreeWaveRemaining -= 1;
            state.nextEvilTreeWalkerAt = state.evilTreeWaveRemaining
              ? now + (evilTreeTestMode ? 900 : 2600 + random() * 1500)
              : 0;
          } else {
            finishEvilTreeWave(now);
          }
        }
        for (const tree of state.evilTrees) {
          if (!tree.path.length && tree.targetCell) {
            tree.targetCell = null;
            tree.currentCell = tree.occupiedCell;
            tree.nextSwitchAt = now + (evilTreeTestMode ? 850 : 2200 + random() * 1400);
          }
          if (!tree.path.length && !tree.targetCell && now >= tree.nextSwitchAt) {
            const atTreeCell = cellsMatch(tree.occupiedCell, tree.plan.treeCell);
            const target = atTreeCell ? tree.plan.routeCell : tree.plan.treeCell;
            if (now > tree.expires && atTreeCell) {
              restoreEvilTreeSwitch(tree);
              tree.done = true;
            } else if (applyEvilTreeSwitch(tree, target, now)) {
              tree.switchCount += 1;
              tree.changes += 1;
              tree.facing = target.c < cellOf(tree.x, tree.y).c ? -1 : 1;
              tree.path = [centerOf(target)];
              tree.nextSwitchAt = 0;
            } else {
              tree.nextSwitchAt = now + (evilTreeTestMode ? 900 : 1800);
            }
          }
          if (tree.done) continue;
          moveAlongPath(tree, tree.speed, dt);
        }
        state.evilTrees = state.evilTrees.filter((tree) => !tree.done);
        if (!state.evilTrees.length && state.evilTreeWaveTarget && !state.evilTreeWaveRemaining) {
          finishEvilTreeWave(now);
        }
      }

      function updateWitch(actor, dt, now) {
        if (!actor.active && actor !== state.witch) return;
        if (now < actor.frozenUntil || state.over || state.won) return;
        const from = cellOf(actor.x, actor.y);
        const passable = (cell) => cellsMatch(cell, from) || isWitchPassable(cell);
        if (actor.path.length && !pathPointsAreOpen(actor.path, passable)) {
          actor.path = [];
          actor.repath = 0;
        }
        actor.repath -= dt;
        if (actor.repath <= 0 || actor.path.length < 2) {
          const to = cellOf(state.player.x, state.player.y);
          const path = findPath(from, to, passable);
          actor.path = path.length ? path.slice(1).map(centerOf) : [];
          actor.repath = 0.42;
        }
        let speed = mushroomPassThroughActive(now) ? 60 : actor.speed;
        if (now < actor.stenchUntil) speed *= 0.42;
        moveAlongPath(actor, speed, dt);
      }

      function applyTreat(type) {
        const now = performance.now();
        state.activeTreat = type;
        state.activeUntil = now + (type === 'spark' ? 2500 : type === 'stink' || type === 'leaf' ? 9000 : 7000);
        if (type === 'shield') state.shieldUntil = now + 7000;
        if (type === 'freeze') {
          for (const witch of activeWitches()) witch.frozenUntil = now + 3500;
        }
        if (type === 'spark') state.score += 50;
        if (type === 'stink') {
          state.stenchUntil = now + 9000;
          state.stenchEmit = 0;
        }
        playSfx(type);
        const label = {
          speed: 'Carrot rush: unicorn is faster.',
          shield: 'Moon shield: the witch bounces off.',
          freeze: 'Sleep mushroom: witch slowed.',
          spark: 'Star treat: bonus magic.',
          stink: 'Rotten strawberry: stinky bubbles trail behind.',
          leaf: 'Green leaf: waving trees become paths.'
        }[type];
        showMessage(label, 1700);
      }

      function emitStenchBubble(now) {
        const facing = state.player.facing || 1;
        state.stenchTrail.push({
          x: state.player.x - facing * 30 + (random() - 0.5) * 12,
          y: state.player.y + 12 + (random() - 0.5) * 10,
          r: 10 + random() * 8,
          born: now,
          life: 6200,
          drift: (random() - 0.5) * 22,
          phase: random() * Math.PI * 2,
          hit: false
        });
      }

      function updateStench(dt, now) {
        if (now < state.stenchUntil && state.player.path.length) {
          state.stenchEmit -= dt;
          while (state.stenchEmit <= 0) {
            emitStenchBubble(now);
            state.stenchEmit += 0.16;
          }
        }

        state.stenchTrail = state.stenchTrail.filter((bubble) => now - bubble.born < bubble.life);
        state.stenchFogs = state.stenchFogs.filter((fog) => now - fog.born < fog.life);

        for (const bubble of state.stenchTrail) {
          const age = (now - bubble.born) / bubble.life;
          bubble.y -= dt * 2.4;
          bubble.x += Math.sin(age * 8 + bubble.phase) * dt * bubble.drift;
          if (!bubble.hit) {
            const hitWitch = activeWitches().find((witch) => Math.hypot(witch.x - bubble.x, witch.y - bubble.y) < bubble.r + 34);
            if (hitWitch) {
              bubble.hit = true;
              hitWitch.stenchUntil = Math.max(hitWitch.stenchUntil, now + 2800);
              state.score += 5;
              playSfx('stink', 350);
              state.stenchFogs.push({
                x: bubble.x,
                y: bubble.y,
                born: now,
                life: 3600,
                r: 42 + random() * 18,
                phase: random() * Math.PI * 2
              });
            }
          }
        }

        for (const fog of state.stenchFogs) {
          for (const witch of activeWitches()) {
            if (Math.hypot(witch.x - fog.x, witch.y - fog.y) < fog.r + 22) {
              witch.stenchUntil = Math.max(witch.stenchUntil, now + 900);
            }
          }
        }
      }

      function updatePickups(now) {
        for (const crumb of state.crumbs) {
          if (!crumb.taken && Math.hypot(crumb.x - state.player.x, crumb.y - state.player.y) < 24) {
            crumb.taken = true;
            state.score += 2;
            playSfx('crumb');
          }
        }
        for (const treat of state.treats) {
          if (!treat.taken && Math.hypot(treat.x - state.player.x, treat.y - state.player.y) < 34) {
            treat.taken = true;
            state.score += 10;
            playSfx('treat');
            applyTreat(treat.type);
          }
        }
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem(storageKey, String(state.best));
        }
      }

      function updateWinLose(now) {
        const objective = currentObjectivePoint();
        const chasingFrog = movingFrogObjectiveActive();
        if (!state.won && Math.hypot(state.player.x - objective.x, state.player.y - objective.y) < frogCatchDistance()) {
          state.score += 150;
          state.best = Math.max(state.best, state.score);
          localStorage.setItem(storageKey, String(state.best));
          if (chasingFrog) {
            state.frog.path = [];
            state.frog.wait = 0;
          }
          if (state.level < state.maxLevel) {
            const previousLevel = state.level;
            const previousForm = state.playerForm;
            if (chasingFrog) state.frog.active = false;
            startLevel(state.level + 1, previousForm);
            playSfx('levelUp');
            showMessage(chasingFrog
              ? 'Frosch gefangen: Maerchen-Magie!'
              : previousLevel === 1
                ? 'Magie bei B: Das Einhorn wird zur Prinzessin.'
                : 'Magie bei B: Die Gestalt wechselt.', 3400);
          } else {
            const finalForm = oppositeHeroForm(state.playerForm);
            startHeroMorph(state.playerForm, finalForm, levelTransitionMorphDuration);
            state.playerForm = finalForm;
            state.won = true;
            playSfx('win');
            showMessage(chasingFrog
              ? 'Frosch gefangen. Die Maerchen-Verwandlung ist vollendet!'
              : 'Du hast Stufe 5 geschafft. Die Verwandlung ist vollendet!', 5000);
          }
        }
        if (state.over || state.won) return;
        const caughtBy = activeWitches().find((witch) => Math.hypot(state.player.x - witch.x, state.player.y - witch.y) < 42);
        if (caughtBy) {
          if (mushroomPassThroughActive(now)) {
            return;
          }
          if (now < state.shieldUntil) {
            const w = centerOf(caughtBy === state.witch2 ? secondWitchStartCell : witchStartCell);
            caughtBy.x = w.x;
            caughtBy.y = w.y;
            caughtBy.path = [];
            caughtBy.frozenUntil = now + 1800;
            state.score += 25;
            playSfx('shieldBounce');
            showMessage('Shield repelled the witch +25.', 1500);
          } else {
            state.lives -= 1;
            if (state.lives <= 0) {
              state.over = true;
              playSfx('witchCatch');
              showMessage('The witch caught the unicorn. Tap to restart.', 5000);
            } else {
              playSfx('witchCatch');
              showMessage('Caught by the witch. Lives left: ' + state.lives, 1800);
              resetPositions();
            }
          }
        }
      }

      function update(dt, now) {
        const transitioning = levelTransitionActive(now);
        if (state.levelTransitionUntil && !transitioning) {
          state.levelTransitionUntil = 0;
          state.morphTravel = null;
          clearHeroMorph();
        }
        if (!state.over && !state.won && !transitioning) {
          clearInvalidPlayerPath(now);
          movePlayerAlongPath(dt, now);
          updateStench(dt, now);
          updateCrushBursts(now);
          updateTreePatrols(dt, now);
          updateFrog(dt, now);
          for (const witch of activeWitches()) updateWitch(witch, dt, now);
          updatePickups(now);
          updateWinLose(now);
        }
        state.camera.x += (state.player.x - state.camera.x) * Math.min(1, dt * 6);
        state.camera.y += (state.player.y - state.camera.y) * Math.min(1, dt * 6);
        clampCamera();
        if (state.messageUntil && now > state.messageUntil && !state.over && !state.won) {
          state.messageUntil = 0;
        }
        updateHud();
      }

      function isWavingTreeCell(c, r) {
        return ((c * 31 + r * 17) % 13 === 0 && (c + r) % 2 === 0) || (c * 7 + r * 29) % 41 === 0;
      }

      function drawPineTreeTile(x, y) {
        const cx = x + grid.tile / 2;
        ctx.fillStyle = '#1e7b3f';
        ctx.beginPath();
        ctx.moveTo(cx, y + 9);
        ctx.lineTo(x + 11, y + grid.tile - 10);
        ctx.lineTo(x + grid.tile - 11, y + grid.tile - 10);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#14592e';
        ctx.beginPath();
        ctx.moveTo(cx + 8, y + 18);
        ctx.lineTo(x + 18, y + grid.tile - 4);
        ctx.lineTo(x + grid.tile - 4, y + grid.tile - 6);
        ctx.closePath();
        ctx.fill();
      }

      function drawWavingTreeTile(x, y, c, r, now) {
        const sprite = scenerySprites.wavingTree;
        if (!sprite.ready) {
          drawPineTreeTile(x, y);
          return;
        }
        const offset = (c * 5 + r * 3) % 4;
        const frameIndex = (Math.floor(now / 185) + offset) % 4;
        const drawW = grid.tile * 1.48;
        const drawH = grid.tile * 1.48;
        const sway = Math.sin(now / 640 + c * 0.73 + r * 0.41) * 0.035;
        ctx.save();
        ctx.translate(x + grid.tile / 2, y + grid.tile + 9);
        ctx.rotate(sway);
        ctx.drawImage(
          sprite.image,
          frameIndex * sprite.frameW,
          0,
          sprite.frameW,
          sprite.frameH,
          -drawW / 2,
          -drawH,
          drawW,
          drawH
        );
        ctx.restore();
      }

      function drawMaze() {
        const now = performance.now();
        const leafActive = leafTreePassActive(now);
        const halfW = state.vw / (2 * state.zoom);
        const halfH = state.vh / (2 * state.zoom);
        const startC = clamp(Math.floor((state.camera.x - halfW) / grid.tile) - 2, 0, grid.cols - 1);
        const endC = clamp(Math.floor((state.camera.x + halfW) / grid.tile) + 2, 0, grid.cols - 1);
        const startR = clamp(Math.floor((state.camera.y - halfH) / grid.tile) - 2, 0, grid.rows - 1);
        const endR = clamp(Math.floor((state.camera.y + halfH) / grid.tile) + 2, 0, grid.rows - 1);
        ctx.save();
        ctx.translate(state.vw / 2, state.vh / 2);
        ctx.scale(state.zoom, state.zoom);
        ctx.translate(-state.camera.x, -state.camera.y);
        ctx.fillStyle = '#14331d';
        ctx.fillRect(0, 0, world.w, world.h);
        for (let r = startR; r <= endR; r += 1) {
          for (let c = startC; c <= endC; c += 1) {
            const x = c * grid.tile;
            const y = r * grid.tile;
            if (state.maze[r][c] === 1) {
              const shade = (r * 7 + c * 11) % 4;
              ctx.fillStyle = shade < 2 ? '#9a7b46' : '#8c6e3f';
              ctx.fillRect(x, y, grid.tile, grid.tile);
              ctx.fillStyle = 'rgb(255 239 170 / 8%)';
              ctx.beginPath();
              ctx.ellipse(x + grid.tile / 2, y + grid.tile / 2, grid.tile * 0.34, grid.tile * 0.22, 0.4, 0, Math.PI * 2);
              ctx.fill();
            } else {
              const waving = isWavingTreeCell(c, r);
              ctx.fillStyle = leafActive && waving ? '#335c2a' : '#0d2818';
              ctx.fillRect(x, y, grid.tile, grid.tile);
              if (waving) {
                if (leafActive) {
                  ctx.fillStyle = 'rgb(200 255 121 / 21%)';
                  ctx.beginPath();
                  ctx.ellipse(x + grid.tile / 2, y + grid.tile / 2, grid.tile * 0.38, grid.tile * 0.24, 0, 0, Math.PI * 2);
                  ctx.fill();
                  ctx.save();
                  ctx.globalAlpha = 0.54;
                  drawWavingTreeTile(x, y, c, r, now);
                  ctx.restore();
                } else {
                  drawWavingTreeTile(x, y, c, r, now);
                }
              } else {
                drawPineTreeTile(x, y);
              }
            }
          }
        }
        drawStartExit(now);
        ctx.restore();
      }

      function drawExitFrog(center, now) {
        const walking = frogTestMode || state.won || levelTransitionActive(now);
        const sprite = walking && scenerySprites.frogWalk.ready ? scenerySprites.frogWalk : scenerySprites.frog;
        const frameCount = walking && scenerySprites.frogWalk.ready ? frogWalkFrameCount : frogFrameCount;

      function drawTreat(treat, now) {
        const s = worldToScreen(treat.x, treat.y);
        if (s.x < -60 || s.y < -60 || s.x > state.vw + 60 || s.y > state.vh + 60) return;
        const pulse = Math.sin(now / 220 + treat.x) * 0.15 + 1;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.scale(state.zoom, state.zoom);
        ctx.shadowBlur = 18;
        const colors = { speed: '#ffb84f', shield: '#91eaff', freeze: '#c499ff', spark: '#ffe767', stink: '#88d95b', leaf: '#9dff65' };
        ctx.fillStyle = colors[treat.type];
        ctx.shadowColor = colors[treat.type];
        if (treat.type === 'speed') {
          ctx.beginPath();
          ctx.moveTo(18 * pulse, 0);
          ctx.lineTo(-14 * pulse, -11 * pulse);
          ctx.lineTo(-9 * pulse, 0);
          ctx.lineTo(-14 * pulse, 11 * pulse);
          ctx.closePath();
          ctx.fill();
        } else if (treat.type === 'shield') {
          ctx.beginPath();
          ctx.moveTo(0, -20 * pulse);
          ctx.lineTo(17 * pulse, -8 * pulse);
          ctx.lineTo(10 * pulse, 17 * pulse);
          ctx.lineTo(0, 23 * pulse);
          ctx.lineTo(-10 * pulse, 17 * pulse);
          ctx.lineTo(-17 * pulse, -8 * pulse);
          ctx.closePath();
          ctx.fill();
        } else if (treat.type === 'freeze') {
          ctx.beginPath();
          ctx.arc(0, -6 * pulse, 16 * pulse, Math.PI, Math.PI * 2);
          ctx.fill();
          ctx.fillRect(-6 * pulse, -6 * pulse, 12 * pulse, 24 * pulse);
        } else if (treat.type === 'spark') {
          for (let i = 0; i < 8; i += 1) {
            const a = i / 8 * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 11 * pulse, Math.sin(a) * 11 * pulse, 4 * pulse, 10 * pulse, a, 0, Math.PI * 2);
            ctx.fill();
          }
        } else if (treat.type === 'stink') {
          ctx.shadowBlur = 10;
          ctx.fillStyle = '#cc2a24';
          ctx.strokeStyle = '#2a1110';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(0, 20 * pulse);
          ctx.bezierCurveTo(-25 * pulse, 1 * pulse, -17 * pulse, -22 * pulse, 0, -17 * pulse);
          ctx.bezierCurveTo(18 * pulse, -23 * pulse, 27 * pulse, 1 * pulse, 0, 20 * pulse);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#4f7e2a';
          ctx.beginPath();
          ctx.moveTo(0, -17 * pulse);
          ctx.lineTo(-19 * pulse, -25 * pulse);
          ctx.lineTo(-7 * pulse, -7 * pulse);
          ctx.lineTo(0, -29 * pulse);
          ctx.lineTo(7 * pulse, -7 * pulse);
          ctx.lineTo(21 * pulse, -24 * pulse);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#7f5d35';
          for (const spot of [[-12, -2, 7], [9, 7, 6], [-3, 13, 5]]) {
            ctx.beginPath();
            ctx.arc(spot[0] * pulse, spot[1] * pulse, spot[2] * pulse, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.fillStyle = '#aeb9a0';
          for (const mold of [[10, -8, 8], [-10, 8, 6]]) {
            ctx.beginPath();
            ctx.arc(mold[0] * pulse, mold[1] * pulse, mold[2] * pulse, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.fillStyle = '#efd16d';
          for (let i = 0; i < 5; i += 1) {
            const a = i / 5 * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 10 * pulse, Math.sin(a) * 8 * pulse, 2 * pulse, 4 * pulse, a, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.strokeStyle = '#160b0b';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-9 * pulse, 0);
          ctx.quadraticCurveTo(-4 * pulse, 4 * pulse, 0, 0);
          ctx.moveTo(5 * pulse, 0);
          ctx.quadraticCurveTo(10 * pulse, 4 * pulse, 15 * pulse, 0);
          ctx.stroke();
        } else {
          ctx.shadowBlur = 16;
          ctx.fillStyle = '#9dff65';
          ctx.strokeStyle = '#17461e';

          ctx.beginPath();
          ctx.ellipse(0, 0, 13 * pulse, 25 * pulse, -0.72, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.strokeStyle = '#e2ffd1';

          ctx.stroke();

        ctx.restore();

      function drawStench(now) {
        ctx.save();
        for (const fog of state.stenchFogs) {
          const age = (now - fog.born) / fog.life;
          const alpha = Math.max(0, 1 - age);
          const radius = fog.r * (0.85 + age * 0.55) * state.zoom;
          const s = worldToScreen(fog.x, fog.y);
          if (s.x < -120 || s.y < -120 || s.x > state.vw + 120 || s.y > state.vh + 120) continue;
          const gradient = ctx.createRadialGradient(s.x, s.y, radius * 0.15, s.x, s.y, radius);
          gradient.addColorStop(0, `rgb(110 191 67 / ${0.5 * alpha})`);
          gradient.addColorStop(1, 'rgb(110 191 67 / 0)');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(s.x, s.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = `rgb(176 230 92 / ${0.22 * alpha})`;
          ctx.lineWidth = 3;
          for (let i = 0; i < 3; i += 1) {
            const a = fog.phase + i * 2.1 + age * 2;
            ctx.beginPath();
            ctx.arc(s.x + Math.cos(a) * radius * 0.24, s.y + Math.sin(a) * radius * 0.18, radius * (0.18 + i * 0.04), 0, Math.PI * 2);
            ctx.stroke();
          }
        }

        for (const bubble of state.stenchTrail) {
          const age = (now - bubble.born) / bubble.life;
          const alpha = Math.max(0, 1 - age);
          const s = worldToScreen(bubble.x, bubble.y);
          if (s.x < -80 || s.y < -80 || s.x > state.vw + 80 || s.y > state.vh + 80) continue;
          const wobble = Math.sin(now / 150 + bubble.phase) * 2 * state.zoom;
          const radius = bubble.r * (1 + age * 0.45) * state.zoom;
          ctx.fillStyle = `rgb(132 217 78 / ${0.32 * alpha})`;
          ctx.strokeStyle = `rgb(194 255 137 / ${0.7 * alpha})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(s.x + wobble, s.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = `rgb(230 255 193 / ${0.55 * alpha})`;
          ctx.beginPath();
          ctx.arc(s.x - radius * 0.28 + wobble, s.y - radius * 0.3, radius * 0.22, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function updateCrushBursts(now) {
        state.crushBursts = state.crushBursts.filter((burst) => now - burst.born < burst.life);
      }

      function drawCrushBursts(now) {
        if (!state.crushBursts.length) return;
        ctx.save();
        for (const burst of state.crushBursts) {
          const age = clamp((now - burst.born) / burst.life, 0, 1);
          const alpha = Math.max(0, 1 - age);
          const s = worldToScreen(burst.x, burst.y);
          if (s.x < -160 || s.y < -160 || s.x > state.vw + 160 || s.y > state.vh + 160) continue;
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.scale(state.zoom, state.zoom);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#db1f32';
          ctx.strokeStyle = '#5b0711';
          ctx.lineWidth = 3;
          for (const spot of burst.spots) {
            const spread = spot.distance * (0.45 + age * 1.05);
            const x = Math.cos(spot.angle) * spread;
            const y = Math.sin(spot.angle) * spread;
            const r = spot.radius * (1 - age * 0.35);
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(spot.angle + Math.sin(age * 7 + spot.phase) * 0.4);
            ctx.beginPath();
            ctx.ellipse(0, 0, r * spot.stretch, r, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          }
          ctx.fillStyle = '#ff4058';
          ctx.beginPath();
          ctx.arc(0, 0, 18 * (1 + age * 0.35), 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        const newest = state.crushBursts.reduce((latest, burst) => Math.max(latest, burst.born), 0);
        const flashAge = clamp((now - newest) / 420, 0, 1);
        if (flashAge < 1) {
          ctx.fillStyle = `rgb(190 0 30 / ${0.18 * (1 - flashAge)})`;
          ctx.fillRect(0, 0, state.vw, state.vh);
        }
        ctx.restore();
      }

      function drawHeroMorph(now) {
        const sprite = characterSprites.morph;

        if (!sprite.ready || !state.morphFrom || !state.morphTo) return false;
        const duration = Math.max(1, state.morphDuration || 3200);
        const progress = clamp((now - state.morphStartedAt) / duration, 0, 1);
        const princessToUnicorn = state.morphFrom === 'princess' && state.morphTo === 'unicorn';
        const frameProgress = princessToUnicorn ? progress : 1 - progress;
        const frameIndex = clamp(Math.floor(frameProgress * morphFrameCount), 0, morphFrameCount - 1);
        const walkFrameIndex = Math.floor(now / 115) % morphWalkFrameCount;
        const travel = state.morphTravel;
        const travelProgress = progress * progress * (3 - 2 * progress);
        const s = travel
          ? {
              x: travel.start.x + (travel.end.x - travel.start.x) * travelProgress,
              y: travel.start.y + (travel.end.y - travel.start.y) * travelProgress
            }
          : worldToScreen(state.player.x, state.player.y);
        const renderScale = travel ? clamp(Math.min(state.vw, state.vh) / 600, 0.72, 1.04) : state.zoom;
        const facing = travel ? travel.facing : state.player.facing || 1;
        const pulse = Math.sin(progress * Math.PI);
        const bob = Math.sin(now / 130) * (travel ? 5 : 2.5) * (travel ? 1 : pulse);
        ctx.save();
        if (travel) {
          ctx.strokeStyle = 'rgb(255 231 103 / 35%)';
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(travel.start.x, travel.start.y);
          ctx.lineTo(s.x, s.y);
          ctx.stroke();

        ctx.translate(s.x, s.y + bob * renderScale);
        ctx.scale(renderScale, renderScale);
        ctx.fillStyle = 'rgb(0 0 0 / 25%)';
        ctx.beginPath();
        ctx.ellipse(0, 25, 44 + pulse * 8, 11 + pulse * 2, 0, 0, Math.PI * 2);

        ctx.arc(0, -34, 62 + Math.sin(now / 120) * 5, 0, Math.PI * 2);

        ctx.beginPath();
        ctx.arc(0, -34, 44 + Math.cos(now / 150) * 5, 0, Math.PI * 2);

        for (let i = 0; i < 9; i += 1) {

        if (!drawSpriteGridFrame(walkSprite, walkFrameIndex, frameIndex, facing)) {

        }
        ctx.restore();
        return true;

        const frameIndex = clamp(Math.round((1 - progress) * (morphFrameCount - 1)), 0, morphFrameCount - 1);

        ctx.restore();
        return true;

        ctx.quadraticCurveTo(52, 0 + frame.claw * 5, 58, 4);
        ctx.quadraticCurveTo(53, 8, 47, 8);
        ctx.quadraticCurveTo(51, 13, 45, 15);
        ctx.quadraticCurveTo(41, 11, 43, 4);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = palette.robe;
        ctx.lineWidth = 11;
        ctx.beginPath();
        ctx.moveTo(-18, -4);
        ctx.quadraticCurveTo(2, 7, 31, 10);
        ctx.stroke();
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = palette.skin;
        ctx.beginPath();
        ctx.ellipse(36, 10, 8, 5, 0.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawWitch(now, actor = state.witch, sprite = characterSprites.witch) {
        const s = worldToScreen(actor.x, actor.y);
        const frozen = now < actor.frozenUntil;
        const passable = mushroomPassThroughActive(now);
        const step = Number.isFinite(actor.step) ? actor.step : 0;
        const moving = Array.isArray(actor.path) && actor.path.length > 0 && !frozen;
        const frameIndex = moving ? Math.abs(Math.floor(step * 1.35)) % witchRunFrames.length : 1;
        const frame = witchRunFrames[frameIndex] || witchRunFrames[1] || witchRunFrames[0];
        const feet = witchAnimatedFeet(step, moving, frame);
        const palette = witchPalette(frozen);
        const bob = moving ? Math.sin(step * 1.25) * 2.6 : Math.sin(now / 220) * 2;
        const lean = moving ? Math.sin(step * 0.65) * 0.035 : 0;
        ctx.save();
        ctx.translate(s.x, s.y + bob * state.zoom);
        ctx.scale(state.zoom, state.zoom);
        ctx.fillStyle = 'rgb(0 0 0 / 26%)';
        ctx.beginPath();
        ctx.ellipse(0, 29, 34, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        if (passable) {
          ctx.globalAlpha = 0.62;
        }

        if (drawSpriteFrame(sprite, frameIndex, actor.facing || -1)) {
          if (frozen) {
            ctx.strokeStyle = 'rgb(200 249 255 / 70%)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, -22, 45, 0.2, Math.PI * 1.6);
            ctx.stroke();
          }
          ctx.restore();
          return;
        }

        ctx.rotate(lean * (actor.facing || -1));
        ctx.scale((actor.facing || -1) * 0.58, 0.58);
        drawWitchBoot(feet[1][0], feet[1][1], feet[1][2], true, palette);
        drawWitchStaff(frame, frozen, palette);
        drawWitchCape(frame, palette);
        drawWitchRobe(frame, palette);
        drawWitchBoot(feet[0][0], feet[0][1], feet[0][2], false, palette);
        drawWitchHair(frame, palette);
        drawWitchArms(frame, palette);
        drawWitchHead(frame, palette);
        drawWitchHat(frame, palette);
        if (frozen) {
          ctx.strokeStyle = 'rgb(200 249 255 / 70%)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(9, -22, 54, 0.2, Math.PI * 1.6);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawEvilTree(now, tree) {
        const s = worldToScreen(tree.x, tree.y);
        const sprite = scenerySprites.evilTree;
        const step = Number.isFinite(tree.step) ? tree.step : 0;
        const frameIndex = Math.abs(Math.floor(step * 1.05)) % evilTreeFrameCount;
        const drawW = grid.tile * 1.68;
        const drawH = grid.tile * 1.68;
        const bob = Math.sin(step * 1.1) * 1.6;
        ctx.save();
        ctx.translate(s.x, s.y + bob * state.zoom);
        ctx.scale(state.zoom, state.zoom);
        ctx.fillStyle = 'rgb(0 0 0 / 34%)';
        ctx.beginPath();
        ctx.ellipse(0, 31, 40, 11, 0, 0, Math.PI * 2);
        ctx.fill();
        if (sprite.ready) {
          ctx.save();
          ctx.scale((tree.facing || -1) < 0 ? 1 : -1, 1);
          ctx.drawImage(
            sprite.image,
            frameIndex * sprite.frameW,
            0,
            sprite.frameW,
            sprite.frameH,
            -drawW / 2,
            -drawH + 26,
            drawW,
            drawH
          );
          ctx.restore();
        } else {
          ctx.fillStyle = '#2b1a36';
          ctx.strokeStyle = '#050406';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(0, -34, 42, 36, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#51341f';
          ctx.fillRect(-21, -34, 42, 62);
          ctx.strokeRect(-21, -34, 42, 62);
          ctx.fillStyle = '#f0e8a6';
          ctx.beginPath();
          ctx.arc(-10, -12, 5, 0, Math.PI * 2);
          ctx.arc(10, -12, 5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawGoodTree(now, tree) {
        const s = worldToScreen(tree.x, tree.y);
        const sprite = scenerySprites.goodTree;
        const step = Number.isFinite(tree.step) ? tree.step : 0;
        const frameIndex = Math.abs(Math.floor(step * 1.05)) % evilTreeFrameCount;
        const drawW = grid.tile * 1.6;
        const drawH = grid.tile * 1.6;
        const bob = Math.sin(step * 1.1) * 1.4;
        ctx.save();
        ctx.translate(s.x, s.y + bob * state.zoom);
        ctx.scale(state.zoom, state.zoom);
        ctx.fillStyle = 'rgb(147 255 127 / 22%)';
        ctx.beginPath();
        ctx.ellipse(0, 31, 38, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        if (sprite.ready) {
          ctx.save();
          ctx.scale((tree.facing || -1) < 0 ? 1 : -1, 1);
          ctx.drawImage(
            sprite.image,
            frameIndex * sprite.frameW,
            0,
            sprite.frameW,
            sprite.frameH,
            -drawW / 2,
            -drawH + 26,
            drawW,
            drawH
          );
          ctx.restore();
        } else {
          ctx.fillStyle = '#65b943';
          ctx.strokeStyle = '#0b220d';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(0, -42, 43, 35, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#8a5b2b';
          ctx.fillRect(-18, -32, 36, 60);
          ctx.strokeRect(-18, -32, 36, 60);
          ctx.fillStyle = '#f8fff0';
          ctx.beginPath();
          ctx.arc(-9, -10, 5, 0, Math.PI * 2);
          ctx.arc(9, -10, 5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawMinimap() {
        const size = Math.min(96, Math.max(72, Math.min(state.vw, state.vh) * 0.22));
        const x = 10;
        const y = state.vh - size - 10;
        ctx.save();
        ctx.fillStyle = 'rgb(3 10 8 / 58%)';
        ctx.strokeStyle = 'rgb(223 255 236 / 34%)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(x, y, size, size, 8) : ctx.rect(x, y, size, size);
        ctx.fill();
        ctx.stroke();
        const sx = size / world.w;
        const sy = size / world.h;
        ctx.fillStyle = '#8c6e3f';
        for (let r = 0; r < grid.rows; r += 1) {
          for (let c = 0; c < grid.cols; c += 1) {
            if (state.maze[r][c] === 1) ctx.fillRect(x + c * grid.tile * sx, y + r * grid.tile * sy, Math.max(1, grid.tile * sx), Math.max(1, grid.tile * sy));
          }
        }
        ctx.fillStyle = '#9df7d0';
        ctx.fillRect(x + startCell.c * grid.tile * sx - 1.5, y + startCell.r * grid.tile * sy - 1.5, 3, 3);
        if (!movingFrogObjectiveActive()) {
          ctx.fillStyle = '#ffd866';
          ctx.fillRect(x + exitCell.c * grid.tile * sx - 1.5, y + exitCell.r * grid.tile * sy - 1.5, 3, 3);
        }
        ctx.fillStyle = '#ff78c8';
        ctx.beginPath();
        ctx.arc(x + state.player.x * sx, y + state.player.y * sy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#bd77ff';
        ctx.beginPath();
        ctx.arc(x + state.witch.x * sx, y + state.witch.y * sy, 3, 0, Math.PI * 2);
        ctx.fill();
        if (state.witch2.active) {
          ctx.fillStyle = '#73f0ff';
          ctx.beginPath();
          ctx.arc(x + state.witch2.x * sx, y + state.witch2.y * sy, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = '#2b102f';
        for (const tree of state.evilTrees) {
          ctx.beginPath();
          ctx.arc(x + tree.x * sx, y + tree.y * sy, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = '#8cff6f';
        for (const tree of state.goodTrees) {
          ctx.beginPath();
          ctx.arc(x + tree.x * sx, y + tree.y * sy, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        if (movingFrogObjectiveActive()) {
          ctx.fillStyle = '#82ff58';
          ctx.beginPath();
          ctx.arc(x + state.frog.x * sx, y + state.frog.y * sy, 3.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawLevelIntro(now) {
        if (!state.levelIntroUntil || now >= state.levelIntroUntil) return;
        const config = configForLevel(state.level);
        const remaining = Math.max(0, state.levelIntroUntil - now);
        const alpha = Math.min(1, remaining / 900);
        const pad = Math.max(12, Math.min(20, state.vw * 0.035));
        const width = Math.min(state.vw - pad * 2, 560);
        const x = (state.vw - width) / 2;
        const y = 12;
        const height = state.vw < 430 ? 82 : 92;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgb(3 12 9 / 78%)';
        ctx.strokeStyle = 'rgb(232 255 238 / 42%)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(x, y, width, height, 8) : ctx.rect(x, y, width, height);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#f4fff5';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 ' + (state.vw < 430 ? 25 : 30) + 'px Arial, Helvetica, sans-serif';
        ctx.fillText(config.title + ' - ' + config.difficulty, state.vw / 2, y + 27);
        ctx.font = '700 ' + (state.vw < 430 ? 13 : 15) + 'px Arial, Helvetica, sans-serif';
        ctx.fillStyle = '#d9ffe5';
        ctx.fillText(config.subtitle, state.vw / 2, y + 56);
        ctx.font = '700 12px Arial, Helvetica, sans-serif';
        ctx.fillStyle = '#ffd866';
        ctx.fillText('Anzeige endet in ' + Math.ceil(remaining / 1000) + ' s', state.vw / 2, y + height - 15);
        ctx.restore();
      }

      function draw() {
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        ctx.clearRect(0, 0, state.vw, state.vh);
        const bg = ctx.createLinearGradient(0, 0, 0, state.vh);
        bg.addColorStop(0, '#0b281e');
        bg.addColorStop(1, '#06130f');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, state.vw, state.vh);
        if (!currentSpriteSetReady()) {
          drawLoadingScreen();
          return;
        }
        drawMaze();
        drawPathLine();
        for (const crumb of state.crumbs) if (!crumb.taken) drawCrumb(crumb);
        for (const treat of state.treats) if (!treat.taken) drawTreat(treat, performance.now());
        drawStench(performance.now());
        const now = performance.now();
        const actors = [
          { y: state.player.y, draw: () => drawHero(now) },
          { y: state.witch.y, draw: () => drawWitch(now, state.witch, characterSprites.witch) }
        ];
        if (state.witch2.active) {
          actors.push({ y: state.witch2.y, draw: () => drawWitch(now, state.witch2, characterSprites.witch2) });
        }
        for (const tree of state.evilTrees) {
          actors.push({ y: tree.y, draw: () => drawEvilTree(now, tree) });
        }
        for (const tree of state.goodTrees) {
          actors.push({ y: tree.y, draw: () => drawGoodTree(now, tree) });
        }
        if (movingFrogObjectiveActive()) {
          actors.push({ y: state.frog.y, draw: () => drawRoamingFrog(now) });
        }
        actors.sort((a, b) => a.y - b.y);
        for (const actor of actors) actor.draw();
        drawLevelTransition(now);
        drawCrushBursts(now);
        drawMinimap();
        drawLevelIntro(now);
      }

      let lastDrawAt = 0;

      function stepFrame(now) {
        const dt = Math.min(0.05, (now - state.last) / 1000);
        state.last = now;
        update(dt, now);
        draw();
        lastDrawAt = performance.now();
      }

      function frame(now) {
        stepFrame(now);
        requestAnimationFrame(frame);
      }

      let lastCanvasInput = 0;
      let pinch = null;

      function handleCanvasInput(clientX, clientY, source) {
        if (levelTransitionActive()) return;
        lastCanvasInput = performance.now();
        state.lastInput = source + ':' + Math.round(clientX) + ',' + Math.round(clientY);
        startBackgroundMusic();
        setDestination(clientX, clientY);
        updateHud();
      }

      canvas.addEventListener('pointerdown', (event) => {
        if (event.isPrimary === false) return;
        event.preventDefault();
        handleCanvasInput(event.clientX, event.clientY, 'pointer');
      }, { passive: false });

      canvas.addEventListener('touchstart', (event) => {
        if (event.touches && event.touches.length === 2) {
          const a = event.touches[0];
          const b = event.touches[1];
          event.preventDefault();
          pinch = {
            distance: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY),
            zoom: state.zoom,
            x: (a.clientX + b.clientX) / 2,
            y: (a.clientY + b.clientY) / 2
          };
          return;
        }
        if (window.PointerEvent && performance.now() - lastCanvasInput < 120) return;
        const touch = event.changedTouches && event.changedTouches[0];
        if (!touch) return;
        event.preventDefault();
        handleCanvasInput(touch.clientX, touch.clientY, 'touch');
      }, { passive: false });

      canvas.addEventListener('touchmove', (event) => {
        if (!pinch || !event.touches || event.touches.length !== 2) return;
        const a = event.touches[0];
        const b = event.touches[1];
        const distance = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        const x = (a.clientX + b.clientX) / 2;
        const y = (a.clientY + b.clientY) / 2;
        event.preventDefault();
        setZoom(pinch.zoom * (distance / Math.max(1, pinch.distance)), x, y);
      }, { passive: false });

      canvas.addEventListener('touchend', (event) => {
        if (!event.touches || event.touches.length < 2) pinch = null;
      }, { passive: false });

      canvas.addEventListener('mousedown', (event) => {
        if (event.button !== 0 || performance.now() - lastCanvasInput < 120) return;
        event.preventDefault();
        handleCanvasInput(event.clientX, event.clientY, 'mouse');
      });

      canvas.addEventListener('click', (event) => {
        if (performance.now() - lastCanvasInput < 180) return;
        event.preventDefault();
        handleCanvasInput(event.clientX, event.clientY, 'click');
      });

      canvas.addEventListener('wheel', (event) => {
        event.preventDefault();
        setZoom(state.zoom * (event.deltaY > 0 ? 0.9 : 1.1), event.clientX, event.clientY);
      }, { passive: false });

      window.addEventListener('keydown', (event) => {
        const current = cellOf(state.player.x, state.player.y);
        let next = null;
        if (event.key === '+' || event.key === '=') {
          event.preventDefault();
          startBackgroundMusic();
          setZoom(state.zoom * 1.12);
          return;
        }
        if (event.key === '-' || event.key === '_') {
          event.preventDefault();
          startBackgroundMusic();
          setZoom(state.zoom / 1.12);
          return;
        }
        if (event.key === '0') {
          event.preventDefault();
          startBackgroundMusic();
          setZoom(0.75);
          return;
        }
        if (event.key === 'ArrowLeft' || event.key === 'a') next = { c: current.c - 1, r: current.r };
        else if (event.key === 'ArrowRight' || event.key === 'd') next = { c: current.c + 1, r: current.r };
        else if (event.key === 'ArrowUp' || event.key === 'w') next = { c: current.c, r: current.r - 1 };
        else if (event.key === 'ArrowDown' || event.key === 's') next = { c: current.c, r: current.r + 1 };
        else return;
        event.preventDefault();
        startBackgroundMusic();
        if (next && isPlayerPassable(next, performance.now())) state.player.path = [centerOf(next)];
      });

      window.addEventListener('resize', resize);
      resize();
      reset();
      draw();
      requestAnimationFrame(frame);
      setInterval(() => {
        const now = performance.now();
        if (now - lastDrawAt > 140) stepFrame(now);
      }, 80);
      function aiRouteToExit(now) {
        const current = cellOf(state.player.x, state.player.y);
        const target = currentObjectiveCell();
        const passable = (cell) => cellsMatch(cell, current) || isPlayerPassable(cell, now);
        if (!passable(current) || !passable(target)) return [];
        const hazardCost = (cell) => {
          let cost = 1;
          for (const witch of activeWitches()) {
            const d = cellDistance(cell, cellOf(witch.x, witch.y));
            if (d === 0) cost += 220;
            else if (d === 1) cost += 52;
            else if (d === 2) cost += 16;
            else if (d === 3) cost += 5;
          }
          for (const tree of state.evilTrees) {
            const d = cellDistance(cell, cellOf(tree.x, tree.y));
            if (d === 0) cost += 160;
            else if (d === 1) cost += 22;
          }
          return cost;
        };
        const startKey = cellKey(current);
        const costs = new Map([[startKey, 0]]);
        const previous = new Map();
        const queue = [{ cell: current, cost: 0 }];
        while (queue.length) {
          queue.sort((a, b) => a.cost - b.cost);
          const currentEntry = queue.shift();
          const cur = currentEntry.cell;
          const curKey = cellKey(cur);
          if (currentEntry.cost !== costs.get(curKey)) continue;
          if (cellsMatch(cur, target)) {
            const path = [cur];
            let key = curKey;
            while (previous.has(key)) {
              const prior = previous.get(key);
              path.push(prior);
              key = cellKey(prior);
            }
            return path.reverse();
          }
          for (const dir of dirs) {
            const next = { c: cur.c + dir.dc, r: cur.r + dir.dr };
            if (!passable(next)) continue;
            const nextKey = cellKey(next);
            const nextCost = currentEntry.cost + hazardCost(next);
            if (costs.has(nextKey) && costs.get(nextKey) <= nextCost) continue;
            costs.set(nextKey, nextCost);
            previous.set(nextKey, cur);
            queue.push({ cell: next, cost: nextCost });
          }
        }
        return [];
      }

      function aiWitchPressure(cell) {
        return activeWitches().reduce((nearest, witch) => {
          const witchCell = cellOf(witch.x, witch.y);
          return Math.min(nearest, cellDistance(cell, witchCell));
        }, 99);
      }

      function aiPlanSurvivalMove(now, stats) {
        const current = cellOf(state.player.x, state.player.y);
        const target = currentObjectiveCell();
        const passable = (cell) => cellsMatch(cell, current) || isPlayerPassable(cell, now);
        const queue = [current];
        const seen = new Set([cellKey(current)]);
        const previous = new Map();
        let best = current;
        let bestScore = -Infinity;
        while (queue.length) {
          const cur = queue.shift();
          const pressure = aiWitchPressure(cur);
          const score = pressure * 9 - cellDistance(cur, target) * 0.35 - cellDistance(cur, current) * 0.08;
          if (score > bestScore) {
            bestScore = score;
            best = cur;
          }
          for (const dir of dirs) {
            const next = { c: cur.c + dir.dc, r: cur.r + dir.dr };
            const key = cellKey(next);
            if (seen.has(key) || !passable(next)) continue;
            seen.add(key);
            previous.set(key, cur);
            queue.push(next);
          }
        }
        if (cellsMatch(best, current)) return false;
        const path = [best];
        let key = cellKey(best);
        while (previous.has(key)) {
          const prior = previous.get(key);
          path.push(prior);
          key = cellKey(prior);
        }
        path.reverse();
        state.player.path = path.slice(1, Math.min(path.length, 5)).map(centerOf);
        state.lastTarget = cellKey(best);
        state.lastPathLength = path.length;
        stats.replans += 1;
        return true;
      }

      function aiPlanNextMove(now, stats) {
        const route = aiRouteToExit(now);
        stats.routeSamples += 1;
        stats.routeLengthTotal += route.length;
        stats.maxRouteLength = Math.max(stats.maxRouteLength, route.length);
        if (route.length <= 1) {
          stats.noRouteFrames += 1;
          return aiPlanSurvivalMove(now, stats);
        }
        const next = route[1];
        if (aiWitchPressure(next) <= 1 && route.length > 4) {
          const current = route[0];
          const passable = (cell) => cellsMatch(cell, current) || isPlayerPassable(cell, now);
          const detours = dirs
            .map((dir) => ({ c: current.c + dir.dc, r: current.r + dir.dr }))
            .filter((cell) => passable(cell) && !cellsMatch(cell, next))
            .map((cell) => {
              const path = findPath(cell, currentObjectiveCell(), passable);
              return {
                cell,
                routeLength: path.length || 999,
                pressure: aiWitchPressure(cell)
              };
            })
            .filter((candidate) => candidate.routeLength < 999)
            .sort((a, b) => (b.pressure - a.pressure) || (a.routeLength - b.routeLength));
          stats.cautionFrames += 1;
          if (detours.length && detours[0].pressure > aiWitchPressure(next)) {
            state.player.path = [centerOf(detours[0].cell)];
            state.lastTarget = cellKey(detours[0].cell);
            state.lastPathLength = detours[0].routeLength;
            stats.replans += 1;
            return true;
          }
        }
        const lookahead = Math.min(route.length - 1, 2 + Math.min(4, state.level));
        state.player.path = route.slice(1, lookahead + 1).map(centerOf);
        state.lastTarget = cellKey(route[lookahead]);
        state.lastPathLength = route.length;
        stats.replans += 1;
        return true;
      }

      function observedDifficultyScore(stats, config, completed) {
        const avgRoute = stats.routeSamples ? stats.routeLengthTotal / stats.routeSamples : 0;
        const noRouteSeconds = stats.noRouteFrames * stats.tickSeconds;
        const risk = stats.witchNearFrames * 0.05
          + stats.treePushes * 2.2
          + stats.treeCrushes * 8
          + stats.livesLost * 6
          + noRouteSeconds * 1.4
          + stats.cautionFrames * 0.025;
        const base = config.level * 8
          + (config.level - 1) * 4
          + config.gatePlan.length * 1.3
          + (config.witchCount - 1) * 5
          + Math.max(0, config.witchSpeed - 160) * 0.08
          + Math.max(0, config.evilTreeSpeed - 90) * 0.05;
        return Math.round((base + avgRoute * 0.12 + risk + (completed ? 0 : 12)) * 10) / 10;
      }

      function runDifficultyTrial(level, options = {}) {
        const config = configForLevel(level);
        const tickMs = options.tickMs || 55;
        const maxSeconds = options.maxSeconds || 100;
        const maxFrames = Math.ceil(maxSeconds * 1000 / tickMs);
        const previousValidationMode = state.validationMode;
        state.validationMode = true;
        state.score = 0;
        state.lives = 3;
        startLevel(level);
        state.levelIntroUntil = 0;
        state.messageUntil = 0;
        const startLives = state.lives;
        const startPushes = state.treePushes;
        const startCrushes = state.treeCrushes;
        const targetLevel = state.level;
        const stats = {
          level: targetLevel,
          tickSeconds: tickMs / 1000,
          replans: 0,
          routeSamples: 0,
          routeLengthTotal: 0,
          maxRouteLength: 0,
          noRouteFrames: 0,
          cautionFrames: 0,
          witchNearFrames: 0,
          treePushes: 0,
          treeCrushes: 0,
          livesLost: 0,
          treeGateWindows: movingTreeGateWindowCount(),
          maxTreeOverlaps: movingTreeOverlapCount()
        };
        let simNow = performance.now();
        state.last = simNow;
        let completed = false;
        let frames = 0;
        for (; frames < maxFrames; frames += 1) {
          if (!state.player.path.length || frames % 12 === 0) aiPlanNextMove(simNow, stats);
          const playerCell = cellOf(state.player.x, state.player.y);
          if (aiWitchPressure(playerCell) <= 3) stats.witchNearFrames += 1;
          update(tickMs / 1000, simNow);
          stats.maxTreeOverlaps = Math.max(stats.maxTreeOverlaps, movingTreeOverlapCount());
          if (state.level !== targetLevel || state.won) {
            completed = true;
            frames += 1;
            break;
          }
          if (state.over) {
            frames += 1;
            break;
          }
          simNow += tickMs;
        }
        stats.treePushes = state.treePushes - startPushes;
        stats.treeCrushes = state.treeCrushes - startCrushes;
        stats.livesLost = startLives - state.lives;
        const avgRouteLength = stats.routeSamples ? stats.routeLengthTotal / stats.routeSamples : 0;
        const result = {
          level: targetLevel,
          title: config.title,
          difficultyLabel: config.difficulty,
          completed,
          outcome: completed ? 'completed' : state.over ? 'caught-or-crushed' : 'timeout',
          simulatedSeconds: Math.round(frames * tickMs / 100) / 10,
          avgRouteLength: Math.round(avgRouteLength * 10) / 10,
          maxRouteLength: stats.maxRouteLength,
          noRouteSeconds: Math.round(stats.noRouteFrames * tickMs / 100) / 10,
          replans: stats.replans,
          cautionFrames: stats.cautionFrames,
          witchNearFrames: stats.witchNearFrames,
          treePushes: stats.treePushes,
          treeCrushes: stats.treeCrushes,
          livesLost: stats.livesLost,
          treeGateWindows: stats.treeGateWindows,
          treeOverlaps: stats.maxTreeOverlaps,
          difficultyScore: observedDifficultyScore(stats, config, completed)
        };
        state.validationMode = previousValidationMode;
        return result;
      }

      function average(list, field) {
        if (!list.length) return 0;
        return list.reduce((sum, item) => sum + Number(item[field] || 0), 0) / list.length;
      }

      function summarizeDifficultyRuns(level, runs) {
        const completed = runs.filter((run) => run.completed).length;
        const successRate = runs.length ? completed / runs.length : 0;
        const avgScore = average(runs, 'difficultyScore');
        return {
          level,
          runs: runs.length,
          completed,
          successRate: Math.round(successRate * 100) / 100,
          avgSimulatedSeconds: Math.round(average(runs, 'simulatedSeconds') * 10) / 10,
          avgDifficultyScore: Math.round(avgScore * 10) / 10,
          avgRouteLength: Math.round(average(runs, 'avgRouteLength') * 10) / 10,
          avgNoRouteSeconds: Math.round(average(runs, 'noRouteSeconds') * 10) / 10,
          avgTreePushes: Math.round(average(runs, 'treePushes') * 10) / 10,
          avgTreeCrushes: Math.round(average(runs, 'treeCrushes') * 10) / 10,
          avgLivesLost: Math.round(average(runs, 'livesLost') * 10) / 10,
          verdict: successRate >= 0.75 ? 'playable' : successRate >= 0.45 ? 'borderline' : 'too-hard'
        };
      }

      function runDifficultyBatch(options = {}) {
        const runsPerLevel = Math.max(1, Math.min(12, Math.round(options.runsPerLevel || 3)));
        const levels = (options.levels || levelConfigs.map((config) => config.level)).map(boundedLevel);
        const report = {
          generatedAt: new Date().toISOString(),
          assetVersion,
          protocol: 'actual-canvas-game-fast-forward',
          runsPerLevel,
          maxSeconds: options.maxSeconds || 100,
          tickMs: options.tickMs || 55,
          levels: []
        };
        for (const level of levels) {
          const runs = [];
          for (let i = 0; i < runsPerLevel; i += 1) {
            runs.push(runDifficultyTrial(level, options));
          }
          report.levels.push({
            config: configForLevel(level),
            summary: summarizeDifficultyRuns(level, runs),
            runs
          });
        }
        report.aggregate = {
          levelCount: report.levels.length,
          avgDifficultyScore: Math.round(average(report.levels.map((entry) => entry.summary), 'avgDifficultyScore') * 10) / 10,
          minSuccessRate: Math.min(...report.levels.map((entry) => entry.summary.successRate)),
          treeOverlapFailures: report.levels.reduce((sum, entry) => sum + entry.runs.filter((run) => run.treeOverlaps > 0).length, 0)
        };
        window.__lastUnicornDifficultyReport = report;
        writeDifficultyReport(report);
        reset();
        return report;
      }

      function writeDifficultyReport(report) {
        let node = document.getElementById('difficulty-report');
        if (!node) {
          node = document.createElement('script');
          node.id = 'difficulty-report';
          node.type = 'application/json';
          document.body.appendChild(node);
        }
        node.textContent = JSON.stringify(report, null, 2);
        canvas.dataset.validationStatus = 'complete';
        canvas.dataset.validationRuns = String(report.levels.reduce((sum, entry) => sum + entry.runs.length, 0));
        canvas.dataset.validationMinSuccess = String(report.aggregate.minSuccessRate);
        canvas.dataset.validationAvgDifficulty = String(report.aggregate.avgDifficultyScore);
        canvas.dataset.validationTreeOverlapFailures = String(report.aggregate.treeOverlapFailures);
      }

      window.__unicornMazeDifficultyProtocol = {
        runTrial: runDifficultyTrial,
        runBatch: runDifficultyBatch,
        configs: () => levelConfigs.map((config) => ({ ...config })),
        lastReport: () => window.__lastUnicornDifficultyReport || null
      };

      if (aiValidationMode) {
        canvas.dataset.validationStatus = 'running';
        setTimeout(() => {
          runDifficultyBatch({
            runsPerLevel: Number(urlParams.get('runs') || 3),
            maxSeconds: Number(urlParams.get('seconds') || 100),
            tickMs: Number(urlParams.get('tick') || 55)
          });
        }, 250);
      }

      window.__unicornMazeDebug = () => ({
        playerCell: cellOf(state.player.x, state.player.y),
        witchCell: cellOf(state.witch.x, state.witch.y),
        witch2Cell: state.witch2.active ? cellOf(state.witch2.x, state.witch2.y) : null,
        level: state.level,
        levelTitle: configForLevel(state.level).title,
        levelDifficulty: configForLevel(state.level).difficulty,
        levelIntroVisible: Boolean(state.levelIntroUntil && performance.now() < state.levelIntroUntil),
        maxLevel: state.maxLevel,
        objective: movingFrogObjectiveActive() ? 'frog' : 'exit',
        objectiveCell: currentObjectiveCell(),
        frogActive: movingFrogObjectiveActive(),
        frogCell: movingFrogObjectiveActive() ? cellOf(state.frog.x, state.frog.y) : null,
        frogPath: state.frog.path.length,
        frogDistance: movingFrogObjectiveActive() ? Math.round(Math.hypot(state.player.x - state.frog.x, state.player.y - state.frog.y)) : 0,
        frogProximity: frogProximityProgress(),
        playerForm: state.playerForm,
        morphActive: Boolean(state.morphUntil && performance.now() < state.morphUntil),
        morphFrom: state.morphFrom || null,
        morphTo: state.morphTo || null,
        levelTransitionActive: levelTransitionActive(),
        morphTravelActive: Boolean(state.morphTravel),
        score: state.score,
        lives: state.lives,
        won: state.won,
        over: state.over,
        treatsLeft: state.treats.filter((item) => !item.taken).length,
        stinkTreatsLeft: state.treats.filter((item) => !item.taken && item.type === 'stink').length,
        leafTreatsLeft: state.treats.filter((item) => !item.taken && item.type === 'leaf').length,
        crumbsLeft: state.crumbs.filter((item) => !item.taken).length,
        stenchBubbles: state.stenchTrail.length,
        stenchFogs: state.stenchFogs.length,
        crushBursts: state.crushBursts.length,
        stenchActive: performance.now() < state.stenchUntil,
        witchSlowed: performance.now() < state.witch.stenchUntil || performance.now() < state.witch2.stenchUntil,
        witchesPassable: mushroomPassThroughActive(performance.now()),
        leafTreePass: leafTreePassActive(performance.now()),
        leafTreePassableCells: (() => {
          let total = 0;
          for (let r = 1; r < grid.rows - 1; r += 1) {
            for (let c = 1; c < grid.cols - 1; c += 1) {
              if (isWavingTreePathCell({ c, r })) total += 1;
            }
          }
          return total;
        })(),
        normalPathToExitLength: findPath(cellOf(state.player.x, state.player.y), exitCell).length,
        pathToObjectiveLength: findPath(cellOf(state.player.x, state.player.y), currentObjectiveCell()).length,
        leafPathToExitLength: findPath(cellOf(state.player.x, state.player.y), exitCell, (cell) => isOpen(cell) || isWavingTreePathCell(cell)).length,
        reachableLeafTreeCell: (() => {
          const player = cellOf(state.player.x, state.player.y);
          const passable = (cell) => isOpen(cell) || isWavingTreePathCell(cell);
          for (let r = 1; r < grid.rows - 1; r += 1) {
            for (let c = 1; c < grid.cols - 1; c += 1) {
              const cell = { c, r };
              if (!isWavingTreePathCell(cell)) continue;
              const path = findPath(player, cell, passable);
              if (path.length) return { cell, pathLength: path.length };
            }
          }
          return null;
        })(),
        evilTrees: state.evilTrees.length,
        goodTrees: state.goodTrees.length,
        longestTreePatrol: longestMovingTreePatrol(),
        treeOverlaps: movingTreeOverlapCount(),
        treeGateWindows: movingTreeGateWindowCount(),
        gateWait: state.lastGateWait || 'none',
        treePushes: state.treePushes,
        treeCrushes: state.treeCrushes,
        lastTreeCollision: state.lastTreeCollision,
        evilTreeCells: state.evilTrees.map((tree) => ({
          id: tree.id,
          current: cellOf(tree.x, tree.y),
          next: tree.nextCell,
          patrolIndex: tree.patrolIndex,
          patrolDir: tree.patrolDir
        })),
        evilTreeEvents: state.evilTreeEventCount,
        evilTreeChanges: state.evilTreeChanges,
        evilTreeSwitches: state.evilTreeSwitches,
        evilTreeArchChanges: state.evilTreeArchChanges,
        lastEvilTreeArch: state.lastEvilTreeArch,
        lastEvilTreeRouteDelta: state.lastEvilTreeRouteDelta,
        evilTreeWaveTarget: state.evilTreeWaveTarget,
        evilTreeWaveRemaining: state.evilTreeWaveRemaining,
        mazeRevision: state.mazeRevision,
        nextEvilTreeIn: state.nextEvilTreeAt ? Math.max(0, Math.ceil((state.nextEvilTreeAt - performance.now()) / 1000)) : null,
        assetVersion,
        assetPhase: state.assetPhase,
        assetStats: { ...assetStats },
        currentSpritesReady: currentSpriteSetReady(),
        allSpritesReady: allSpritesReady(),
        music: musicStatus(),
        musicChunk: currentMusicIndex + 1,
        musicNextChunk: 'random',
        musicChunks: musicVariants.length,
        musicSrc: musicSrc(),
        sfxPlays: state.sfxPlays,
        lastSfx: state.lastSfx,
        sfxCount: Object.keys(sfxDefinitions).length,
        failedSprites: failedSprites(),
        princessSpriteReady: characterSprites.princess.ready,
        morphSpriteReady: characterSprites.morph.ready,
        morphWalkSpriteReady: characterSprites.morphWalk.ready,
        evilTreeSpriteReady: scenerySprites.evilTree.ready,
        goodTreeSpriteReady: scenerySprites.goodTree.ready,
        frogSpriteReady: scenerySprites.frog.ready,
        frogWalkSpriteReady: scenerySprites.frogWalk.ready,
        playerPath: state.player.path.length,
        witchPath: state.witch.path.length,
        witch2Path: state.witch2.path.length,
        playerStep: state.player.step,
        witchStep: state.witch.step,
        witch2Step: state.witch2.step,
        playerFacing: state.player.facing,
        witchFacing: state.witch.facing,
        witch2Facing: state.witch2.facing,
        zoom: state.zoom,
        lastInput: state.lastInput || 'none',
        canvas: { width: canvas.width, height: canvas.height, dpr: state.dpr },
        viewport: { width: state.vw, height: state.vh }
      });
    })();
  </script>
</body>
