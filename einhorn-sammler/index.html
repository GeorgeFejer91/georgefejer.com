<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Unicorn Labyrinth Chase | GeorgeFejer.com</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgb(6 14 18 / 76%);
      --panel-strong: rgb(6 14 18 / 90%);
      --line: rgb(221 255 236 / 22%);
      --text: #f2fff7;
      --muted: #b8d9cd;
      --glow: #9af7da;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #06130f;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100svh;
      display: block;
      background: #0c2418;
      touch-action: none;
      cursor: crosshair;
    }

  </style>
</head>
<body>
  <canvas id="world" aria-label="2D unicorn forest labyrinth chase game"></canvas>

  <script>
    (() => {
      const canvas = document.getElementById('world');
      const ctx = canvas.getContext('2d');
      const storageKey = 'unicornLabyrinthBest';
      const grid = { cols: 41, rows: 31, tile: 74 };
      const world = { w: grid.cols * grid.tile, h: grid.rows * grid.tile };
      const startCell = { c: 1, r: 1 };
      const exitCell = { c: grid.cols - 2, r: grid.rows - 2 };
      const witchStartCell = { c: grid.cols - 2, r: 1 };
      const secondWitchStartCell = { c: 1, r: grid.rows - 2 };
      const defaultStartLevel = 2;
      const dirs = [
        { dc: 1, dr: 0 },
        { dc: -1, dr: 0 },
        { dc: 0, dr: 1 },
        { dc: 0, dr: -1 }
      ];
      const state = {
        dpr: 1,
        vw: 0,
        vh: 0,
        maze: [],
        camera: { x: 0, y: 0 },
        zoom: 0.75,
        minZoom: 0.55,
        maxZoom: 1.35,
        player: { x: 0, y: 0, path: [], speed: 265, step: 0, angle: 0, facing: 1 },
        witch: { x: 0, y: 0, path: [], speed: 190, step: 0, repath: 0, frozenUntil: 0, stenchUntil: 0, facing: -1 },
        witch2: { x: 0, y: 0, path: [], speed: 210, step: 0, repath: 0, frozenUntil: 0, stenchUntil: 0, facing: 1, active: false },
        level: defaultStartLevel,
        maxLevel: 2,
        score: 0,
        lives: 3,
        best: Number(localStorage.getItem(storageKey) || 0),
        activeTreat: null,
        activeUntil: 0,
        shieldUntil: 0,
        messageUntil: 0,
        last: performance.now(),
        won: false,
        over: false,
        treats: [],
        crumbs: [],
        stenchTrail: [],
        stenchFogs: [],
        stenchUntil: 0,
        stenchEmit: 0
      };
      const characterSprites = {
        unicorn: loadSprite('assets/unicorn-run.png', 220, 160, 0.42, 32),
        witch: loadSprite('assets/witch-run.png', 214, 190, 0.43, 35),
        witch2: loadSprite('assets/witch-moon-run.png', 214, 190, 0.43, 35)
      };

      function loadSprite(src, frameW, frameH, scale, ground) {
        const image = new Image();
        const sprite = { image, frameW, frameH, scale, ground, ready: false, failed: false };
        image.onload = () => {
          sprite.ready = true;
          if (canvas.width) {
            updateHud();
            draw();
          }
        };
        image.onerror = () => {
          sprite.failed = true;
          if (canvas.width) updateHud();
        };
        image.src = src;
        return sprite;
      }

      function drawSpriteFrame(sprite, frameIndex, facing) {
        if (!sprite.ready) return false;
        const sourceFacesLeft = true;
        const flip = sourceFacesLeft && facing > 0 ? -1 : 1;
        const dx = -sprite.frameW * sprite.scale / 2;
        const dy = -sprite.frameH * sprite.scale + sprite.ground;
        ctx.save();
        ctx.scale(flip, 1);
        ctx.drawImage(
          sprite.image,
          frameIndex * sprite.frameW,
          0,
          sprite.frameW,
          sprite.frameH,
          dx,
          dy,
          sprite.frameW * sprite.scale,
          sprite.frameH * sprite.scale
        );
        ctx.restore();
        return true;
      }

      function rng(seed) {
        let value = seed >>> 0;
        return () => {
          value += 0x6D2B79F5;
          let t = value;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      const random = rng(6222026);
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const cellKey = (cell) => cell.r + ',' + cell.c;
      const centerOf = (cell) => ({ x: cell.c * grid.tile + grid.tile / 2, y: cell.r * grid.tile + grid.tile / 2 });
      const cellOf = (x, y) => ({ c: clamp(Math.floor(x / grid.tile), 0, grid.cols - 1), r: clamp(Math.floor(y / grid.tile), 0, grid.rows - 1) });
      const isOpen = (cell) => state.maze[cell.r] && state.maze[cell.r][cell.c] === 1;
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

      function clampCamera() {
        const halfW = state.vw / (2 * state.zoom);
        const halfH = state.vh / (2 * state.zoom);
        state.camera.x = world.w <= halfW * 2 ? world.w / 2 : clamp(state.camera.x, halfW, world.w - halfW);
        state.camera.y = world.h <= halfH * 2 ? world.h / 2 : clamp(state.camera.y, halfH, world.h - halfH);
      }

      function worldToScreen(x, y) {
        return {
          x: (x - state.camera.x) * state.zoom + state.vw / 2,
          y: (y - state.camera.y) * state.zoom + state.vh / 2
        };
      }

      function screenToWorldPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: state.camera.x + (clientX - rect.left - state.vw / 2) / state.zoom,
          y: state.camera.y + (clientY - rect.top - state.vh / 2) / state.zoom
        };
      }

      function setZoom(nextZoom, clientX = state.vw / 2, clientY = state.vh / 2) {
        const before = screenToWorldPoint(clientX, clientY);
        state.zoom = clamp(nextZoom, state.minZoom, state.maxZoom);
        const after = screenToWorldPoint(clientX, clientY);
        state.camera.x += before.x - after.x;
        state.camera.y += before.y - after.y;
        clampCamera();
        updateHud();
      }

      function shuffle(list) {
        for (let i = list.length - 1; i > 0; i -= 1) {
          const j = Math.floor(random() * (i + 1));
          [list[i], list[j]] = [list[j], list[i]];
        }
        return list;
      }

      function generateMaze() {
        state.maze = Array.from({ length: grid.rows }, () => Array.from({ length: grid.cols }, () => 0));
        const carve = (c, r) => {
          state.maze[r][c] = 1;
          for (const dir of shuffle([...dirs])) {
            const nc = c + dir.dc * 2;
            const nr = r + dir.dr * 2;
            if (nr <= 0 || nr >= grid.rows - 1 || nc <= 0 || nc >= grid.cols - 1 || state.maze[nr][nc]) continue;
            state.maze[r + dir.dr][c + dir.dc] = 1;
            carve(nc, nr);
          }
        };
        carve(startCell.c, startCell.r);
        state.maze[exitCell.r][exitCell.c] = 1;
        state.maze[witchStartCell.r][witchStartCell.c] = 1;
        state.maze[secondWitchStartCell.r][secondWitchStartCell.c] = 1;

        for (let i = 0; i < 95; i += 1) {
          const c = 2 + Math.floor(random() * (grid.cols - 4));
          const r = 2 + Math.floor(random() * (grid.rows - 4));
          if (state.maze[r][c] === 0) {
            const horizontal = state.maze[r][c - 1] && state.maze[r][c + 1];
            const vertical = state.maze[r - 1][c] && state.maze[r + 1][c];
            if (horizontal || vertical || random() < 0.12) state.maze[r][c] = 1;
          }
        }
      }

      function openCells() {
        const cells = [];
        for (let r = 1; r < grid.rows - 1; r += 1) {
          for (let c = 1; c < grid.cols - 1; c += 1) {
            if (state.maze[r][c] === 1) cells.push({ c, r });
          }
        }
        return cells;
      }

      function findPath(from, to) {
        if (!isOpen(from) || !isOpen(to)) return [];
        const queue = [from];
        const seen = new Set([cellKey(from)]);
        const prev = new Map();
        while (queue.length) {
          const cur = queue.shift();
          if (cur.c === to.c && cur.r === to.r) {
            const path = [cur];
            let k = cellKey(cur);
            while (prev.has(k)) {
              const p = prev.get(k);
              path.push(p);
              k = cellKey(p);
            }
            return path.reverse();
          }
          for (const dir of dirs) {
            const next = { c: cur.c + dir.dc, r: cur.r + dir.dr };
            const k = cellKey(next);
            if (seen.has(k) || !isOpen(next)) continue;
            seen.add(k);
            prev.set(k, cur);
            queue.push(next);
          }
        }
        return [];
      }

      function nearestOpenCell(x, y) {
        const start = cellOf(x, y);
        if (isOpen(start)) return start;
        const queue = [start];
        const seen = new Set([cellKey(start)]);
        while (queue.length) {
          const cur = queue.shift();
          for (const dir of dirs) {
            const next = { c: cur.c + dir.dc, r: cur.r + dir.dr };
            const k = cellKey(next);
            if (next.c < 0 || next.r < 0 || next.c >= grid.cols || next.r >= grid.rows || seen.has(k)) continue;
            if (isOpen(next)) return next;
            seen.add(k);
            queue.push(next);
          }
        }
        return startCell;
      }

      function directionalNeighbor(pos, current) {
        const origin = centerOf(current);
        const dx = pos.x - origin.x;
        const dy = pos.y - origin.y;
        const options = dirs
          .map((dir) => ({ cell: { c: current.c + dir.dc, r: current.r + dir.dr }, score: dx * dir.dc + dy * dir.dr }))
          .filter((option) => option.score > 0 && isOpen(option.cell))
          .sort((a, b) => b.score - a.score);
        if (options.length) return options[0].cell;
        return dirs.map((dir) => ({ c: current.c + dir.dc, r: current.r + dir.dr })).find(isOpen) || null;
      }

      function chooseFarCell(cells, reference, minDistance) {
        const filtered = cells.filter((cell) => Math.abs(cell.c - reference.c) + Math.abs(cell.r - reference.r) > minDistance);
        return filtered[Math.floor(random() * filtered.length)] || cells[Math.floor(random() * cells.length)];
      }

      function placeTreats() {
        state.treats = [];
        state.crumbs = [];
        const cells = openCells().filter((cell) => {
          const key = cellKey(cell);
          return key !== cellKey(startCell) && key !== cellKey(exitCell) && key !== cellKey(witchStartCell) && key !== cellKey(secondWitchStartCell);
        });
        const treatTypes = ['speed', 'shield', 'freeze', 'spark', 'stink'];
        for (let i = 0; i < 20; i += 1) {
          const cell = chooseFarCell(cells, startCell, 8);
          const p = centerOf(cell);
          state.treats.push({ ...p, cell, type: treatTypes[i % treatTypes.length], taken: false, pulse: random() * 6.28 });
        }
        for (let i = 0; i < 120; i += 1) {
          const cell = cells[Math.floor(random() * cells.length)];
          const p = centerOf(cell);
          state.crumbs.push({ x: p.x, y: p.y, taken: false });
        }
      }

      function resize() {
        state.dpr = Math.min(2.5, window.devicePixelRatio || 1);
        state.vw = window.innerWidth;
        state.vh = window.innerHeight;
        canvas.width = Math.floor(state.vw * state.dpr);
        canvas.height = Math.floor(state.vh * state.dpr);
        canvas.style.width = state.vw + 'px';
        canvas.style.height = state.vh + 'px';
        clampCamera();
      }

      function setDestination(clientX, clientY) {
        if (state.over || state.won) {
          reset();
          return;
        }
        const pos = screenToWorldPoint(clientX, clientY);
        const target = nearestOpenCell(pos.x, pos.y);
        const current = cellOf(state.player.x, state.player.y);
        const path = findPath(current, target);
        state.lastTarget = cellKey(target);
        state.lastPathLength = path.length;
        if (path.length > 1) {
          state.player.path = path.slice(1).map(centerOf);
          showMessage('Unicorn path set: ' + (path.length - 1) + ' steps.', 1200);
        } else {
          const next = directionalNeighbor(pos, current);
          if (next) {
            state.player.path = [centerOf(next)];
            state.lastTarget = cellKey(next);
            state.lastPathLength = 2;
            showMessage('Unicorn steps toward the tap.', 900);
          } else {
            showMessage('That part of the forest is blocked.', 1100);
          }
        }
      }

      function showMessage(text, ms) {
        state.messageUntil = performance.now() + ms;
      }

      function updateHud() {
        const now = performance.now();
        const active = state.activeTreat && now < state.activeUntil ? state.activeTreat + ' ' + Math.ceil((state.activeUntil - now) / 1000) + 's' : 'none';
        canvas.dataset.playerCell = cellKey(cellOf(state.player.x, state.player.y));
        canvas.dataset.level = String(state.level);
        canvas.dataset.witchCell = cellKey(cellOf(state.witch.x, state.witch.y));
        canvas.dataset.witch2Cell = state.witch2.active ? cellKey(cellOf(state.witch2.x, state.witch2.y)) : 'inactive';
        canvas.dataset.score = String(state.score);
        canvas.dataset.lives = String(state.lives);
        canvas.dataset.treat = active;
        canvas.dataset.stinkTreats = String(state.treats.filter((item) => !item.taken && item.type === 'stink').length);
        canvas.dataset.best = String(state.best);
        canvas.dataset.sprites = characterSprites.unicorn.ready && characterSprites.witch.ready && characterSprites.witch2.ready ? 'ready' : 'loading';
        canvas.dataset.stenchBubbles = String(state.stenchTrail.length);
        canvas.dataset.stenchFogs = String(state.stenchFogs.length);
        canvas.dataset.witchSlowed = String(performance.now() < state.witch.stenchUntil || performance.now() < state.witch2.stenchUntil);
        canvas.dataset.lastInput = state.lastInput || 'none';
        canvas.dataset.lastTarget = state.lastTarget || 'none';
        canvas.dataset.lastPathLength = String(state.lastPathLength || 0);
        canvas.dataset.playerPath = String(state.player.path.length);
        canvas.dataset.zoom = state.zoom.toFixed(2);
        canvas.dataset.won = String(state.won);
        canvas.dataset.over = String(state.over);
      }

      function resetPositions() {
        const p = centerOf(startCell);
        const w = centerOf(witchStartCell);
        const w2 = centerOf(secondWitchStartCell);
        state.player.x = p.x;
        state.player.y = p.y;
        state.player.path = [];
        state.player.step = 0;
        state.player.facing = 1;
        state.witch.x = w.x;
        state.witch.y = w.y;
        state.witch.path = [];
        state.witch.repath = 0;
        state.witch.stenchUntil = 0;
        state.witch.facing = -1;
        state.witch2.x = w2.x;
        state.witch2.y = w2.y;
        state.witch2.path = [];
        state.witch2.step = 0;
        state.witch2.repath = 0;
        state.witch2.frozenUntil = 0;
        state.witch2.stenchUntil = 0;
        state.witch2.facing = 1;
        state.witch2.active = state.level >= 2;
        state.camera.x = state.player.x;
        state.camera.y = state.player.y;
        clampCamera();
      }

      function startLevel(level) {
        state.level = level;
        generateMaze();
        placeTreats();
        resetPositions();
        state.activeTreat = null;
        state.activeUntil = 0;
        state.shieldUntil = 0;
        state.witch.frozenUntil = 0;
        state.witch.stenchUntil = 0;
        state.witch2.frozenUntil = 0;
        state.witch2.stenchUntil = 0;
        state.stenchUntil = 0;
        state.stenchEmit = 0;
        state.stenchTrail = [];
        state.stenchFogs = [];
        state.won = false;
        state.over = false;
        state.last = performance.now();
        showMessage(level === 1 ? 'Level 1. Reach B and avoid the witch.' : 'Level 2. Two witches are chasing now.', 2200);
        updateHud();
      }

      function reset() {
        state.score = 0;
        state.lives = 3;
        startLevel(defaultStartLevel);
      }

      function currentPlayerSpeed(now) {
        return state.activeTreat === 'speed' && now < state.activeUntil ? 405 : state.player.speed;
      }

      function moveAlongPath(actor, speed, dt) {
        if (!actor.path.length) return;
        const target = actor.path[0];
        const dx = target.x - actor.x;
        const dy = target.y - actor.y;
        const d = Math.hypot(dx, dy);
        if (d < 3) {
          actor.x = target.x;
          actor.y = target.y;
          actor.path.shift();
          return;
        }
        const step = Math.min(speed * dt, d);
        actor.angle = Math.atan2(dy, dx);
        if (actor.facing !== undefined && Math.abs(dx) > 1) actor.facing = dx < 0 ? -1 : 1;
        actor.step += dt * 8;
        actor.x += (dx / d) * step;
        actor.y += (dy / d) * step;
      }

      function activeWitches() {
        return state.witch2.active ? [state.witch, state.witch2] : [state.witch];
      }

      function updateWitch(actor, dt, now) {
        if (!actor.active && actor !== state.witch) return;
        if (now < actor.frozenUntil || state.over || state.won) return;
        actor.repath -= dt;
        if (actor.repath <= 0 || actor.path.length < 2) {
          const from = cellOf(actor.x, actor.y);
          const to = cellOf(state.player.x, state.player.y);
          const path = findPath(from, to);
          actor.path = path.slice(1).map(centerOf);
          actor.repath = 0.42;
        }
        let speed = state.activeTreat === 'freeze' && now < state.activeUntil ? 60 : actor.speed;
        if (now < actor.stenchUntil) speed *= 0.42;
        moveAlongPath(actor, speed, dt);
      }

      function applyTreat(type) {
        const now = performance.now();
        state.activeTreat = type;
        state.activeUntil = now + (type === 'spark' ? 2500 : type === 'stink' ? 9000 : 7000);
        if (type === 'shield') state.shieldUntil = now + 7000;
        if (type === 'freeze') {
          for (const witch of activeWitches()) witch.frozenUntil = now + 3500;
        }
        if (type === 'spark') state.score += 50;
        if (type === 'stink') {
          state.stenchUntil = now + 9000;
          state.stenchEmit = 0;
        }
        const label = {
          speed: 'Carrot rush: unicorn is faster.',
          shield: 'Moon shield: the witch bounces off.',
          freeze: 'Sleep mushroom: witch slowed.',
          spark: 'Star treat: bonus magic.',
          stink: 'Rotten strawberry: stinky bubbles trail behind.'
        }[type];
        showMessage(label, 1700);
      }

      function emitStenchBubble(now) {
        const facing = state.player.facing || 1;
        state.stenchTrail.push({
          x: state.player.x - facing * 30 + (random() - 0.5) * 12,
          y: state.player.y + 12 + (random() - 0.5) * 10,
          r: 10 + random() * 8,
          born: now,
          life: 6200,
          drift: (random() - 0.5) * 22,
          phase: random() * Math.PI * 2,
          hit: false
        });
      }

      function updateStench(dt, now) {
        if (now < state.stenchUntil && state.player.path.length) {
          state.stenchEmit -= dt;
          while (state.stenchEmit <= 0) {
            emitStenchBubble(now);
            state.stenchEmit += 0.16;
          }
        }

        state.stenchTrail = state.stenchTrail.filter((bubble) => now - bubble.born < bubble.life);
        state.stenchFogs = state.stenchFogs.filter((fog) => now - fog.born < fog.life);

        for (const bubble of state.stenchTrail) {
          const age = (now - bubble.born) / bubble.life;
          bubble.y -= dt * 2.4;
          bubble.x += Math.sin(age * 8 + bubble.phase) * dt * bubble.drift;
          if (!bubble.hit) {
            const hitWitch = activeWitches().find((witch) => Math.hypot(witch.x - bubble.x, witch.y - bubble.y) < bubble.r + 34);
            if (hitWitch) {
              bubble.hit = true;
              hitWitch.stenchUntil = Math.max(hitWitch.stenchUntil, now + 2800);
              state.score += 5;
              state.stenchFogs.push({
                x: bubble.x,
                y: bubble.y,
                born: now,
                life: 3600,
                r: 42 + random() * 18,
                phase: random() * Math.PI * 2
              });
            }
          }
        }

        for (const fog of state.stenchFogs) {
          for (const witch of activeWitches()) {
            if (Math.hypot(witch.x - fog.x, witch.y - fog.y) < fog.r + 22) {
              witch.stenchUntil = Math.max(witch.stenchUntil, now + 900);
            }
          }
        }
      }

      function updatePickups(now) {
        for (const crumb of state.crumbs) {
          if (!crumb.taken && Math.hypot(crumb.x - state.player.x, crumb.y - state.player.y) < 24) {
            crumb.taken = true;
            state.score += 2;
          }
        }
        for (const treat of state.treats) {
          if (!treat.taken && Math.hypot(treat.x - state.player.x, treat.y - state.player.y) < 34) {
            treat.taken = true;
            state.score += 10;
            applyTreat(treat.type);
          }
        }
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem(storageKey, String(state.best));
        }
      }

      function updateWinLose(now) {
        const exit = centerOf(exitCell);
        if (!state.won && Math.hypot(state.player.x - exit.x, state.player.y - exit.y) < 38) {
          state.score += 150;
          state.best = Math.max(state.best, state.score);
          localStorage.setItem(storageKey, String(state.best));
          if (state.level < state.maxLevel) {
            startLevel(state.level + 1);
            showMessage('Level 2 begins. Two witches are chasing.', 2600);
          } else {
            state.won = true;
            showMessage('You cleared level 2. The unicorn escaped both witches!', 5000);
          }
        }
        if (state.over || state.won) return;
        const caughtBy = activeWitches().find((witch) => Math.hypot(state.player.x - witch.x, state.player.y - witch.y) < 42);
        if (caughtBy) {
          if (now < state.shieldUntil) {
            const w = centerOf(caughtBy === state.witch2 ? secondWitchStartCell : witchStartCell);
            caughtBy.x = w.x;
            caughtBy.y = w.y;
            caughtBy.path = [];
            caughtBy.frozenUntil = now + 1800;
            state.score += 25;
            showMessage('Shield repelled the witch +25.', 1500);
          } else {
            state.lives -= 1;
            if (state.lives <= 0) {
              state.over = true;
              showMessage('The witch caught the unicorn. Tap to restart.', 5000);
            } else {
              showMessage('Caught by the witch. Lives left: ' + state.lives, 1800);
              resetPositions();
            }
          }
        }
      }

      function update(dt, now) {
        if (!state.over && !state.won) {
          moveAlongPath(state.player, currentPlayerSpeed(now), dt);
          updateStench(dt, now);
          for (const witch of activeWitches()) updateWitch(witch, dt, now);
          updatePickups(now);
          updateWinLose(now);
        }
        state.camera.x += (state.player.x - state.camera.x) * Math.min(1, dt * 6);
        state.camera.y += (state.player.y - state.camera.y) * Math.min(1, dt * 6);
        clampCamera();
        if (state.messageUntil && now > state.messageUntil && !state.over && !state.won) {
          state.messageUntil = 0;
        }
        updateHud();
      }

      function drawMaze() {
        const halfW = state.vw / (2 * state.zoom);
        const halfH = state.vh / (2 * state.zoom);
        const startC = clamp(Math.floor((state.camera.x - halfW) / grid.tile) - 2, 0, grid.cols - 1);
        const endC = clamp(Math.floor((state.camera.x + halfW) / grid.tile) + 2, 0, grid.cols - 1);
        const startR = clamp(Math.floor((state.camera.y - halfH) / grid.tile) - 2, 0, grid.rows - 1);
        const endR = clamp(Math.floor((state.camera.y + halfH) / grid.tile) + 2, 0, grid.rows - 1);
        ctx.save();
        ctx.translate(state.vw / 2, state.vh / 2);
        ctx.scale(state.zoom, state.zoom);
        ctx.translate(-state.camera.x, -state.camera.y);
        ctx.fillStyle = '#14331d';
        ctx.fillRect(0, 0, world.w, world.h);
        for (let r = startR; r <= endR; r += 1) {
          for (let c = startC; c <= endC; c += 1) {
            const x = c * grid.tile;
            const y = r * grid.tile;
            if (state.maze[r][c] === 1) {
              const shade = (r * 7 + c * 11) % 4;
              ctx.fillStyle = shade < 2 ? '#9a7b46' : '#8c6e3f';
              ctx.fillRect(x, y, grid.tile, grid.tile);
              ctx.fillStyle = 'rgb(255 239 170 / 8%)';
              ctx.beginPath();
              ctx.ellipse(x + grid.tile / 2, y + grid.tile / 2, grid.tile * 0.34, grid.tile * 0.22, 0.4, 0, Math.PI * 2);
              ctx.fill();
            } else {
              ctx.fillStyle = '#0d2818';
              ctx.fillRect(x, y, grid.tile, grid.tile);
              const cx = x + grid.tile / 2;
              const cy = y + grid.tile / 2;
              ctx.fillStyle = '#1e7b3f';
              ctx.beginPath();
              ctx.moveTo(cx, y + 9);
              ctx.lineTo(x + 11, y + grid.tile - 10);
              ctx.lineTo(x + grid.tile - 11, y + grid.tile - 10);
              ctx.closePath();
              ctx.fill();
              ctx.fillStyle = '#14592e';
              ctx.beginPath();
              ctx.moveTo(cx + 8, y + 18);
              ctx.lineTo(x + 18, y + grid.tile - 4);
              ctx.lineTo(x + grid.tile - 4, y + grid.tile - 6);
              ctx.closePath();
              ctx.fill();
            }
          }
        }
        drawStartExit();
        ctx.restore();
      }

      function drawStartExit() {
        const a = centerOf(startCell);
        const b = centerOf(exitCell);
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '900 34px Arial';
        ctx.fillStyle = '#9df7d0';
        ctx.beginPath();
        ctx.arc(a.x, a.y, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0b291b';
        ctx.fillText('A', a.x, a.y + 1);
        ctx.fillStyle = '#ffd866';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 34, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#37260a';
        ctx.fillText('B', b.x, b.y + 1);
        ctx.restore();
      }

      function drawPathLine() {
        if (!state.player.path.length) return;
        ctx.save();
        ctx.translate(state.vw / 2, state.vh / 2);
        ctx.scale(state.zoom, state.zoom);
        ctx.translate(-state.camera.x, -state.camera.y);
        ctx.strokeStyle = 'rgb(219 255 136 / 58%)';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.setLineDash([10, 12]);
        ctx.beginPath();
        ctx.moveTo(state.player.x, state.player.y);
        for (const p of state.player.path) ctx.lineTo(p.x, p.y);
        ctx.stroke();
        ctx.restore();
      }

      function drawTreat(treat, now) {
        const s = worldToScreen(treat.x, treat.y);
        if (s.x < -60 || s.y < -60 || s.x > state.vw + 60 || s.y > state.vh + 60) return;
        const pulse = Math.sin(now / 220 + treat.x) * 0.15 + 1;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.scale(state.zoom, state.zoom);
        ctx.shadowBlur = 18;
        const colors = { speed: '#ffb84f', shield: '#91eaff', freeze: '#c499ff', spark: '#ffe767', stink: '#88d95b' };
        ctx.fillStyle = colors[treat.type];
        ctx.shadowColor = colors[treat.type];
        if (treat.type === 'speed') {
          ctx.beginPath();
          ctx.moveTo(18 * pulse, 0);
          ctx.lineTo(-14 * pulse, -11 * pulse);
          ctx.lineTo(-9 * pulse, 0);
          ctx.lineTo(-14 * pulse, 11 * pulse);
          ctx.closePath();
          ctx.fill();
        } else if (treat.type === 'shield') {
          ctx.beginPath();
          ctx.moveTo(0, -20 * pulse);
          ctx.lineTo(17 * pulse, -8 * pulse);
          ctx.lineTo(10 * pulse, 17 * pulse);
          ctx.lineTo(0, 23 * pulse);
          ctx.lineTo(-10 * pulse, 17 * pulse);
          ctx.lineTo(-17 * pulse, -8 * pulse);
          ctx.closePath();
          ctx.fill();
        } else if (treat.type === 'freeze') {
          ctx.beginPath();
          ctx.arc(0, -6 * pulse, 16 * pulse, Math.PI, Math.PI * 2);
          ctx.fill();
          ctx.fillRect(-6 * pulse, -6 * pulse, 12 * pulse, 24 * pulse);
        } else if (treat.type === 'spark') {
          for (let i = 0; i < 8; i += 1) {
            const a = i / 8 * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 11 * pulse, Math.sin(a) * 11 * pulse, 4 * pulse, 10 * pulse, a, 0, Math.PI * 2);
            ctx.fill();
          }
        } else {
          ctx.shadowBlur = 10;
          ctx.fillStyle = '#cc2a24';
          ctx.strokeStyle = '#2a1110';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(0, 20 * pulse);
          ctx.bezierCurveTo(-25 * pulse, 1 * pulse, -17 * pulse, -22 * pulse, 0, -17 * pulse);
          ctx.bezierCurveTo(18 * pulse, -23 * pulse, 27 * pulse, 1 * pulse, 0, 20 * pulse);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#4f7e2a';
          ctx.beginPath();
          ctx.moveTo(0, -17 * pulse);
          ctx.lineTo(-19 * pulse, -25 * pulse);
          ctx.lineTo(-7 * pulse, -7 * pulse);
          ctx.lineTo(0, -29 * pulse);
          ctx.lineTo(7 * pulse, -7 * pulse);
          ctx.lineTo(21 * pulse, -24 * pulse);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#7f5d35';
          for (const spot of [[-12, -2, 7], [9, 7, 6], [-3, 13, 5]]) {
            ctx.beginPath();
            ctx.arc(spot[0] * pulse, spot[1] * pulse, spot[2] * pulse, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.fillStyle = '#aeb9a0';
          for (const mold of [[10, -8, 8], [-10, 8, 6]]) {
            ctx.beginPath();
            ctx.arc(mold[0] * pulse, mold[1] * pulse, mold[2] * pulse, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.fillStyle = '#efd16d';
          for (let i = 0; i < 5; i += 1) {
            const a = i / 5 * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 10 * pulse, Math.sin(a) * 8 * pulse, 2 * pulse, 4 * pulse, a, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.strokeStyle = '#160b0b';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-9 * pulse, 0);
          ctx.quadraticCurveTo(-4 * pulse, 4 * pulse, 0, 0);
          ctx.moveTo(5 * pulse, 0);
          ctx.quadraticCurveTo(10 * pulse, 4 * pulse, 15 * pulse, 0);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawStench(now) {
        ctx.save();
        for (const fog of state.stenchFogs) {
          const age = (now - fog.born) / fog.life;
          const alpha = Math.max(0, 1 - age);
          const radius = fog.r * (0.85 + age * 0.55) * state.zoom;
          const s = worldToScreen(fog.x, fog.y);
          if (s.x < -120 || s.y < -120 || s.x > state.vw + 120 || s.y > state.vh + 120) continue;
          const gradient = ctx.createRadialGradient(s.x, s.y, radius * 0.15, s.x, s.y, radius);
          gradient.addColorStop(0, `rgb(110 191 67 / ${0.5 * alpha})`);
          gradient.addColorStop(1, 'rgb(110 191 67 / 0)');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(s.x, s.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = `rgb(176 230 92 / ${0.22 * alpha})`;
          ctx.lineWidth = 3;
          for (let i = 0; i < 3; i += 1) {
            const a = fog.phase + i * 2.1 + age * 2;
            ctx.beginPath();
            ctx.arc(s.x + Math.cos(a) * radius * 0.24, s.y + Math.sin(a) * radius * 0.18, radius * (0.18 + i * 0.04), 0, Math.PI * 2);
            ctx.stroke();
          }
        }

        for (const bubble of state.stenchTrail) {
          const age = (now - bubble.born) / bubble.life;
          const alpha = Math.max(0, 1 - age);
          const s = worldToScreen(bubble.x, bubble.y);
          if (s.x < -80 || s.y < -80 || s.x > state.vw + 80 || s.y > state.vh + 80) continue;
          const wobble = Math.sin(now / 150 + bubble.phase) * 2 * state.zoom;
          const radius = bubble.r * (1 + age * 0.45) * state.zoom;
          ctx.fillStyle = `rgb(132 217 78 / ${0.32 * alpha})`;
          ctx.strokeStyle = `rgb(194 255 137 / ${0.7 * alpha})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(s.x + wobble, s.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = `rgb(230 255 193 / ${0.55 * alpha})`;
          ctx.beginPath();
          ctx.arc(s.x - radius * 0.28 + wobble, s.y - radius * 0.3, radius * 0.22, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawCrumb(crumb) {
        const s = worldToScreen(crumb.x, crumb.y);
        if (s.x < -30 || s.y < -30 || s.x > state.vw + 30 || s.y > state.vh + 30) return;
        ctx.fillStyle = '#f6df82';
        ctx.beginPath();
        ctx.arc(s.x, s.y, 5 * state.zoom, 0, Math.PI * 2);
        ctx.fill();
      }

      const unicornRunFrames = [

            [[-22, 14], [-36, 27], [-48, 33], -0.2, false],
            [[-10, 14], [2, 28], [15, 35], 0.24, false]
          ]
        },
        {
          tail: 1,
          mane: -1,
          wing: 1,
          legs: [
            [[19, 14], [22, 31], [20, 39], 0, true],
            [[7, 14], [22, 25], [35, 31], 0.28, true],
            [[-22, 14], [-18, 31], [-15, 39], 0.05, false],
            [[-10, 14], [-26, 24], [-39, 31], -0.32, false]
          ]
        },
        {
          tail: 5,
          mane: -2,
          wing: 2,
          legs: [
            [[19, 14], [8, 29], [-4, 36], -0.28, true],
            [[7, 14], [22, 27], [38, 35], 0.35, true],

          ]
        },

          legs: [
            [[19, 14], [30, 28], [38, 38], 0.18, true],
            [[7, 14], [1, 29], [-12, 34], -0.2, true],
            [[-22, 14], [-35, 27], [-46, 31], -0.25, false],
            [[-10, 14], [-2, 29], [11, 38], 0.18, false]
          ]
        }
      ];
      const unicornManeColors = ['#ff4da8', '#ff9d2e', '#ffd957', '#45c7f7', '#8b55d9'];

      function drawHeartMark(x, y, scale, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, 6);
        ctx.bezierCurveTo(-12, -2, -7, -13, 0, -7);
        ctx.bezierCurveTo(7, -13, 12, -2, 0, 6);
        ctx.fill();
        ctx.restore();
      }

      function drawStarMark(x, y, radius, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = color;
        ctx.beginPath();
        for (let i = 0; i < 10; i += 1) {
          const a = -Math.PI / 2 + i * Math.PI / 5;
          const r = i % 2 === 0 ? radius : radius * 0.42;
          const px = Math.cos(a) * r;
          const py = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawHoof(x, y, tilt, faded) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(tilt);
        ctx.fillStyle = faded ? '#f7a4cf' : '#ff67af';
        ctx.strokeStyle = '#b83175';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 0, 11, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = 'rgb(255 255 255 / 48%)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-5, -2);
        ctx.lineTo(4, -4);
        ctx.stroke();
        ctx.restore();
      }

      function drawLeg(frameLeg) {
        const [hip, knee, hoof, tilt, faded] = frameLeg;
        ctx.save();
        ctx.globalAlpha = faded ? 0.72 : 1;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = faded ? '#f5e9f3' : '#fffaff';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(hip[0], hip[1]);
        ctx.quadraticCurveTo(knee[0], knee[1], hoof[0], hoof[1] - 2);
        ctx.stroke();
        ctx.strokeStyle = faded ? '#dcacc4' : '#d98aaf';
        ctx.lineWidth = 2.2;
        ctx.stroke();
        drawHoof(hoof[0], hoof[1], tilt, faded);
        ctx.restore();
      }

      function unicornArcLeg(hipX, phase, faded) {
        const swing = Math.cos(phase);
        const lift = Math.max(0, Math.sin(phase));
        const hip = [hipX, 14];
        const knee = [hipX + swing * 13, 28 - lift * 11];
        const hoof = [hipX + swing * 31, 39 - lift * 17];
        return [hip, knee, hoof, swing * 0.34, faded];
      }

      function unicornAnimatedLegs(step, moving, frame) {
        if (!moving) return frame.legs;
        const phase = step * 1.45;
        return [
          unicornArcLeg(18, phase + Math.PI, true),
          unicornArcLeg(7, phase, false),
          unicornArcLeg(-24, phase, true),
          unicornArcLeg(-10, phase + Math.PI, false)
        ];
      }

      function drawRainbowTail(frame) {
        ctx.save();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        unicornManeColors.forEach((color, i) => {
          ctx.strokeStyle = color;
          ctx.lineWidth = 7;
          ctx.beginPath();
          ctx.moveTo(-36, -5 + i * 2);
          ctx.bezierCurveTo(-54, -22 + frame.tail + i * 4, -72, -4 + frame.tail, -92, 2 + i * 5);
          ctx.bezierCurveTo(-79, 18 + i, -62, 22 + frame.tail, -52, 12 + i * 2);
          ctx.stroke();
        });
        ctx.strokeStyle = 'rgb(255 255 255 / 55%)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-64, -15 + frame.tail);
        ctx.quadraticCurveTo(-73, -7 + frame.tail, -86, -1);
        ctx.stroke();
        ctx.restore();
      }

      function drawWing(frame) {
        ctx.save();
        ctx.translate(-4, -18 + frame.wing);
        ctx.fillStyle = 'rgb(255 255 255 / 88%)';
        ctx.strokeStyle = '#ee9cc4';
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(0, 8);
        ctx.bezierCurveTo(13, -18, 36, -26, 48, -12);
        ctx.bezierCurveTo(36, -9, 31, -2, 23, 7);
        ctx.bezierCurveTo(15, 1, 8, 4, 0, 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = '#f0a6c7';
        ctx.lineWidth = 2;
        for (let i = 0; i < 4; i += 1) {
          ctx.beginPath();
          ctx.moveTo(8 + i * 8, -4 + i * 1.2);
          ctx.quadraticCurveTo(18 + i * 7, 3 + i, 13 + i * 5, 11);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawMane(frame) {
        ctx.save();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        unicornManeColors.forEach((color, i) => {
          ctx.strokeStyle = color;
          ctx.lineWidth = 7;
          ctx.beginPath();
          ctx.moveTo(37, -34 + i * 2);
          ctx.bezierCurveTo(20, -47 + frame.mane, 7, -27 + i * 2, 18, -10 + i * 2);
          ctx.bezierCurveTo(26, 4 + frame.mane, 5, 13 + i * 2, -9, 3 + i);
          ctx.stroke();
        });
        ctx.strokeStyle = 'rgb(255 255 255 / 42%)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(28, -39 + frame.mane);
        ctx.quadraticCurveTo(11, -29, 18, -13);
        ctx.stroke();
        ctx.restore();
      }

      function drawUnicornFace() {
        ctx.fillStyle = '#fffaff';
        ctx.strokeStyle = '#d98aaf';
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.ellipse(55, -24, 25, 17, -0.16, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(73, -18, 13, 9, 0.05, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(45, -36);
        ctx.quadraticCurveTo(45, -61, 60, -42);

        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#ff8fca';

        ctx.moveTo(51, -40);

        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffd33d';

        ctx.beginPath();
        ctx.moveTo(60, -39);
        ctx.lineTo(77, -67);
        ctx.lineTo(71, -35);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = 'rgb(255 255 255 / 60%)';

        for (let i = 0; i < 4; i += 1) {
          ctx.beginPath();

        }

        ctx.fillStyle = '#20102e';
        ctx.beginPath();
        ctx.ellipse(62, -25, 6.5, 8, -0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#8b55d9';
        ctx.beginPath();
        ctx.ellipse(64, -24, 3.8, 5.2, -0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';

        for (let i = 0; i < 3; i += 1) {
          ctx.beginPath();
          ctx.moveTo(56 + i * 4, -33);
          ctx.quadraticCurveTo(54 + i * 5, -38, 50 + i * 4, -39);
          ctx.stroke();
        }
        ctx.fillStyle = '#9a526f';

      }

      function drawUnicorn(now) {
        const s = worldToScreen(state.player.x, state.player.y);
        const moving = state.player.path.length > 0;
        const frameIndex = moving ? Math.floor(state.player.step * 1.65) % unicornRunFrames.length : 1;
        const frame = unicornRunFrames[frameIndex];
        const legs = unicornAnimatedLegs(state.player.step, moving, frame);
        const bob = moving ? Math.sin(state.player.step * 1.3) * 3.4 : Math.sin(now / 520) * 1.4;
        const lean = moving ? Math.sin(state.player.step * 0.72) * 0.035 : Math.sin(now / 950) * 0.018;
        const shield = now < state.shieldUntil;
        ctx.save();
        ctx.translate(s.x, s.y + bob * state.zoom);
        ctx.scale(state.zoom, state.zoom);
        if (shield) {
          ctx.strokeStyle = 'rgb(145 234 255 / 78%)';
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(0, -2, 40, 0, Math.PI * 2);
          ctx.stroke();
          drawStarMark(28, -33 + Math.sin(now / 180) * 4, 5, '#9af1ff');
          drawStarMark(-31, -25 + Math.cos(now / 220) * 4, 4, '#e9faff');
        }
        ctx.fillStyle = 'rgb(0 0 0 / 25%)';
        ctx.beginPath();
        ctx.ellipse(0, 25, 39, 11, 0, 0, Math.PI * 2);
        ctx.fill();

        if (drawSpriteFrame(characterSprites.unicorn, frameIndex, state.player.facing || 1)) {
          ctx.restore();
          return;
        }

        ctx.rotate(lean * (state.player.facing || 1));
        ctx.scale((state.player.facing || 1) * 0.62, 0.62);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        drawRainbowTail(frame);
        legs.forEach(drawLeg);

        ctx.fillStyle = '#fffaff';
        ctx.strokeStyle = '#d98aaf';
        ctx.lineWidth = 2.8;
        ctx.beginPath();
        ctx.ellipse(0, -1, 40, 24, 0.02, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        drawWing(frame);

        ctx.fillStyle = '#fffaff';
        ctx.strokeStyle = '#d98aaf';
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(24, -6);
        ctx.bezierCurveTo(33, -28, 45, -35, 58, -31);
        ctx.bezierCurveTo(55, -12, 42, 6, 27, 10);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        drawMane(frame);
        drawUnicornFace();

        drawHeartMark(-16, -2, 0.5, '#ff68a8');
        drawStarMark(-28, -12, 5, '#ffd33d');
        drawStarMark(-6, -13, 4, '#8b55d9');
        drawStarMark(-2, 6, 3.5, '#45c7f7');

        ctx.fillStyle = 'rgb(255 255 255 / 70%)';
        ctx.beginPath();
        ctx.arc(10, -19, 2, 0, Math.PI * 2);
        ctx.arc(-29, -7, 1.6, 0, Math.PI * 2);
        ctx.arc(29, 6, 1.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const witchRunFrames = [
        {
          robe: -2,
          hat: -2,
          hair: -3,
          staff: -0.08,
          claw: 0.2,
          feet: [
            [[-15, 33], [-30, 39], -0.18, false],
            [[13, 34], [31, 38], 0.22, true]
          ]
        },
        {
          robe: 1,
          hat: 1,
          hair: 0,
          staff: 0.04,
          claw: -0.08,
          feet: [
            [[-15, 34], [-10, 42], 0.06, false],
            [[13, 33], [29, 37], 0.28, true]
          ]
        },
        {
          robe: 3,
          hat: 2,
          hair: 3,
          staff: 0.1,
          claw: -0.22,
          feet: [
            [[-15, 33], [2, 38], 0.2, true],
            [[13, 34], [33, 41], 0.24, false]
          ]
        },
        {
          robe: 0,
          hat: -1,
          hair: 1,
          staff: -0.02,
          claw: 0.08,
          feet: [
            [[-15, 34], [-29, 40], -0.22, true],
            [[13, 34], [14, 42], 0.04, false]
          ]
        }
      ];

      function witchPalette(frozen) {
        return frozen ? {
          robe: '#345f76',
          robeDark: '#183347',
          robeLight: '#80d8f2',
          outline: '#0d1b24',
          skin: '#d9f7ff',
          skinLine: '#79bcd0',
          hair: '#e8fbff',
          eye: '#aee8ff',
          crystal: '#79dfff',
          boot: '#102432'
        } : {
          robe: '#4c2a78',
          robeDark: '#24153f',
          robeLight: '#a87ad0',
          outline: '#160b21',
          skin: '#b8bd7a',
          skinLine: '#556036',
          hair: '#c9c3ca',
          eye: '#f2d763',
          crystal: '#9a47ff',
          boot: '#171023'
        };
      }

      function drawCrescentMark(x, y, scale, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(0, 0, 8, Math.PI * 0.35, Math.PI * 1.65, false);
        ctx.arc(5, -1, 8, Math.PI * 1.65, Math.PI * 0.35, true);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawCrystal(x, y, scale, frozen, palette) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        const glow = frozen ? '#dffaff' : '#d8b6ff';
        ctx.fillStyle = palette.crystal;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, -14);
        ctx.lineTo(10, -2);
        ctx.lineTo(5, 14);
        ctx.lineTo(-6, 14);
        ctx.lineTo(-11, -2);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = glow;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, -12);
        ctx.lineTo(0, 12);
        ctx.moveTo(-8, -2);
        ctx.lineTo(8, -2);
        ctx.stroke();
        ctx.restore();
      }

      function drawWitchStaff(frame, frozen, palette) {
        ctx.save();
        ctx.translate(47, 10);
        ctx.rotate(frame.staff);
        ctx.lineCap = 'round';
        ctx.strokeStyle = frozen ? '#234b5d' : '#2c201c';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(0, 35);
        ctx.bezierCurveTo(-3, 7, 2, -20, 0, -44);
        ctx.stroke();
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.strokeStyle = frozen ? '#356d82' : '#34241d';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, -43);
        ctx.bezierCurveTo(10, -55, 16, -63, 13, -72);
        ctx.moveTo(0, -43);
        ctx.bezierCurveTo(-11, -54, -15, -63, -11, -73);
        ctx.stroke();
        drawCrystal(1, -55, 0.78, frozen, palette);
        ctx.restore();
      }

      function drawWitchBoot(ankle, toe, tilt, faded, palette) {
        ctx.save();
        ctx.globalAlpha = faded ? 0.74 : 1;
        ctx.translate(toe[0], toe[1]);
        ctx.rotate(tilt);
        ctx.fillStyle = palette.boot;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-15, -1);
        ctx.quadraticCurveTo(-5, 9, 13, 6);
        ctx.quadraticCurveTo(25, 4, 22, -7);
        ctx.quadraticCurveTo(12, 0, 3, -2);
        ctx.quadraticCurveTo(-8, -7, -15, -1);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = '#d9a83e';
        ctx.lineWidth = 2;
        ctx.strokeRect(4, -2, 9, 6);
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = faded ? 0.48 : 0.7;
        ctx.strokeStyle = palette.robeDark;
        ctx.lineWidth = 7;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(ankle[0], ankle[1]);
        ctx.lineTo(toe[0] - 4, toe[1] - 4);
        ctx.stroke();
        ctx.restore();
      }

      function witchArcFoot(anchorX, phase, faded) {
        const swing = Math.cos(phase);
        const lift = Math.max(0, Math.sin(phase));
        const ankle = [anchorX + swing * 7, 31 - lift * 8];
        const toe = [anchorX + swing * 26, 42 - lift * 13];
        return [ankle, toe, swing * 0.32, faded];
      }

      function witchAnimatedFeet(step, moving, frame) {
        if (!moving) return frame.feet;
        const phase = step * 1.35;
        return [
          witchArcFoot(-16, phase, false),
          witchArcFoot(13, phase + Math.PI, true)
        ];
      }

      function drawWitchCape(frame, palette) {
        ctx.fillStyle = palette.robeDark;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-12, -20);
        ctx.bezierCurveTo(-42, -12 + frame.hair, -53, 12, -45, 36 + frame.robe);
        ctx.lineTo(-31, 31 + frame.robe);
        ctx.lineTo(-24, 43 + frame.robe);
        ctx.lineTo(-9, 36 + frame.robe);
        ctx.bezierCurveTo(5, 20, 5, -4, -12, -20);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      function drawWitchRobe(frame, palette) {
        ctx.fillStyle = palette.robe;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2.7;
        ctx.beginPath();
        ctx.moveTo(-23, -18);
        ctx.bezierCurveTo(-35, -1, -41, 24 + frame.robe, -34, 42);
        ctx.lineTo(-18, 35 + frame.robe);
        ctx.lineTo(-9, 45 + frame.robe);
        ctx.lineTo(3, 36 + frame.robe);
        ctx.lineTo(16, 45 + frame.robe);
        ctx.lineTo(25, 35 + frame.robe);
        ctx.lineTo(37, 40 + frame.robe);
        ctx.bezierCurveTo(38, 15, 31, -6, 19, -20);
        ctx.bezierCurveTo(6, -25, -11, -24, -23, -18);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = palette.robeDark;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(2, -16);
        ctx.bezierCurveTo(7, 5, 5, 26, 2, 42);
        ctx.stroke();
        drawCrescentMark(-18, 5, 0.62, palette.robeLight);
        drawCrescentMark(16, 9, 0.58, palette.robeLight);
        drawCrescentMark(-2, 26, 0.68, palette.robeLight);
      }

      function drawWitchHair(frame, palette) {
        ctx.save();
        ctx.fillStyle = palette.hair;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(2, -40);
        ctx.lineTo(-18, -28 + frame.hair);
        ctx.lineTo(-8, -26 + frame.hair);
        ctx.lineTo(-28, -15 + frame.hair);
        ctx.lineTo(-7, -19 + frame.hair);
        ctx.lineTo(-24, -4 + frame.hair);
        ctx.lineTo(0, -12 + frame.hair);
        ctx.lineTo(20, -6 + frame.hair);
        ctx.lineTo(12, -21 + frame.hair);
        ctx.lineTo(31, -18 + frame.hair);
        ctx.lineTo(13, -30 + frame.hair);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawWitchHead(frame, palette) {
        ctx.fillStyle = palette.skin;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        ctx.ellipse(19, -31 + frame.hat * 0.2, 19, 22, -0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(31, -34);
        ctx.quadraticCurveTo(48, -31, 33, -20);
        ctx.quadraticCurveTo(26, -22, 31, -34);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = palette.eye;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.ellipse(25, -38, 5.5, 4.3, -0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(18, -43);
        ctx.lineTo(30, -39);
        ctx.stroke();

        ctx.fillStyle = '#1b0a12';
        ctx.beginPath();
        ctx.moveTo(25, -22);
        ctx.quadraticCurveTo(34, -18, 37, -27);
        ctx.quadraticCurveTo(31, -24, 25, -22);
        ctx.fill();
        ctx.fillStyle = '#f5f0bd';
        ctx.beginPath();
        ctx.moveTo(30, -21);
        ctx.lineTo(33, -14);
        ctx.lineTo(36, -22);
        ctx.fill();
        ctx.fillStyle = palette.skinLine;
        for (const p of [[13, -33], [17, -22], [29, -45]]) {
          ctx.beginPath();
          ctx.arc(p[0], p[1], 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawWitchHat(frame, palette) {
        ctx.save();
        ctx.translate(0, frame.hat);
        ctx.fillStyle = palette.robeDark;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2.8;
        ctx.beginPath();
        ctx.moveTo(-29, -46);
        ctx.quadraticCurveTo(10, -57, 52, -45);
        ctx.quadraticCurveTo(24, -36, -29, -46);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = palette.robe;
        ctx.beginPath();
        ctx.moveTo(-2, -47);
        ctx.bezierCurveTo(2, -76, 15, -91, 33, -89);
        ctx.lineTo(49, -67);
        ctx.lineTo(66, -63);
        ctx.lineTo(47, -55);
        ctx.lineTo(34, -72);
        ctx.bezierCurveTo(22, -63, 17, -54, 15, -44);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = '#d7aa45';
        ctx.lineWidth = 3;
        ctx.strokeRect(10, -58, 14, 11);
        ctx.restore();
      }

      function drawWitchArms(frame, palette) {
        ctx.save();
        ctx.strokeStyle = palette.robe;
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(16, -7);
        ctx.quadraticCurveTo(31, -1 + frame.claw * 8, 43, 4);
        ctx.stroke();
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = palette.skin;
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(43, 4);
        ctx.quadraticCurveTo(52, 0 + frame.claw * 5, 58, 4);
        ctx.quadraticCurveTo(53, 8, 47, 8);
        ctx.quadraticCurveTo(51, 13, 45, 15);
        ctx.quadraticCurveTo(41, 11, 43, 4);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = palette.robe;
        ctx.lineWidth = 11;
        ctx.beginPath();
        ctx.moveTo(-18, -4);
        ctx.quadraticCurveTo(2, 7, 31, 10);
        ctx.stroke();
        ctx.strokeStyle = palette.outline;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = palette.skin;
        ctx.beginPath();
        ctx.ellipse(36, 10, 8, 5, 0.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawWitch(now, actor = state.witch, sprite = characterSprites.witch) {
        const s = worldToScreen(actor.x, actor.y);
        const frozen = now < actor.frozenUntil;
        const step = Number.isFinite(actor.step) ? actor.step : 0;
        const moving = Array.isArray(actor.path) && actor.path.length > 0 && !frozen;
        const frameIndex = moving ? Math.abs(Math.floor(step * 1.35)) % witchRunFrames.length : 1;
        const frame = witchRunFrames[frameIndex] || witchRunFrames[1] || witchRunFrames[0];
        const feet = witchAnimatedFeet(step, moving, frame);
        const palette = witchPalette(frozen);
        const bob = moving ? Math.sin(step * 1.25) * 2.6 : Math.sin(now / 220) * 2;
        const lean = moving ? Math.sin(step * 0.65) * 0.035 : 0;
        ctx.save();
        ctx.translate(s.x, s.y + bob * state.zoom);
        ctx.scale(state.zoom, state.zoom);
        ctx.fillStyle = 'rgb(0 0 0 / 26%)';
        ctx.beginPath();
        ctx.ellipse(0, 29, 34, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        if (drawSpriteFrame(sprite, frameIndex, actor.facing || -1)) {
          if (frozen) {
            ctx.strokeStyle = 'rgb(200 249 255 / 70%)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, -22, 45, 0.2, Math.PI * 1.6);
            ctx.stroke();
          }
          ctx.restore();
          return;
        }

        ctx.rotate(lean * (actor.facing || -1));
        ctx.scale((actor.facing || -1) * 0.58, 0.58);
        drawWitchBoot(feet[1][0], feet[1][1], feet[1][2], true, palette);
        drawWitchStaff(frame, frozen, palette);
        drawWitchCape(frame, palette);
        drawWitchRobe(frame, palette);
        drawWitchBoot(feet[0][0], feet[0][1], feet[0][2], false, palette);
        drawWitchHair(frame, palette);
        drawWitchArms(frame, palette);
        drawWitchHead(frame, palette);
        drawWitchHat(frame, palette);
        if (frozen) {
          ctx.strokeStyle = 'rgb(200 249 255 / 70%)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(9, -22, 54, 0.2, Math.PI * 1.6);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawMinimap() {
        const size = Math.min(96, Math.max(72, Math.min(state.vw, state.vh) * 0.22));
        const x = 10;
        const y = state.vh - size - 10;
        ctx.save();
        ctx.fillStyle = 'rgb(3 10 8 / 58%)';
        ctx.strokeStyle = 'rgb(223 255 236 / 34%)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(x, y, size, size, 8) : ctx.rect(x, y, size, size);
        ctx.fill();
        ctx.stroke();
        const sx = size / world.w;
        const sy = size / world.h;
        ctx.fillStyle = '#8c6e3f';
        for (let r = 0; r < grid.rows; r += 1) {
          for (let c = 0; c < grid.cols; c += 1) {
            if (state.maze[r][c] === 1) ctx.fillRect(x + c * grid.tile * sx, y + r * grid.tile * sy, Math.max(1, grid.tile * sx), Math.max(1, grid.tile * sy));
          }
        }
        ctx.fillStyle = '#9df7d0';
        ctx.fillRect(x + startCell.c * grid.tile * sx - 1.5, y + startCell.r * grid.tile * sy - 1.5, 3, 3);
        ctx.fillStyle = '#ffd866';
        ctx.fillRect(x + exitCell.c * grid.tile * sx - 1.5, y + exitCell.r * grid.tile * sy - 1.5, 3, 3);
        ctx.fillStyle = '#ff78c8';
        ctx.beginPath();
        ctx.arc(x + state.player.x * sx, y + state.player.y * sy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#bd77ff';
        ctx.beginPath();
        ctx.arc(x + state.witch.x * sx, y + state.witch.y * sy, 3, 0, Math.PI * 2);
        ctx.fill();
        if (state.witch2.active) {
          ctx.fillStyle = '#73f0ff';
          ctx.beginPath();
          ctx.arc(x + state.witch2.x * sx, y + state.witch2.y * sy, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function draw() {
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        ctx.clearRect(0, 0, state.vw, state.vh);
        const bg = ctx.createLinearGradient(0, 0, 0, state.vh);
        bg.addColorStop(0, '#0b281e');
        bg.addColorStop(1, '#06130f');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, state.vw, state.vh);
        drawMaze();
        drawPathLine();
        for (const crumb of state.crumbs) if (!crumb.taken) drawCrumb(crumb);
        for (const treat of state.treats) if (!treat.taken) drawTreat(treat, performance.now());
        drawStench(performance.now());
        const now = performance.now();
        const actors = [
          { y: state.player.y, draw: () => drawUnicorn(now) },
          { y: state.witch.y, draw: () => drawWitch(now, state.witch, characterSprites.witch) }
        ];
        if (state.witch2.active) {
          actors.push({ y: state.witch2.y, draw: () => drawWitch(now, state.witch2, characterSprites.witch2) });
        }
        actors.sort((a, b) => a.y - b.y);
        for (const actor of actors) actor.draw();
        drawMinimap();
      }

      let lastDrawAt = 0;

      function stepFrame(now) {
        const dt = Math.min(0.05, (now - state.last) / 1000);
        state.last = now;
        update(dt, now);
        draw();
        lastDrawAt = performance.now();
      }

      function frame(now) {
        stepFrame(now);
        requestAnimationFrame(frame);
      }

      let lastCanvasInput = 0;
      let pinch = null;

      function handleCanvasInput(clientX, clientY, source) {
        lastCanvasInput = performance.now();
        state.lastInput = source + ':' + Math.round(clientX) + ',' + Math.round(clientY);
        setDestination(clientX, clientY);
        updateHud();
      }

      canvas.addEventListener('pointerdown', (event) => {
        if (event.isPrimary === false) return;
        event.preventDefault();
        handleCanvasInput(event.clientX, event.clientY, 'pointer');
      }, { passive: false });

      canvas.addEventListener('touchstart', (event) => {
        if (event.touches && event.touches.length === 2) {
          const a = event.touches[0];
          const b = event.touches[1];
          event.preventDefault();
          pinch = {
            distance: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY),
            zoom: state.zoom,
            x: (a.clientX + b.clientX) / 2,
            y: (a.clientY + b.clientY) / 2
          };
          return;
        }
        if (window.PointerEvent && performance.now() - lastCanvasInput < 120) return;
        const touch = event.changedTouches && event.changedTouches[0];
        if (!touch) return;
        event.preventDefault();
        handleCanvasInput(touch.clientX, touch.clientY, 'touch');
      }, { passive: false });

      canvas.addEventListener('touchmove', (event) => {
        if (!pinch || !event.touches || event.touches.length !== 2) return;
        const a = event.touches[0];
        const b = event.touches[1];
        const distance = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        const x = (a.clientX + b.clientX) / 2;
        const y = (a.clientY + b.clientY) / 2;
        event.preventDefault();
        setZoom(pinch.zoom * (distance / Math.max(1, pinch.distance)), x, y);
      }, { passive: false });

      canvas.addEventListener('touchend', (event) => {
        if (!event.touches || event.touches.length < 2) pinch = null;
      }, { passive: false });

      canvas.addEventListener('mousedown', (event) => {
        if (event.button !== 0 || performance.now() - lastCanvasInput < 120) return;
        event.preventDefault();
        handleCanvasInput(event.clientX, event.clientY, 'mouse');
      });

      canvas.addEventListener('click', (event) => {
        if (performance.now() - lastCanvasInput < 180) return;
        event.preventDefault();
        handleCanvasInput(event.clientX, event.clientY, 'click');
      });

      canvas.addEventListener('wheel', (event) => {
        event.preventDefault();
        setZoom(state.zoom * (event.deltaY > 0 ? 0.9 : 1.1), event.clientX, event.clientY);
      }, { passive: false });

      window.addEventListener('keydown', (event) => {
        const current = cellOf(state.player.x, state.player.y);
        let next = null;
        if (event.key === '+' || event.key === '=') {
          event.preventDefault();
          setZoom(state.zoom * 1.12);
          return;
        }
        if (event.key === '-' || event.key === '_') {
          event.preventDefault();
          setZoom(state.zoom / 1.12);
          return;
        }
        if (event.key === '0') {
          event.preventDefault();
          setZoom(0.75);
          return;
        }
        if (event.key === 'ArrowLeft' || event.key === 'a') next = { c: current.c - 1, r: current.r };
        else if (event.key === 'ArrowRight' || event.key === 'd') next = { c: current.c + 1, r: current.r };
        else if (event.key === 'ArrowUp' || event.key === 'w') next = { c: current.c, r: current.r - 1 };
        else if (event.key === 'ArrowDown' || event.key === 's') next = { c: current.c, r: current.r + 1 };
        else return;
        event.preventDefault();
        if (next && isOpen(next)) state.player.path = [centerOf(next)];
      });

      window.addEventListener('resize', resize);
      resize();
      reset();
      draw();
      requestAnimationFrame(frame);
      setInterval(() => {
        const now = performance.now();
        if (now - lastDrawAt > 140) stepFrame(now);
      }, 80);
      window.__unicornMazeDebug = () => ({
        playerCell: cellOf(state.player.x, state.player.y),
        witchCell: cellOf(state.witch.x, state.witch.y),
        witch2Cell: state.witch2.active ? cellOf(state.witch2.x, state.witch2.y) : null,
        level: state.level,
        score: state.score,
        lives: state.lives,
        won: state.won,
        over: state.over,
        treatsLeft: state.treats.filter((item) => !item.taken).length,
        stinkTreatsLeft: state.treats.filter((item) => !item.taken && item.type === 'stink').length,
        crumbsLeft: state.crumbs.filter((item) => !item.taken).length,
        stenchBubbles: state.stenchTrail.length,
        stenchFogs: state.stenchFogs.length,
        stenchActive: performance.now() < state.stenchUntil,
        witchSlowed: performance.now() < state.witch.stenchUntil || performance.now() < state.witch2.stenchUntil,
        playerPath: state.player.path.length,
        witchPath: state.witch.path.length,
        witch2Path: state.witch2.path.length,
        playerStep: state.player.step,
        witchStep: state.witch.step,
        witch2Step: state.witch2.step,
        playerFacing: state.player.facing,
        witchFacing: state.witch.facing,
        witch2Facing: state.witch2.facing,
        zoom: state.zoom,
        lastInput: state.lastInput || 'none',
        canvas: { width: canvas.width, height: canvas.height, dpr: state.dpr },
        viewport: { width: state.vw, height: state.vh }
      });
    })();
  </script>
</body>
</html>
