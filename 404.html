<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Redirecting</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0a0a;
      color: #e0e0e0;
      font: 16px/1.5 "Courier New", monospace;
    }
    a { color: #4ecdc4; }
  </style>
</head>
<body>
  <main>
    <p>Redirecting to <a id="redirect-link" href="/">georgefejer.com</a>.</p>
  </main>
  <script>
    const legacyRedirects = [
      [/^\/assets\/(.*)$/i, "/Academic/assets/$1"],
      [/^\/einhorn-sammler(?:\/(.*))?$/i, "/Hobby/einhorn-sammler/$1"],
      [/^\/projects\/games\/einhorn-sammler(?:\/(.*))?$/i, "/Hobby/einhorn-sammler/$1"],
      [/^\/projects\/?$/i, "/Research/study-6/"],
      [/^\/research-projects\/?$/i, "/Research/study-6/"],
      [/^\/projects\/study6-neutral-hand-audio(?:\/(.*))?$/i, "/Research/study-6/neutral-hand-audio/$1"],
      [/^\/research-projects\/study6-neutral-hand-audio\/asset-package(?:\/(.*))?$/i, "/Research/study-6/neutral-hand-audio/$1"],
      [/^\/research-projects\/study6-neutral-hand-audio(?:\/(.*))?$/i, "/Research/study-6/neutral-hand-audio/$1"],
      [/^\/audio-assets\/?$/i, "/Research/study-6/neutral-hand-audio/"],
      [/^\/audio-assets\/(.+)$/i, "/Research/study-6/neutral-hand-audio/audio/$1"],
      [/^\/quest-sam-questionnaire-preview\/assets\/sam(?:\/(.*))?$/i, "/Research/study-6/questionnaire-assets/sam/$1"],
      [/^\/Research\/quest-sam-questionnaire-preview\/assets\/sam(?:\/(.*))?$/i, "/Research/study-6/questionnaire-assets/sam/$1"],
      [/^\/projects\/research\/quest-sam-questionnaire-preview\/assets\/sam(?:\/(.*))?$/i, "/Research/study-6/questionnaire-assets/sam/$1"],
      [/^\/Research\/study-6\/quest-sam-questionnaire-preview\/assets\/sam(?:\/(.*))?$/i, "/Research/study-6/questionnaire-assets/sam/$1"],
      [/^\/quest-sam-questionnaire-preview(?:\/(.*))?$/i, "/Research/study-6/questionnaire-ui-preview/$1"],
      [/^\/Research\/quest-sam-questionnaire-preview(?:\/(.*))?$/i, "/Research/study-6/questionnaire-ui-preview/$1"],
      [/^\/projects\/research\/quest-sam-questionnaire-preview(?:\/(.*))?$/i, "/Research/study-6/questionnaire-ui-preview/$1"],
      [/^\/Research\/study-6\/quest-sam-questionnaire-preview(?:\/(.*))?$/i, "/Research/study-6/questionnaire-ui-preview/$1"],
      [/^\/print(?:\/(.*))?$/i, "/Research/study-6/questionnaire-assets/participation-confirmation/$1"],
      [/^\/Academic\/print\/vr-atemexperiment-teilnahmebestaetigung(?:\/(.*))?$/i, "/Research/study-6/questionnaire-assets/participation-confirmation/$1"],
      [/^\/projects\/print\/vr-atemexperiment-teilnahmebestaetigung(?:\/(.*))?$/i, "/Research/study-6/questionnaire-assets/participation-confirmation/$1"],
      [/^\/Research\/study-6\/vr-atemexperiment-teilnahmebestaetigung(?:\/(.*))?$/i, "/Research/study-6/questionnaire-assets/participation-confirmation/$1"],
      [/^\/print2(?:\/(.*))?$/i, "/Academic/print/questionnaire-packets/$1"],
      [/^\/projects\/print\/questionnaire-packets(?:\/(.*))?$/i, "/Academic/print/questionnaire-packets/$1"],
      [/^\/Research\/study-6\/questionnaire-packets(?:\/(.*))?$/i, "/Academic/print/questionnaire-packets/$1"],
      [/^\/Research\/study-6\/questionnaire-assets\/print-packets(?:\/(.*))?$/i, "/Academic/print/questionnaire-packets/$1"]
    ];

    function targetFor(pathname) {
      for (const [pattern, replacement] of legacyRedirects) {
        if (pattern.test(pathname)) {
          return pathname.replace(pattern, replacement).replace(/\/undefined$/i, "/");
        }
      }
      return "/";
    }

    const target = targetFor(window.location.pathname) + window.location.search + window.location.hash;
    document.getElementById("redirect-link").href = target;
    window.location.replace(target);
  </script>
</body>
</html>
