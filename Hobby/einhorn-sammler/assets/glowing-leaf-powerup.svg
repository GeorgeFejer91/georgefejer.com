<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Glowing green leaf power-up">
  <defs>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d8ff8a" stop-opacity=".9"/>
      <stop offset=".38" stop-color="#65ff61" stop-opacity=".54"/>
      <stop offset=".74" stop-color="#18d863" stop-opacity=".22"/>
      <stop offset="1" stop-color="#18d863" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafFill" x1="30" y1="96" x2="91" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd54b"/>
      <stop offset=".38" stop-color="#73ff58"/>
      <stop offset=".7" stop-color="#caff59"/>
      <stop offset="1" stop-color="#f4ff91"/>
    </linearGradient>
    <linearGradient id="leafEdge" x1="18" y1="94" x2="98" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d742d"/>
      <stop offset=".58" stop-color="#1bd94d"/>
      <stop offset="1" stop-color="#f6ffb0"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .35 0 0 0 0 1 0 0 0 0 .18 0 0 0 .85 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#aura)"/>
  <g filter="url(#glow)">
    <path d="M25 91C40 50 68 22 100 18c-3 32-20 58-48 74-10 6-20 7-27-1Z" fill="url(#leafFill)" stroke="url(#leafEdge)" stroke-width="5" stroke-linejoin="round"/>
    <path d="M30 88c16-19 34-36 63-64" fill="none" stroke="#f7ffd1" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M47 70c-10-1-18-5-26-11M58 59c-6-9-8-19-7-30M69 47c-10-3-19-8-26-16M75 41c0-8 2-15 8-23" fill="none" stroke="#168b36" stroke-width="3.5" stroke-linecap="round" opacity=".72"/>
    <path d="M25 91c-5 5-9 8-15 10" fill="none" stroke="#87ff68" stroke-width="6" stroke-linecap="round"/>
  </g>
  <g filter="url(#sparkGlow)" fill="#ecffd5">
    <path d="M24 22l3 8 8 3-8 3-3 8-3-8-8-3 8-3Z"/>
    <path d="M95 78l2 6 6 2-6 2-2 6-2-6-6-2 6-2Z"/>
    <circle cx="91" cy="37" r="3.5"/>
    <circle cx="37" cy="102" r="2.8"/>
  </g>
</svg>
